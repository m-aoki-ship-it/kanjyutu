<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 初等教育全書 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; --glass: rgba(10, 5, 0, 0.95);
    --hi: #ff4500; --mizu: #00bfff; --kaminari: #ffd700;
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

#bg-layer { position: fixed; inset: 0; background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center; background-size: cover; z-index: 1; }
#effect-layer { position: fixed; inset: 0; pointer-events: none; z-index: 5; transition: 0.2s; opacity: 0; }

#game-stage { position: relative; z-index: 10; width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: space-between; padding: 70px 30px 160px 30px; }

#enemy-cast-wrap { position: absolute; top: 15%; left: 15%; width: 120px; height: 6px; background: #222; border: 1px solid #ff4444; border-radius: 3px; overflow: hidden; }
#enemy-cast-fill { height: 100%; width: 0%; background: #ff0000; box-shadow: 0 0 10px #ff0000; transition: width 0.1s linear; }

#top-hud { position: absolute; top: 0; width: 100%; height: 100px; display: flex; justify-content: space-between; align-items: flex-start; padding: 15px 40px; z-index: 100; }
.hp-bar-outer { width: 150px; height: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--kin); border-radius: 2px; overflow: hidden; }
#hp-fill-enemy { height: 100%; background: var(--shu); width: 100%; transition: 0.3s; }
#hp-fill-player { height: 100%; background: var(--ai); width: 100%; transition: 0.3s; }
#skill-gauge-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #fff, var(--kin)); transition: 0.5s; }

#canvas-side { width: 280px; display: flex; flex-direction: column; align-items: center; z-index: 150; }
#canvas-wrap { width: 260px; height: 260px; background: rgba(0,0,0,0.8); border: 2px solid var(--kin); position: relative; transition: 0.3s; }
canvas { width: 100%; height: 100%; }
#mondai-bun { margin-top:10px; font-size:20px; font-weight:bold; min-height: 50px; text-align: center; text-shadow: 2px 2px 4px #000; padding: 0 5px; }
#combo-ui { color: var(--kin); font-weight: bold; font-style: italic; font-size: 20px; height: 24px; }

#bottom-hud { position: absolute; bottom: 0; width: 100%; height: 160px; background: var(--glass); border-top: 2px solid var(--kin); z-index: 200; display: flex; flex-direction: column; align-items: center; padding: 15px; }
.button-row { display: flex; gap: 10px; margin-bottom: 15px; }
.el-btn { width: 50px; height: 50px; border-radius: 8px; border: 2px solid #555; font-weight: bold; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.el-btn.ready { border-color: #fff; box-shadow: 0 0 15px #fff; animation: pulse 0.6s infinite; }
.btn-clear { width: 80px; height: 50px; background: #222; border: 1px solid var(--kin); color: var(--kin); border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-attack { width: 260px; padding: 14px; background: linear-gradient(to bottom, #333, #000); border: 1px solid var(--kin); color: var(--kin); font-weight: bold; font-size: 20px; border-radius: 4px; cursor: pointer; }

@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
.shake { animation: shake 0.4s; }
.danger { box-shadow: inset 0 0 30px #ff0000; border-color: #ff0000 !important; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="effect-layer"></div>

<div id="top-hud">
    <div>
        <span style="font-size: 10px; color: var(--shu); font-weight:bold;">怨霊の気</span>
        <div class="hp-bar-outer"><div id="hp-fill-enemy"></div></div>
    </div>
    <div style="text-align: center;">
        <div id="battle-msg" style="font-size: 14px; color: #fff; font-weight:bold;"></div>
        <div id="progress-info" style="font-size: 10px; color: var(--kin);"></div>
    </div>
    <div style="text-align: right;">
        <span style="font-size: 10px; color: var(--ai); font-weight:bold;">術師の魂 / 霊力</span>
        <div class="hp-bar-outer"><div id="hp-fill-player"></div></div>
        <div class="hp-bar-outer" style="height:6px; margin-top:4px; border:none; background:#111;">
            <div id="skill-gauge-fill"></div>
        </div>
    </div>
</div>

<div id="game-stage">
    <div id="enemy-side">
        <div id="enemy-cast-wrap"><div id="enemy-cast-fill"></div></div>
        <img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" style="width:150%;" id="enemy-sprite">
    </div>

    <div id="canvas-side">
        <div id="combo-ui"></div>
        <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
        <div id="mondai-bun">---</div>
    </div>

    <div id="player-side">
        <img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" style="width:140%;" id="player-sprite">
    </div>
</div>

<div id="bottom-hud">
    <div class="button-row">
        <div class="el-btn" id="skill-hi" style="background:var(--hi)" onclick="startSkill('hi')">火</div>
        <div class="el-btn" id="skill-mizu" style="background:var(--mizu)" onclick="startSkill('mizu')">水</div>
        <div class="el-btn" id="skill-kaminari" style="background:var(--kaminari)" onclick="startSkill('kaminari')">雷</div>
        <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
    </div>
    <button class="btn-attack" id="attack-btn">漢術発動！</button>
</div>

const MONDAI_DEFENSE = [{ k: '壁', b: '鉄___防御！' }, { k: '守', b: '命を___' }];

let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
let enemyHP = 100, playerHP = 100, skillGauge = 0, combo = 0;
let enemyCast = 0, isDefensePhase = false, isSkillMode = false, skillStep = 0;
let solvedCount = 0;

const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 12; ctx.strokeStyle = '#fff';
}

function next() {
    if (isDefensePhase) {
        currentMondai = MONDAI_DEFENSE[Math.floor(Math.random() * MONDAI_DEFENSE.length)];
        document.getElementById('mondai-bun').innerHTML = `<span style="color:#ff4444">【防御】「${currentMondai.k}」を記せ！</span>`;
    } else {
        currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
        const stepInfo = isSkillMode ? ` (${skillStep+1}/3文字)` : "";
        document.getElementById('mondai-bun').innerText = currentMondai.b + ` (読み:${currentMondai.y})${stepInfo}`;
    }
    document.getElementById('progress-info').innerText = `踏破数: ${solvedCount} / ${KANJI_DATA.length}字`;
    clearCanvas();
}

setInterval(() => {
    if (isDefensePhase || isSkillMode || enemyHP <= 0 || playerHP <= 0) return;
    enemyCast += CAST_SPEED;
    if (enemyCast >= 100) triggerDefense();
    document.getElementById('enemy-cast-fill').style.width = enemyCast + "%";
}, 100);

function triggerDefense() {
    isDefensePhase = true;
    document.getElementById('canvas-wrap').classList.add('danger');
    document.getElementById('battle-msg').innerText = "怨霊の強襲！";
    clearCanvas(); 
    next();
}

async function recognizeAndAttack() {
    if (inkData.length === 0) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true; btn.innerText = "詠唱中...";

    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] })
        });
        const data = await res.json();
        const candidates = data[1][0][1];
        const isCorrect = candidates.some(c => c === currentMondai.k);

        if (isCorrect) {
            if (isDefensePhase) {
                isDefensePhase = false; enemyCast = 0;
                document.getElementById('canvas-wrap').classList.remove('danger');
                showFlashEffect("#fff");
                document.getElementById('battle-msg').innerText = "完全防御！";
                next();
            } else if (isSkillMode) {
                skillStep++;
                if (skillStep >= 3) {
                    solvedCount += 3;
                    finishSkill(true);
                } else next();
            } else {
                combo++; solvedCount++;
                damageEnemy(10 + combo);
                updateSkillGauge(20);
                next();
            }
        } else {
            if (isDefensePhase) {
                playerTakeDamage(30); isDefensePhase = false; enemyCast = 0;
                document.getElementById('canvas-wrap').classList.remove('danger');
                document.getElementById('battle-msg').innerText = "防御失敗！";
                next();
            } else if (isSkillMode) {
                finishSkill(false);
            } else {
                combo = 0; 
                document.getElementById('battle-msg').innerText = `不発！正解は「${currentMondai.k}」`;
                clearCanvas();
            }
        }
    } catch(e) { console.error(e); }
    btn.disabled = false; btn.innerText = "漢術発動！";
    document.getElementById('combo-ui').innerText = (combo > 0 && !isSkillMode) ? combo + " Combo!" : "";
}

function damageEnemy(val) {
    enemyHP = Math.max(0, enemyHP - val);
    document.getElementById('hp-fill-enemy').style.width = enemyHP + "%";
    document.getElementById('enemy-side').classList.add('shake');
    setTimeout(() => {
        document.getElementById('enemy-side').classList.remove('shake');
        if (enemyHP <= 0) { 
            document.getElementById('battle-msg').innerText = "怨霊浄化！";
            enemyHP = 100; next(); 
        }
    }, 400);
}

function playerTakeDamage(val) {
    playerHP = Math.max(0, playerHP - val);
    document.getElementById('hp-fill-player').style.width = playerHP + "%";
    document.getElementById('player-side').classList.add('shake');
    combo = 0;
    setTimeout(() => {
        document.getElementById('player-side').classList.remove('shake');
        if (playerHP <= 0) { alert("敗北... 精神を鍛え直せ"); location.reload(); }
    }, 400);
}

function updateSkillGauge(v) {
    skillGauge = Math.min(100, skillGauge + v);
    document.getElementById('skill-gauge-fill').style.width = skillGauge + "%";
    if (skillGauge >= 100) {
        document.querySelectorAll('.el-btn').forEach(b => b.classList.add('ready'));
        document.getElementById('battle-msg').innerText = "奥義使用可能！";
    }
}

function startSkill(type) {
    if (skillGauge < 100 || isSkillMode || isDefensePhase) return;
    isSkillMode = true; skillStep = 0;
    document.querySelectorAll('.el-btn').forEach(b => b.classList.remove('ready'));
    document.getElementById('effect-layer').style.background = `var(--${type})`;
    document.getElementById('effect-layer').style.opacity = "0.4";
    document.getElementById('battle-msg').innerText = "奥義詠唱開始！";
    next();
}

function finishSkill(success) {
    isSkillMode = false;
    document.getElementById('effect-layer').style.opacity = "0";
    if (success) {
        showFlashEffect("#ff0");
        damageEnemy(50);
        alert("奥義発動！凄まじい一撃！");
        skillGauge = 0;
    } else {
        alert("奥義失敗！霊力が霧散した...");
        skillGauge = 30;
    }
    updateSkillGauge(0);
    next();
}

function showFlashEffect(color) {
    const el = document.getElementById('effect-layer');
    el.style.background = color; el.style.opacity = "0.8";
    setTimeout(() => el.style.opacity = "0", 250);
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }
const getPos = (e) => { const r = canvas.getBoundingClientRect(); return { x: (e.touches?.[0].clientX || e.clientX) - r.left, y: (e.touches?.[0].clientY || e.clientY) - r.top }; };
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); isDrawing = true; currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('touchmove', e => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0); });
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });
document.getElementById('attack-btn').addEventListener('click', recognizeAndAttack);

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
