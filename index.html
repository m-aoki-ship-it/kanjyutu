<title>漢術師 - 極 - (小学3年生 200字)</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --sumi: #0d0b08; --sumi2: #1a1610; --washi: #f2ead8; --kin: #c9a84c;
  --kin-dim: rgba(201,168,76,0.15); --shu: #c0392b; --shu-bright: #e74c3c;
  --shu-dim: rgba(192,57,43,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background: var(--sumi); font-family: 'Noto Sans JP', sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; color: var(--washi); }
.ougi-shake { animation: ougiShake 0.5s infinite; }
@keyframes ougiShake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-8px, 4px); }
  75% { transform: translate(8px, -4px); }
}
.sumi-splash {
  position: fixed; width: 30px; height: 30px; background: var(--sumi);
  border-radius: 50%; pointer-events: none; z-index: 1000;
  filter: blur(2px); animation: splashAnim 0.8s ease-out forwards;
}
@keyframes splashAnim {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(5) translate(var(--tx), var(--ty)); opacity: 0; }
}
.flash-white {
  position: fixed; inset: 0; background: white; z-index: 999;
  pointer-events: none; animation: flashAnim 0.4s ease-out forwards;
}
@keyframes flashAnim { 0% { opacity: 0.8; } 100% { opacity: 0; } }
#app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100dvh; padding: 12px; gap: 8px; }
#enemy-area { display: flex; align-items: center; gap: 10px; padding: 15px; background: var(--shu-dim); border: 1px solid var(--shu); border-radius: 4px; }
#hp-bar-bg { flex: 1; height: 10px; background: #333; position: relative; }
#hp-bar { height: 100%; width: 100%; background: var(--shu-bright); transition: width 0.3s; }
#draw-canvas { background: rgba(0,0,0,0.3); border: 2px solid var(--kin-dim); width: 100%; height: 300px; touch-action: none; }
.action-btn { padding: 15px; font-size: 20px; cursor: pointer; border: 1px solid var(--kin); background: var(--sumi2); color: var(--kin); }
#attack-btn { background: var(--shu); color: white; flex: 2; }
</style>
</head>

<audio id="se-draw" src="文字入れ.mp3" preload="auto"></audio>
<audio id="se-attack" src="攻撃.mp3" preload="auto"></audio>

<div id="app">
  <div id="enemy-area">
    <div style="flex:1">
      <div id="enemy-name">強敵：誤字の魔物</div>
      <div id="hp-bar-bg"><div id="hp-bar"></div></div>
    </div>
    <div id="enemy-char" style="font-size: 50px;">怨</div>
  </div>
  <div id="mondai-area" style="text-align:center; padding: 20px;">
    <div id="mondai-bun" style="font-size: 24px; margin-bottom: 10px;"></div>
    <div id="mondai-yomi" style="color: var(--kin);"></div>
    <div id="mondai-strokes" style="font-size: 12px; opacity: 0.6;"></div>
  </div>
  <canvas id="draw-canvas"></canvas>
  <div style="display:flex; gap:10px;">
    <button class="action-btn" onclick="clearCanvas()">墨を拭く</button>
    <button class="action-btn" id="attack-btn" onclick="tryAttack()">奥義発動！</button>

  { kanji:'由', yomi:'ゆう/よし', strokes:5, bun:'理由を説明する' },
  { kanji:'油', yomi:'ゆう/あぶら', strokes:8, bun:'___絵を描く' },
  { kanji:'有', yomi:'ゆう/ある', strokes:6, bun:'有名な場所' },
  { kanji:'遊', yomi:'ゆう/あそぶ', strokes:12, bun:'友達と___ぶ' },
  { kanji:'予', yomi:'よ', strokes:4, bun:'予想が当たる' },
  { kanji:'羊', yomi:'よう/ひつじ', strokes:6, bun:'___の毛で作った服' },
  { kanji:'洋', yomi:'よう', strokes:9, bun:'___服を買う' },
  { kanji:'葉', yomi:'よう/は', strokes:12, bun:'木の___がゆれる' },
  { kanji:'陽', yomi:'よう', strokes:12, bun:'太___の光を浴びる' },
  { kanji:'様', yomi:'よう/さま', strokes:14, bun:'色々な___子' },
  { kanji:'落', yomi:'らく/おちる', strokes:12, bun:'落とし物をする' },
  { kanji:'流', yomi:'りゅう/ながれる', strokes:10, bun:'流行の曲' },
  { kanji:'旅', yomi:'りょ/たび', strokes:10, bun:'旅行カバン' },
  { kanji:'両', yomi:'りょう', strokes:6, bun:'___親を大切にする' },
  { kanji:'緑', yomi:'りょく/みどり', strokes:14, bun:'___豊かな公園' },
  { kanji:'礼', yomi:'れい', strokes:5, bun:'お___状を書く' },
  { kanji:'列', yomi:'れつ', strokes:6, bun:'一___になって並ぶ' },
  { kanji:'練', yomi:'れん/ねる', strokes:14, bun:'___習を積み重ねる' },
  { kanji:'路', yomi:'ろ/じ', strokes:13, bun:'線___の近く' },
  { kanji:'和', yomi:'わ/やわらぐ', strokes:8, bun:'___服を着る' }
];

let currentMondai = {};
let paths = [];
let isDrawing = false;
let enemyHp = 100;

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const seDraw = document.getElementById('se-draw');
const seAttack = document.getElementById('se-attack');

function setupCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#ffffff';
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 15;
}

function nextQuestion() {
  const nextIndex = Math.floor(Math.random() * MONDAI_LIST.length);
  currentMondai = MONDAI_LIST[nextIndex];
  document.getElementById('mondai-bun').innerText = currentMondai.bun;
  document.getElementById('mondai-yomi').innerText = `読み：${currentMondai.yomi}`;
  document.getElementById('mondai-strokes').innerText = `画数：${currentMondai.strokes}画`;
  clearCanvas();
}

// 効果音再生用関数（連続再生できるようにリセットを入れる）
function playSE(audioElement) {
  audioElement.pause();
  audioElement.currentTime = 0;
  audioElement.play().catch(e => console.log("SE再生エラー:", e));
}

canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
canvas.addEventListener('touchend', end);

function start(e) {
  isDrawing = true;
  paths.push([]);
  playSE(seDraw); // 文字を書き始めた瞬間にSE再生
  draw(e);
}

function draw(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  paths[paths.length - 1].push({x, y});
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  const currentPath = paths[paths.length-1];
  if(currentPath.length > 1) {
    const prev = currentPath[currentPath.length-2];
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(x, y);
    ctx.stroke();
  }
}
function end() { isDrawing = false; }
function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  paths = [];
}

function tryAttack() {
  const userStrokes = paths.length;
  if (userStrokes === currentMondai.strokes) {
    executeOugi();
  } else {
    alert(`画数が違います！ あなた：${userStrokes}画 / 正解：${currentMondai.strokes}画`);
  }
}

function executeOugi() {
  playSE(seAttack); // 攻撃が当たった瞬間にSE再生
  document.getElementById('app').classList.add('ougi-shake');
  const flash = document.createElement('div');
  flash.className = 'flash-white';
  document.body.appendChild(flash);
  for (let i = 0; i < 20; i++) {
    const splash = document.createElement('div');
    splash.className = 'sumi-splash';
    splash.style.left = '50%';
    splash.style.top = '50%';
    splash.style.setProperty('--tx', (Math.random() - 0.5) * 600 + 'px');
    splash.style.setProperty('--ty', (Math.random() - 0.5) * 600 + 'px');
    document.body.appendChild(splash);
    setTimeout(() => splash.remove(), 800);
  }
  enemyHp -= 25;
  if(enemyHp < 0) enemyHp = 0;
  document.getElementById('hp-bar').style.width = enemyHp + '%';
  document.getElementById('enemy-char').style.transform = 'scale(1.5) rotate(20deg)';
  document.getElementById('enemy-char').style.filter = 'brightness(5)';
  setTimeout(() => {
    document.getElementById('app').classList.remove('ougi-shake');
    document.getElementById('enemy-char').style.transform = 'scale(1) rotate(0deg)';
    document.getElementById('enemy-char').style.filter = 'none';
    flash.remove();
    if(enemyHp <= 0) {
      alert("敵を討ち取ったり！");
      enemyHp = 100;
      document.getElementById('hp-bar').style.width = '100%';
    }
    nextQuestion();
  }, 600);
}

window.onload = () => {
  setupCanvas();
  nextQuestion();
};
</script>
