<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 横画面完全対応版 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; --glass: rgba(10, 5, 0, 0.9);
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 背景 */
#bg-layer { position: fixed; inset: 0; background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center; background-size: cover; z-index: 1; }

/* ★最上部：問題表示エリア（ここを独立させました） */
#question-header {
    position: absolute; top: 0; left: 0; width: 100%; height: 80px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
#mondai-bun { font-size: 32px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #000, 0 0 20px var(--kin); }
#yomikata { font-size: 14px; color: var(--kin); margin-bottom: 2px; }

/* ゲームステージ */
#game-stage { 
    position: relative; z-index: 10; width: 100vw; height: 100vh; 
    display: grid; grid-template-columns: 1fr 1.2fr 1fr; 
    align-items: center; padding: 80px 20px 140px 20px; 
}

/* 敵と味方 */
#enemy-side, #player-side { width: 100%; height: 100%; display: flex; align-items: flex-end; justify-content: center; }
#enemy-sprite, #player-sprite { width: 120%; max-width: 400px; object-fit: contain; filter: drop-shadow(0 0 20px #000); }

/* 書き込みエリア */
#canvas-side { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#canvas-wrap { 
    width: 32vh; height: 32vh; max-width: 280px; max-height: 280px;
    background: rgba(255,255,255,0.05); border: 2px solid var(--kin); position: relative; 
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
}
canvas { width: 100%; height: 100%; display: block; }

/* 下部操作UI */
#bottom-hud { 
    position: absolute; bottom: 0; width: 100%; height: 130px; 
    background: var(--glass); border-top: 2px solid var(--kin); 
    z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; 
}
.button-row { display: flex; gap: 15px; }
.el-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #555; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.btn-clear { padding: 0 15px; height: 45px; background: #222; border: 1px solid var(--kin); color: var(--kin); border-radius: 5px; cursor: pointer; }
.btn-attack { width: 280px; height: 45px; background: linear-gradient(to bottom, #d4af37, #8a6d1a); color: #000; font-weight: bold; font-size: 20px; border-radius: 25px; border: none; cursor: pointer; }

/* HPバー（左右のキャラの上に配置） */
.hp-container { position: absolute; top: 90px; width: 150px; }
.hp-bar { height: 10px; background: #333; border: 1px solid var(--kin); border-radius: 5px; overflow: hidden; }
#hp-fill-enemy { height: 100%; background: var(--shu); width: 100%; transition: 0.3s; }
#hp-fill-player { height: 100%; background: var(--ai); width: 100%; transition: 0.3s; }
</style>
</head>
<body>

<div id="bg-layer"></div>

<div id="question-header">
    <div id="yomikata">---</div>
    <div id="mondai-bun">読み込み中...</div>
</div>

<div id="game-stage">
    <div id="enemy-side">
        <div class="hp-container" style="left: 20px;">
            <div style="font-size:10px; color:var(--shu);">怨霊の気</div>
            <div class="hp-bar"><div id="hp-fill-enemy"></div></div>
        </div>
        <img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite">
    </div>

    <div id="canvas-side">
        <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    </div>

    <div id="player-side">
        <div class="hp-container" style="right: 20px; text-align: right;">
            <div style="font-size:10px; color:var(--ai);">術師の魂</div>
            <div class="hp-bar"><div id="hp-fill-player"></div></div>
        </div>
        <img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite">
    </div>
</div>

<div id="bottom-hud">
    <div class="button-row">
        <div class="el-btn" style="background:#ff4500">火</div>
        <div class="el-btn" style="background:#00bfff">水</div>
        <div class="el-btn" style="background:#ffd700">雷</div>
        <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
    </div>
    <button class="btn-attack" id="attack-btn" onclick="recognizeAndAttack()">漢術発動！</button>
</div>

<script>
// 440問のデータ（一部抜粋してループ再生用）
const KANJI_DATA = [
    {k:'一',y:'いち',b:'___の太刀'},{k:'天',y:'てん',b:'___の裁き'},{k:'右',y:'みぎ',b:'___に曲がる'},
    {k:'火',y:'ひ',b:'___を吹く'},{k:'水',y:'みず',b:'___の泡'},{k:'力',y:'ちから',b:'未知の___'}
];

let currentMondai = {}, inkData = [], isDrawing = false;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
    document.getElementById('mondai-bun').innerText = currentMondai.b;
    document.getElementById('yomikata').innerText = `（${currentMondai.y}）`;
    clearCanvas();
}

async function recognizeAndAttack() {
    // 認識処理（前回のロジックを継承）
    alert("攻撃！正解は: " + currentMondai.k);
    next();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }
const getPos = (e) => { 
    const r = canvas.getBoundingClientRect(); 
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - r.left, y: p.clientY - r.top }; 
};

canvas.addEventListener('touchstart', e => {
    e.preventDefault(); const p = getPos(e); isDrawing = true;
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
    if(!isDrawing) return; const p = getPos(e);
    ctx.lineTo(p.x, p.y); ctx.stroke();
}, {passive:false});
window.addEventListener('touchend', () => { isDrawing = false; });

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
