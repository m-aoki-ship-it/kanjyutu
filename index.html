<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 属性決戦 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; --glass: rgba(10, 5, 0, 0.85);
    /* 属性カラー */
    --hi: #ff4500; --mizu: #00bfff; --kaminari: #ffd700;
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

#bg-layer { position: fixed; inset: 0; background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center; background-size: cover; z-index: 1; }

/* 属性エフェクト（背景が光る） */
#effect-layer { position: fixed; inset: 0; pointer-events: none; z-index: 2; transition: 0.5s; opacity: 0; }

#game-stage { position: relative; z-index: 10; width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: space-between; padding: 70px 30px 140px 30px; }

/* HUD & キャラ */
#top-hud { position: absolute; top: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; z-index: 100; }
.hp-bar-outer { width: 160px; height: 14px; background: rgba(0,0,0,0.6); border: 1px solid var(--kin); border-radius: 2px; }
#enemy-side { flex: 1.2; display: flex; justify-content: center; position: relative; }
#enemy-sprite { width: 155%; transform: translateY(10%); filter: drop-shadow(0 0 15px #000); }
#player-side { flex: 1; display: flex; justify-content: center; }
#player-chara { width: 145%; transform: translateX(-5%); }
#player-chara img { width: 100%; filter: drop-shadow(0 0 20px #000); }

/* 書道エリア */
#canvas-side { width: 280px; display: flex; flex-direction: column; align-items: center; z-index: 150; }
#canvas-wrap { width: 260px; height: 260px; background: rgba(0,0,0,0.4); border: 2px solid var(--kin); position: relative; }
canvas { width: 100%; height: 100%; }

/* コンボ表示 */
#combo-ui { position: absolute; top: -50px; left: 0; font-size: 32px; font-weight: bold; color: var(--kin); font-style: italic; opacity: 0; transition: 0.2s; text-shadow: 2px 2px 4px #000; }

/* 下部UI：属性ボタン */
#bottom-hud { position: absolute; bottom: 0; width: 100%; height: 140px; background: var(--glass); border-top: 2px solid var(--kin); z-index: 200; display: flex; flex-direction: column; align-items: center; padding: 10px; }
.element-group { display: flex; gap: 15px; margin-bottom: 10px; }
.el-btn { width: 60px; height: 60px; border-radius: 8px; border: 2px solid #fff; font-weight: bold; font-size: 20px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.el-hi { background: linear-gradient(45deg, #800, var(--hi)); box-shadow: 0 0 10px var(--hi); }
.el-mizu { background: linear-gradient(45deg, #004, var(--mizu)); box-shadow: 0 0 10px var(--mizu); }
.el-kaminari { background: linear-gradient(45deg, #880, var(--kaminari)); box-shadow: 0 0 10px var(--kaminari); }
.el-btn.active { transform: scale(1.15); border-color: #fff; border-width: 4px; z-index: 10; }

.btn-attack { padding: 10px 60px; background: #1a1a1a; border: 1px solid var(--kin); color: var(--kin); font-weight: bold; border-radius: 4px; }

/* アニメーション */
.shake { animation: shake 0.4s; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-20px); } 75% { transform: translateX(20px); } }
.pop { animation: pop 0.3s ease-out; }
@keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="effect-layer"></div>

<div id="top-hud">
    <div><span style="font-size: 11px; color: var(--shu);">怨霊の気</span><div class="hp-bar-outer"><div id="hp-fill" style="height:100%; background:var(--shu); width:100%;"></div></div></div>
    <div style="font-size: 24px; color: var(--kin);">属性決戦</div>
    <div style="text-align: right;"><span style="font-size: 11px; color: var(--ai);">術師の魂</span><div class="hp-bar-outer"><div style="height:100%; background:var(--ai); width:100%;"></div></div></div>
</div>

<div id="game-stage">
    <div id="enemy-side"><img id="enemy-sprite" src="f7620a0e-4384-4f27-949d-52e7ea62721b.png"></div>
    <div id="canvas-side">
        <div id="combo-ui">0 Combo!</div>
        <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
        <div id="mondai-bun" style="margin-top: 10px; font-size: 20px; color: var(--kin);">---</div>
    </div>
    <div id="player-side"><div id="player-chara"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png"></div></div>
</div>

<div id="bottom-hud">
    <div class="element-group">
        <div class="el-btn el-hi" onclick="setElement('hi', this)">火</div>
        <div class="el-btn el-mizu" onclick="setElement('mizu', this)">水</div>
        <div class="el-btn el-kaminari" onclick="setElement('kaminari', this)">雷</div>
    </div>
    <button class="btn-attack" id="attack-btn" onclick="recognizeAndAttack()">漢術発動！</button>
</div>

<script>
const MONDAI_LIST = [
    { kanji: '火', yomi: 'ひ', bun: '___を噴く' },
    { kanji: '水', yomi: 'みず', bun: '___を操る' },
    { kanji: '雷', yomi: 'かみなり', bun: '___が落ちる' },
    { kanji: '悪', yomi: 'わるい', bun: '___い奴を討つ' }
];
let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
let selectedElement = 'hi', combo = 0;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setElement(el, btn) {
    selectedElement = el;
    document.querySelectorAll('.el-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // 背景エフェクト
    const effect = document.getElementById('effect-layer');
    effect.style.opacity = "0.3";
    effect.style.background = `radial-gradient(circle, var(--${el}) 0%, transparent 70%)`;
}

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
    document.getElementById('mondai-bun').innerText = currentMondai.bun;
    clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return {x, y};
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); isDrawing = true; currentStroke = [[p.x], [p.y], [0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('touchmove', e => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0); });
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });

async function recognizeAndAttack() {
    if (inkData.length === 0) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true;

    try {
        const res = await fetch('https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test', {
            method: 'POST',
            body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] })
        });
        const data = await res.json();
        const candidates = data[1][0][1];

        if (candidates.slice(0, 3).includes(currentMondai.kanji)) {
            // 成功
            combo++;
            showCombo();
            document.getElementById('enemy-side').classList.add('shake');
            // 属性ごとのヒットエフェクト色
            document.getElementById('effect-layer').style.backgroundColor = `var(--${selectedElement})`;
            setTimeout(() => {
                document.getElementById('enemy-side').classList.remove('shake');
                document.getElementById('effect-layer').style.backgroundColor = "transparent";
                next();
            }, 400);
        } else {
            combo = 0;
            showCombo();
            alert("不発！");
            clearCanvas();
        }
    } catch(e) { console.error(e); }
    btn.disabled = false;
}

function showCombo() {
    const ui = document.getElementById('combo-ui');
    if (combo > 0) {
        ui.innerText = `${combo} Combo!`;
        ui.style.opacity = "1";
        ui.classList.remove('pop');
        void ui.offsetWidth; // reflow
        ui.classList.add('pop');
    } else {
        ui.style.opacity = "0";
    }
}

window.onload = () => { setup(); next(); setElement('hi', document.querySelector('.el-hi')); };
</script>
</body>
</html>
