<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 最終覚醒 -</title>
<style>
:root { --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; position: relative; }

/* 1. 背景 */
#stage-bg { position: fixed; inset: 0; background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center; background-size: cover; z-index: 1; }

/* 2. キャラ配置（重なり制御） */
#char-visuals { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

/* 敵：左側に巨大化して配置 */
#enemy-box { position: absolute; left: -10%; bottom: 0; width: 65%; height: 95vh; z-index: 10; }
#enemy-sprite { width: 100%; height: 100%; object-fit: contain; object-position: left bottom; filter: drop-shadow(0 0 30px #000); }

/* 主人公：右端に寄せて、全ての要素より手前に */
#player-box { position: absolute; right: -5%; bottom: 0; width: 60%; height: 90vh; z-index: 100; display: flex; justify-content: flex-end; }
#player-sprite { width: 100%; height: 100%; object-fit: contain; object-position: right bottom; filter: drop-shadow(0 0 30px #000); }

/* 3. 書き込み枠：主人公の後ろ、敵の前 */
#canvas-plate { position: absolute; left: 45%; top: 50%; transform: translate(-50%, -50%); width: 50vw; height: 55vh; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 20px; z-index: 20; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); pointer-events: none; }

/* 4. 墨描きキャンバス */
#canvas-layer { position: fixed; inset: 0; z-index: 110; pointer-events: auto; }
canvas { width: 100%; height: 100%; display: block; }

/* 5. UI（最前面） */
#ui-overlay { position: fixed; inset: 0; z-index: 200; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
#top-ui { background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); padding: 30px 40px; }
.hp-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
.hp-bar { width: 35%; height: 14px; border: 1px solid var(--kin); border-radius: 7px; overflow: hidden; background: rgba(0,0,0,0.5); }
#mondai-bun { text-align: center; font-size: 48px; font-weight: bold; margin-top: 15px; text-shadow: 0 0 15px #000, 0 0 5px var(--kin); }

#bottom-ui { background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 40px 0; pointer-events: auto; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.btn-row { display: flex; gap: 20px; align-items: center; }
.el-btn { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; }
.btn-clear { height: 50px; padding: 0 30px; background: #111; color: var(--kin); border: 1px solid var(--kin); border-radius: 12px; font-weight: bold; }
.btn-attack { width: 85%; max-width: 500px; padding: 20px; background: linear-gradient(to bottom, #fceabb, #d4af37); color: #000; font-weight: bold; font-size: 32px; border-radius: 50px; border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.7); }

.hit { animation: hit-anim 0.4s; }
@keyframes hit-anim { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05) translateX(15px); filter: brightness(1.5); } }
</style>
</head>
<body>
    <div id="stage-bg"></div>
    <div id="char-visuals">
        <div id="enemy-box"><img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite"></div>
        <div id="player-box"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite"></div>
    </div>
    <div id="canvas-plate"></div>
    <div id="canvas-layer"><canvas id="draw-canvas"></canvas></div>
    <div id="ui-overlay">
        <div id="top-ui">
            <div class="hp-row">
                <div class="hp-bar"><div id="hp-enemy" style="width:100%; height:100%; background:var(--shu); transition:0.3s;"></div></div>
                <div style="color:var(--kin); font-weight:bold;">怨霊対峙</div>
                <div class="hp-bar"><div id="hp-player" style="width:100%; height:100%; background:var(--ai); transition:0.3s;"></div></div>
            </div>
            <div id="mondai-bun">---</div>
        </div>
        <div id="bottom-ui">
            <div class="btn-row">
                <div class="el-btn" style="background:#ff4500">火</div>
                <div class="el-btn" style="background:#00bfff">水</div>
                <div class="el-btn" style="background:#ffd700; color:#000;">雷</div>
                <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
            </div>
            <button class="btn-attack" id="attack-btn">漢術発動！</button>
        </div>
    </div>
<script>
const KANJI_DATA = [{k:'一',b:'___の太刀'},{k:'火',b:'___を噴く'},{k:'天',b:'___の裁き'},{k:'三',b:'___千世界'},{k:'龍',b:'昇___拳'}];
let enemyHP = 100, currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');
function setup() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 15; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; }
function next() { currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)]; document.getElementById('mondai-bun').innerText = currentMondai.b; clearCanvas(); }
async function attack() {
    if (inkData.length === 0) return;
    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] }) });
        const data = await res.json();
        if (data[1][0][1].includes(currentMondai.k)) {
            enemyHP -= 34; document.getElementById('hp-enemy').style.width = Math.max(0, enemyHP) + "%";
            const enemyEl = document.getElementById('enemy-sprite'); enemyEl.classList.add('hit');
            setTimeout(() => { enemyEl.classList.remove('hit'); if (enemyHP <= 0) { enemyHP = 100; document.getElementById('hp-enemy').style.width = "100%"; } next(); }, 400);
        } else { clearCanvas(); }
    } catch(e) { console.error(e); clearCanvas(); }
}
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }
const getPos = (e) => { const p = e.touches ? e.touches[0] : e; return { x: p.clientX, y: p.clientY }; };
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); isDrawing = true; currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0); }, {passive:false});
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });
document.getElementById('attack-btn').addEventListener('click', attack);
window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
