<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 初等440字全踏破 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; --glass: rgba(10, 5, 0, 0.7);
    --hi: #ff4500; --mizu: #00bfff; --kaminari: #ffd700;
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

#bg-layer { position: fixed; inset: 0; background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center; background-size: cover; z-index: 1; }
#effect-layer { position: fixed; inset: 0; pointer-events: none; z-index: 5; transition: 0.2s; opacity: 0; }

/* レイアウト調整：キャラを見せつつ中央を空ける */
#game-stage { 
    position: relative; z-index: 10; width: 100vw; height: 100dvh; 
    display: flex; justify-content: space-between; align-items: flex-end;
    padding-bottom: 180px; 
}

#enemy-side { width: 30%; text-align: left; padding-left: 2%; transition: 0.5s; }
#player-side { width: 30%; text-align: right; padding-right: 2%; }
#enemy-sprite, #player-sprite { width: 130%; object-fit: contain; }

#canvas-side { 
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -40%);
    width: 45%; max-width: 400px; z-index: 150; 
}
#canvas-wrap { 
    width: 100%; aspect-ratio: 1 / 1; 
    background: rgba(0, 0, 0, 0.3); 
    border: 2px solid var(--kin); border-radius: 10px; position: relative;
}
canvas { width: 100%; height: 100%; }

#mondai-bun { 
    position: absolute; top: -70px; width: 100%; text-align: center;
    font-size: 22px; font-weight: bold; text-shadow: 0 0 10px #000; white-space: nowrap;
}

#top-hud { position: absolute; top: 0; width: 100%; height: 80px; display: flex; justify-content: space-between; padding: 10px 20px; z-index: 100; }
.hp-bar-outer { width: 140px; height: 10px; background: rgba(0,0,0,0.6); border: 1px solid var(--kin); border-radius: 2px; }

#bottom-hud { position: absolute; bottom: 0; width: 100%; height: 160px; background: var(--glass); border-top: 2px solid var(--kin); z-index: 200; display: flex; flex-direction: column; align-items: center; padding: 10px; }
.button-row { display: flex; gap: 8px; margin-bottom: 10px; }
.el-btn { width: 45px; height: 45px; border-radius: 8px; border: 2px solid #555; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; }
.btn-clear { width: 70px; height: 45px; background: #222; border: 1px solid var(--kin); color: var(--kin); border-radius: 8px; font-size: 12px; }
.btn-attack { width: 80%; max-width: 400px; padding: 12px; background: linear-gradient(to bottom, #444, #000); border: 1px solid var(--kin); color: var(--kin); font-weight: bold; font-size: 18px; border-radius: 4px; }

.vanish { opacity: 0; transform: scale(1.5); transition: 1s; }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
.danger { border-color: #ff0000 !important; box-shadow: inset 0 0 20px #ff0000; }
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="effect-layer"></div>

<div id="top-hud">
    <div><div class="hp-bar-outer"><div id="hp-fill-enemy" style="height:100%; background:var(--shu); width:100%;"></div></div></div>
    <div style="text-align: center;">
        <div id="battle-msg" style="font-size: 12px; color: #fff;">怨霊を探知中...</div>
        <div id="progress-info" style="font-size: 12px; color: var(--kin);">0 / 440</div>
    </div>
    <div><div class="hp-bar-outer"><div id="hp-fill-player" style="height:100%; background:var(--ai); width:100%;"></div></div></div>
</div>

<div id="game-stage">
    <div id="enemy-side"><img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite"></div>
    <div id="canvas-side">
        <div id="mondai-bun">---</div>
        <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    </div>
    <div id="player-side"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite"></div>
</div>

<div id="bottom-hud">
    <div class="button-row">
        <div class="el-btn" style="background:var(--hi)">火</div>
        <div class="el-btn" style="background:var(--mizu)">水</div>
        <div class="el-btn" style="background:var(--kaminari)">雷</div>
        <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
    </div>
    <button class="btn-attack" id="attack-btn" onclick="recognizeAndAttack()">漢術発動！</button>
</div>

// 防御用漢字
const MONDAI_DEFENSE = [{ k: '壁', b: '鉄___防御！' }, { k: '守', b: '命を___' }];

let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
let enemyHP = 100, playerHP = 100, skillGauge = 0, solvedCount = 0;
let enemyCast = 0, isDefensePhase = false, isEnemyDead = false;

const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    if (isEnemyDead) return;
    if (isDefensePhase) {
        currentMondai = MONDAI_DEFENSE[Math.floor(Math.random() * MONDAI_DEFENSE.length)];
        document.getElementById('mondai-bun').innerHTML = `<span style="color:#ff4444">【防御】「${currentMondai.k}」を記せ！</span>`;
    } else {
        // 出題順をランダムにするか、solvedCountに合わせて進めることも可能
        currentMondai = KANJI_DATA[solvedCount % KANJI_DATA.length];
        document.getElementById('mondai-bun').innerText = currentMondai.b + ` (読み:${currentMondai.y})`;
    }
    document.getElementById('progress-info').innerText = `${solvedCount} / 440`;
    clearCanvas();
}

// 敵の反撃タイマー
setInterval(() => {
    if (isDefensePhase || isEnemyDead || playerHP <= 0) return;
    enemyCast += 0.4;
    if (enemyCast >= 100) triggerDefense();
}, 100);

function triggerDefense() {
    isDefensePhase = true;
    document.getElementById('canvas-wrap').classList.add('danger');
    document.getElementById('battle-msg').innerText = "怨霊の強襲！";
    clearCanvas(); 
    next();
}

async function recognizeAndAttack() {
    if (inkData.length === 0 || isEnemyDead) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true;

    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] })
        });
        const data = await res.json();
        const candidates = data[1][0][1];
        const isCorrect = candidates.some(c => c === currentMondai.k);

        if (isCorrect) {
            if (isDefensePhase) {
                isDefensePhase = false; enemyCast = 0;
                document.getElementById('canvas-wrap').classList.remove('danger');
                document.getElementById('battle-msg').innerText = "完全防御！";
                next();
            } else {
                solvedCount++;
                damageEnemy(25);
                next();
            }
        } else {
            if (isDefensePhase) {
                playerTakeDamage(25); isDefensePhase = false; enemyCast = 0;
                document.getElementById('canvas-wrap').classList.remove('danger');
                next();
            } else {
                document.getElementById('battle-msg').innerText = `不発！正解は「${currentMondai.k}」`;
                clearCanvas();
            }
        }
    } catch(e) { console.error(e); }
    btn.disabled = false;
}

function damageEnemy(val) {
    enemyHP = Math.max(0, enemyHP - val);
    document.getElementById('hp-fill-enemy').style.width = enemyHP + "%";
    document.getElementById('enemy-side').classList.add('shake');
    if (enemyHP <= 0) purgeEnemy();
    setTimeout(() => document.getElementById('enemy-side').classList.remove('shake'), 400);
}

function purgeEnemy() {
    isEnemyDead = true;
    document.getElementById('enemy-sprite').classList.add('vanish');
    document.getElementById('battle-msg').innerText = "怨霊を浄化！";
    setTimeout(() => {
        enemyHP = 100; isEnemyDead = false;
        document.getElementById('hp-fill-enemy').style.width = "100%";
        document.getElementById('enemy-sprite').classList.remove('vanish');
        next();
    }, 2000);
}

function playerTakeDamage(val) {
    playerHP = Math.max(0, playerHP - val);
    document.getElementById('hp-fill-player').style.width = playerHP + "%";
    document.getElementById('player-side').classList.add('shake');
    if (playerHP <= 0) { alert("修行失敗..."); location.reload(); }
    setTimeout(() => document.getElementById('player-side').classList.remove('shake'), 400);
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }
const getPos = (e) => { const r = canvas.getBoundingClientRect(); return { x: (e.touches?.[0].clientX || e.clientX) - r.left, y: (e.touches?.[0].clientY || e.clientY) - r.top }; };
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); isDrawing = true; currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('touchmove', e => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0); });
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
