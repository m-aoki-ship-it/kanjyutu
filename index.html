<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 絶景の陣・改 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa;
    --bg-dark: rgba(20, 15, 10, 0.9);
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 背景と上部の戦闘画面（全体の60%） */
#battle-screen {
    position: relative;
    width: 100%;
    height: 60vh; /* 上半分を戦闘シーンに固定 */
    background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 20px;
    border-bottom: 2px solid var(--kin);
}

#enemy-side, #player-side { width: 45%; }
#enemy-sprite, #player-sprite { width: 100%; height: auto; object-fit: contain; }

/* 下部の術式入力エリア（全体の40%） */
#input-area {
    width: 100%;
    height: 40vh;
    background: var(--bg-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
}

#mondai-bun {
    font-size: 22px;
    font-weight: bold;
    color: var(--kin);
    margin-bottom: 5px;
    text-shadow: 0 0 5px #000;
}

#canvas-wrap {
    width: 95%;
    max-width: 600px;
    flex-grow: 1; /* 残りのスペースをキャンバスに */
    border: 1px solid var(--kin);
    border-radius: 8px;
    background: rgba(0,0,0,0.5);
    margin-bottom: 10px;
}
canvas { width: 100%; height: 100%; }

/* HUD・ボタン類 */
#top-hud { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 100; }
.hp-bar { width: 120px; height: 10px; background: #222; border: 1px solid var(--kin); }

.button-row { display: flex; gap: 10px; margin-bottom: 10px; }
.el-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #777; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.btn-clear { height: 40px; padding: 0 15px; background: #333; color: var(--kin); border: 1px solid var(--kin); border-radius: 5px; }
.btn-attack { width: 90%; max-width: 500px; padding: 15px; background: linear-gradient(to bottom, var(--kin), #8a6d3b); color: #000; font-weight: bold; font-size: 20px; border-radius: 40px; border: none; }

#enemy-cast-wrap { position: absolute; top: 40px; left: 15px; width: 120px; height: 5px; background: #111; border: 1px solid #f00; }
</style>
</head>
<body>

<div id="battle-screen">
    <div id="top-hud">
        <div class="hp-bar"><div id="hp-fill-enemy" style="width:100%; height:100%; background:var(--shu);"></div></div>
        <div id="battle-msg" style="font-size:12px;">対峙中...</div>
        <div class="hp-bar"><div id="hp-fill-player" style="width:100%; height:100%; background:var(--ai);"></div></div>
    </div>
    <div id="enemy-cast-wrap"><div id="enemy-cast-fill" style="width:0%; height:100%; background:#f00;"></div></div>

    <div id="enemy-side"><img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite"></div>
    <div id="player-side"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite"></div>
</div>

<div id="input-area">
    <div id="mondai-bun">---</div>
    <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    <div class="button-row">
        <div class="el-btn" style="background:#ff4500">火</div>
        <div class="el-btn" style="background:#00bfff">水</div>
        <div class="el-btn" style="background:#ffd700">雷</div>
        <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
    </div>
    <button class="btn-attack" id="attack-btn">漢術発動！</button>
</div>

<script>
// ロジック、認識処理、撃破処理などはそのまま。
// レイアウトが分かれたことで、canvasのリサイズ処理(setup)がより重要になります。
</script>
</body>
</html>
