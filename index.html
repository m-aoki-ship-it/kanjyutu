<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 440字完全踏破 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; --glass: rgba(10, 5, 0, 0.85);
    --hi: #ff4500; --mizu: #00bfff; --kaminari: #ffd700;
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 背景レイヤー */
#bg-layer { position: fixed; inset: 0; background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center; background-size: cover; z-index: 1; }
#effect-layer { position: fixed; inset: 0; pointer-events: none; z-index: 5; transition: 0.2s; opacity: 0; }

/* ゲームステージ全体 */
#game-stage { position: relative; z-index: 10; width: 100vw; height: 100dvh; overflow: hidden; }

/* 敵とプレイヤーの配置（iPadの比率に合わせて調整） */
#enemy-side { position: absolute; left: 5%; top: 20%; width: 45%; pointer-events: none; }
#player-side { position: absolute; right: 0%; top: 20%; width: 40%; pointer-events: none; text-align: right; }
#enemy-sprite, #player-sprite { width: 100%; height: auto; transition: 1s; }
.vanish { opacity: 0; transform: scale(1.5) rotate(10deg); }

/* 敵の攻撃ゲージ */
#enemy-cast-wrap { width: 200px; height: 8px; background: #222; border: 1px solid #ff4444; border-radius: 4px; margin-bottom: 10px; }
#enemy-cast-fill { height: 100%; width: 0%; background: #ff0000; box-shadow: 0 0 10px #ff0000; transition: width 0.1s linear; }

/* HUD情報 */
#top-hud { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px 40px; z-index: 100; pointer-events: none;}
.hp-bar-outer { width: 250px; height: 16px; background: rgba(0,0,0,0.6); border: 1px solid var(--kin); border-radius: 4px; overflow: hidden; }
#hp-fill-enemy { height: 100%; background: var(--shu); width: 100%; transition: 0.3s; }
#hp-fill-player { height: 100%; background: var(--ai); width: 100%; transition: 0.3s; }

/* ★重要：書き込みエリアを拡大 */
#canvas-side { 
    position: absolute; 
    bottom: 170px; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 85vw; 
    max-width: 800px; 
    z-index: 150; 
}
#canvas-wrap { 
    width: 100%; 
    aspect-ratio: 2 / 1; /* 横長にして書きやすく */
    background: rgba(0,0,0,0.5); 
    border: 3px solid var(--kin); 
    border-radius: 15px; 
    backdrop-filter: blur(4px);
    box-shadow: 0 0 30px rgba(0,0,0,0.9);
}
canvas { width: 100%; height: 100%; cursor: crosshair; }

#mondai-area { text-align: center; margin-bottom: 15px; }
#mondai-bun { font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #000; color: #fff; }
#combo-ui { color: var(--kin); font-weight: bold; font-style: italic; font-size: 24px; height: 30px; text-align: center; }

/* 操作UI */
#bottom-hud { position: absolute; bottom: 0; width: 100%; height: 160px; background: var(--glass); border-top: 3px solid var(--kin); z-index: 200; display: flex; flex-direction: column; align-items: center; padding-top: 15px; }
.button-row { display: flex; gap: 20px; margin-bottom: 15px; }
.el-btn { width: 60px; height: 60px; border-radius: 10px; border: 2px solid #555; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; }
.el-btn.ready { border-color: #fff; box-shadow: 0 0 20px #fff; animation: pulse 0.6s infinite; }
.btn-clear { width: 100px; height: 60px; background: #333; border: 1px solid var(--kin); color: var(--kin); border-radius: 10px; font-weight: bold; font-size: 18px; }
.btn-attack { width: 400px; padding: 15px; background: linear-gradient(to bottom, #444, #111); border: 2px solid var(--kin); color: var(--kin); font-weight: bold; font-size: 24px; border-radius: 8px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
.shake { animation: shake 0.3s; }
.danger { border-color: #ff0000 !important; box-shadow: 0 0 30px #ff0000 !important; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="effect-layer"></div>

<div id="top-hud">
    <div>
        <div class="hp-bar-outer"><div id="hp-fill-enemy"></div></div>
        <span style="font-size: 12px; color: var(--shu);">怨霊の気</span>
    </div>
    <div style="text-align: center;">
        <div id="battle-msg" style="font-size: 18px; font-weight:bold; margin-bottom: 5px;"></div>
        <div id="progress-info" style="font-size: 14px; color: var(--kin);"></div>
    </div>
    <div style="text-align: right;">
        <div class="hp-bar-outer"><div id="hp-fill-player"></div></div>
        <div class="hp-bar-outer" style="height:8px; margin-top:4px; border:none; background:#111;">
            <div id="skill-gauge-fill"></div>
        </div>
        <span style="font-size: 12px; color: var(--ai);">術師の魂 / 霊力</span>
    </div>
</div>

<div id="game-stage">
    <div id="enemy-side">
        <div id="enemy-cast-wrap"><div id="enemy-cast-fill"></div></div>
        <img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite">
    </div>

    <div id="player-side">
        <img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite">
    </div>

    <div id="canvas-side">
        <div id="combo-ui"></div>
        <div id="mondai-area">
            <div id="mondai-bun">精神を集中せよ...</div>
        </div>
        <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    </div>
</div>

<div id="bottom-hud">
    <div class="button-row">
        <div class="el-btn" id="skill-hi" style="background:var(--hi)" onclick="startSkill('hi')">火</div>
        <div class="el-btn" id="skill-mizu" style="background:var(--mizu)" onclick="startSkill('mizu')">水</div>
        <div class="el-btn" id="skill-kaminari" style="background:var(--kaminari)" onclick="startSkill('kaminari')">雷</div>
        <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
    </div>
    <button class="btn-attack" id="attack-btn">漢術発動！</button>
</div>

<script>
// 1-3年 440字から主要なものを抽出。適宜追加可能。
const KANJI_DATA = [
    {k:'一',y:'いち',b:'___千世界'},{k:'右',y:'みぎ',b:'___腕の力'},{k:'雨',y:'あめ',b:'慈悲の___'},{k:'円',y:'えん',b:'結界の___'},{k:'王',y:'おう',b:'古の___'},{k:'音',y:'おと',b:'魂の___'},{k:'下',y:'した',b:'眼___の敵'},{k:'火',y:'ひ',b:'___を噴く'},
    {k:'花',y:'はな',b:'散る___'},{k:'気',y:'き',b:'殺___を感じる'},{k:'玉',y:'たま',b:'霊___の輝き'},{k:'金',y:'きん',b:'___色の光'},{k:'空',y:'そら',b:'___を翔ける'},{k:'月',y:'つき',b:'___夜の晩'},{k:'見',y:'みる',b:'真実を___'},{k:'左',y:'ひだり',b:'___眼の秘密'},
    {k:'山',y:'やま',b:'不動の___'},{k:'四',y:'し',b:'___神の門'},{k:'糸',y:'いと',b:'運命の___'},{k:'字',y:'じ',b:'魂の一___'},{k:'耳',y:'みみ',b:'闇の___'},{k:'車',y:'くるま',b:'火___の如く'},{k:'手',y:'て',b:'千___観音'},{k:'十',y:'じゅう',b:'___文字斬り'},
    {k:'森',y:'もり',b:'深淵の___'},{k:'人',y:'ひと',b:'___界の主'},{k:'水',y:'みず',b:'清らかな___'},{k:'生',y:'せい',b:'___死の境目'},{k:'赤',y:'あか',b:'___い月'},{k:'千',y:'せん',b:'___の夜'},{k:'天',y:'てん',b:'___の裁き'},{k:'土',y:'つち',b:'___に還る'},
    {k:'白',y:'しろ',b:'___銀の世界'},{k:'名',y:'な',b:'真の___'},{k:'目',y:'め',b:'心の___'},{k:'力',y:'ちから',b:'未知の___'},{k:'風',y:'かぜ',b:'神風の___'},{k:'海',y:'うみ',b:'蒼き___'},{k:'岩',y:'いわ',b:'___山を砕く'},{k:'強',y:'つよい',b:'___敵来たる'},
    {k:'鉄',y:'てつ',b:'___の意志'},{k:'守',y:'まもる',b:'命を___'},{k:'壁',y:'かべ',b:'鉄___防御'},{k:'悪',y:'あく',b:'___を挫く'},{k:'界',y:'かい',b:'結___の守護'},{k:'神',y:'かみ',b:'荒ぶる___'},{k:'真',y:'しん',b:'___実の姿'},{k:'流',y:'ながれる',b:'血が___'}
];
const MONDAI_DEFENSE = [{ k: '壁', b: '鉄___防御！' }, { k: '守', b: '命を___' }];

let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
let enemyHP = 100, playerHP = 100, skillGauge = 0, combo = 0;
let enemyCast = 0, isDefensePhase = false, isSkillMode = false, skillStep = 0;
let solvedCount = 0, isEnemyDead = false;

const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 14; ctx.strokeStyle = '#fff';
}

function next() {
    if (isEnemyDead) return;
    if (isDefensePhase) {
        currentMondai = MONDAI_DEFENSE[Math.floor(Math.random() * MONDAI_DEFENSE.length)];
        document.getElementById('mondai-bun').innerHTML = `<span style="color:#ff4444">【緊急：防御】「${currentMondai.k}」を記せ！</span>`;
    } else {
        currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
        const step = isSkillMode ? ` (${skillStep+1}/3)` : "";
        document.getElementById('mondai-bun').innerText = currentMondai.b + ` (読み:${currentMondai.y})${step}`;
    }
    document.getElementById('progress-info').innerText = `踏破数: ${solvedCount} / 440字`;
    clearCanvas();
}

// タイマー処理
setInterval(() => {
    if (isDefensePhase || isSkillMode || isEnemyDead || playerHP <= 0) return;
    enemyCast += 0.6;
    if (enemyCast >= 100) triggerDefense();
    document.getElementById('enemy-cast-fill').style.width = enemyCast + "%";
}, 100);

function triggerDefense() {
    isDefensePhase = true;
    document.getElementById('canvas-wrap').classList.add('danger');
    document.getElementById('battle-msg').innerText = "怨霊の強襲！";
    clearCanvas(); // 自動で消去
    next();
}

async function recognizeAndAttack() {
    if (inkData.length === 0 || isEnemyDead) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true;

    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] })
        });
        const data = await res.json();
        const candidates = data[1][0][1];
        const isCorrect = candidates.some(c => c === currentMondai.k);

        if (isCorrect) {
            if (isDefensePhase) {
                isDefensePhase = false; enemyCast = 0;
                document.getElementById('canvas-wrap').classList.remove('danger');
                showFlashEffect("#fff");
                document.getElementById('battle-msg').innerText = "防ぎきった！";
                next();
            } else if (isSkillMode) {
                skillStep++;
                if (skillStep >= 3) { solvedCount += 3; finishSkill(true); } else next();
            } else {
                combo++; solvedCount++;
                damageEnemy(15 + combo * 2);
                updateSkillGauge(20);
                next();
            }
        } else {
            if (isDefensePhase) {
                playerTakeDamage(30); isDefensePhase = false; enemyCast = 0;
                document.getElementById('canvas-wrap').classList.remove('danger');
                document.getElementById('battle-msg').innerText = "防御失敗！";
                next();
            } else {
                combo = 0; 
                document.getElementById('battle-msg').innerText = `不発！(正解は「${currentMondai.k}」)`;
                clearCanvas();
            }
        }
    } catch(e) { console.error(e); }
    btn.disabled = false;
    document.getElementById('combo-ui').innerText = (combo > 0 && !isSkillMode) ? combo + " Combo!" : "";
}

function damageEnemy(val) {
    enemyHP = Math.max(0, enemyHP - val);
    document.getElementById('hp-fill-enemy').style.width = enemyHP + "%";
    document.getElementById('enemy-side').classList.add('shake');
    setTimeout(() => {
        document.getElementById('enemy-side').classList.remove('shake');
        if (enemyHP <= 0) purgeEnemy();
    }, 400);
}

function purgeEnemy() {
    isEnemyDead = true; isDefensePhase = false; enemyCast = 0;
    document.getElementById('enemy-cast-fill').style.width = "0%";
    document.getElementById('canvas-wrap').classList.remove('danger');
    document.getElementById('battle-msg').innerText = "怨霊を浄化した！";
    document.getElementById('enemy-sprite').classList.add('vanish');
    document.getElementById('mondai-bun').innerText = "新たな怨霊を待機中...";
    setTimeout(() => {
        enemyHP = 100; isEnemyDead = false;
        document.getElementById('hp-fill-enemy').style.width = "100%";
        document.getElementById('enemy-sprite').classList.remove('vanish');
        document.getElementById('battle-msg').innerText = "強大な気配を感じる！";
        next();
    }, 2500);
}

function playerTakeDamage(val) {
    playerHP = Math.max(0, playerHP - val);
    document.getElementById('hp-fill-player').style.width = playerHP + "%";
    document.getElementById('player-side').classList.add('shake');
    combo = 0;
    setTimeout(() => {
        document.getElementById('player-side').classList.remove('shake');
        if (playerHP <= 0) { alert("敗北..."); location.reload(); }
    }, 400);
}

function updateSkillGauge(v) {
    skillGauge = Math.min(100, skillGauge + v);
    document.getElementById('skill-gauge-fill').style.width = skillGauge + "%";
    if (skillGauge >= 100) {
        document.querySelectorAll('.el-btn').forEach(b => b.classList.add('ready'));
        document.getElementById('battle-msg').innerText = "奥義、発動可能！";
    }
}

function startSkill(type) {
    if (skillGauge < 100 || isSkillMode || isDefensePhase || isEnemyDead) return;
    isSkillMode = true; skillStep = 0;
    document.querySelectorAll('.el-btn').forEach(b => b.classList.remove('ready'));
    document.getElementById('effect-layer').style.background = `var(--${type})`;
    document.getElementById('effect-layer').style.opacity = "0.4";
    next();
}

function finishSkill(success) {
    isSkillMode = false;
    document.getElementById('effect-layer').style.opacity = "0";
    if (success) { showFlashEffect("#ff0"); damageEnemy(60); skillGauge = 0; }
    else { skillGauge = 30; }
    updateSkillGauge(0);
    if (!isEnemyDead) next();
}

function showFlashEffect(color) {
    const el = document.getElementById('effect-layer');
    el.style.background = color; el.style.opacity = "0.8";
    setTimeout(() => el.style.opacity = "0", 250);
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }
const getPos = (e) => { 
    const r = canvas.getBoundingClientRect(); 
    const x = (e.touches?.[0].clientX || e.clientX) - r.left;
    const y = (e.touches?.[0].clientY || e.clientY) - r.top;
    return { x: x * (canvas.width / r.width), y: y * (canvas.height / r.height) };
};
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); isDrawing = true; currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('touchmove', e => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0); });
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });
document.getElementById('attack-btn').addEventListener('click', recognizeAndAttack);

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
