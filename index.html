<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 決定版 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa;
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 全画面背景（巻物テクスチャ） */
#game-world {
    position: fixed; inset: 0;
    background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center;
    background-size: cover;
    z-index: 1;
}

/* 演出レイヤー：キャラを最前面に（でも操作は邪魔しない） */
#visual-layer {
    position: absolute; inset: 0;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 5% 150px 5%; /* 下部ボタン類と被らないように */
    z-index: 10; pointer-events: none;
}
#enemy-sprite, #player-sprite { width: 45%; max-height: 70vh; object-fit: contain; }

/* 入力・操作レイヤー：画面全体をキャンバスにするが、枠は下半分に薄く出す */
#touch-layer {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    padding-bottom: 20px;
}

#mondai-bun {
    font-size: 32px; font-weight: bold; color: #fff;
    text-shadow: 0 0 10px #000, 0 0 20px var(--kin);
    margin-bottom: 20px; text-align: center;
}

#canvas-wrap {
    width: 90%; max-width: 700px; aspect-ratio: 2 / 1;
    border: 2px solid rgba(212, 175, 55, 0.3); border-radius: 15px;
    background: rgba(0, 0, 0, 0.15); backdrop-filter: blur(1px);
    position: relative; margin-bottom: 20px;
}
canvas { width: 100%; height: 100%; }

/* HUD（HPなど） */
#top-hud { position: absolute; top: 20px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; z-index: 200; }
.hp-bar { width: 180px; height: 12px; border: 1px solid var(--kin); background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; }

/* 下部操作パネル */
#bottom-hud { width: 100%; display: flex; flex-direction: column; align-items: center; }
.button-row { display: flex; gap: 15px; margin-bottom: 15px; }
.el-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
.btn-clear { height: 50px; padding: 0 20px; background: #222; color: var(--kin); border: 1px solid var(--kin); border-radius: 10px; font-weight: bold; }
.btn-attack { width: 90%; max-width: 500px; padding: 18px; background: linear-gradient(to bottom, #fceabb, #f8b500); color: #000; font-weight: bold; font-size: 24px; border-radius: 50px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

/* アニメーション */
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
.danger { border-color: #ff0000 !important; box-shadow: 0 0 30px #f00; }
.vanish { opacity: 0; transform: scale(1.5); transition: 1s; }
</style>
</head>
<body>

<div id="game-world"></div>

<div id="top-hud">
    <div class="hp-bar"><div id="hp-enemy" style="width:100%; height:100%; background:var(--shu); transition:0.3s;"></div></div>
    <div id="battle-msg" style="font-weight:bold; text-shadow:2px 2px 4px #000;">怨霊を浄化せよ</div>
    <div class="hp-bar"><div id="hp-player" style="width:100%; height:100%; background:var(--ai); transition:0.3s;"></div></div>
</div>

<div id="visual-layer">
    <div id="enemy-wrap" style="width:45%;"><img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite"></div>
    <div id="player-wrap" style="width:45%; text-align:right;"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite"></div>
</div>

<div id="touch-layer">
    <div id="mondai-bun">---</div>
    <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    
    <div id="bottom-hud">
        <div class="button-row">
            <div class="el-btn" style="background:#ff4500">火</div>
            <div class="el-btn" style="background:#00bfff">水</div>
            <div class="el-btn" style="background:#ffd700">雷</div>
            <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
        </div>
        <button class="btn-attack" id="attack-btn">漢術発動！</button>
    </div>
</div>

<script>
// --- 基本設定 ---
const KANJI_DATA = [
    {k:'一',y:'いち',b:'___の太刀'},{k:'右',y:'みぎ',b:'___腕の力'},{k:'雨',y:'あめ',b:'慈悲の___'},{k:'円',y:'えん',b:'結界の___'},
    {k:'火',y:'ひ',b:'___を噴く'},{k:'空',y:'そら',b:'___を翔ける'},{k:'金',y:'きん',b:'___色の光'},{k:'心',y:'こころ',b:'___に刻む'}
];
const MONDAI_DEFENSE = {k:'壁', b:'【強襲】鉄___防御！'};

let enemyHP = 100, playerHP = 100, enemyCast = 0;
let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
let isDefensePhase = false, isEnemyDead = false;

const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    if (isEnemyDead) return;
    if (isDefensePhase) {
        currentMondai = MONDAI_DEFENSE;
        document.getElementById('mondai-bun').innerHTML = `<span style="color:#ff4444">${currentMondai.b}</span>`;
    } else {
        currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
        document.getElementById('mondai-bun').innerText = currentMondai.b + ` (読み:${currentMondai.y})`;
    }
    clearCanvas();
}

// --- 怨霊の強襲ロジック ---
setInterval(() => {
    if (isDefensePhase || isEnemyDead || playerHP <= 0) return;
    enemyCast += 0.8;
    if (enemyCast >= 100) {
        isDefensePhase = true;
        enemyCast = 0;
        document.getElementById('canvas-wrap').classList.add('danger');
        document.getElementById('battle-msg').innerText = "怨霊の強襲！";
        clearCanvas(); // ★自動で墨を消去
        next();
    }
}, 100);

async function recognizeAndAttack() {
    if (inkData.length === 0 || isEnemyDead) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true; btn.innerText = "詠唱中...";

    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] })
        });
        const data = await res.json();
        const candidates = data[1][0][1];
        const isCorrect = candidates.some(c => c === currentMondai.k);

        if (isCorrect) {
            if (isDefensePhase) {
                isDefensePhase = false;
                document.getElementById('canvas-wrap').classList.remove('danger');
                document.getElementById('battle-msg').innerText = "防御成功！";
            } else {
                damageEnemy(25);
                document.getElementById('battle-msg').innerText = "漢術命中！";
            }
            next();
        } else {
            if (isDefensePhase) {
                playerTakeDamage(30);
                isDefensePhase = false;
                document.getElementById('canvas-wrap').classList.remove('danger');
                next();
            } else {
                document.getElementById('battle-msg').innerText = "不発！";
                clearCanvas();
            }
        }
    } catch(e) { console.error(e); }
    btn.disabled = false; btn.innerText = "漢術発動！";
}

function damageEnemy(val) {
    enemyHP = Math.max(0, enemyHP - val);
    document.getElementById('hp-enemy').style.width = enemyHP + "%";
    document.getElementById('enemy-wrap').classList.add('shake');
    setTimeout(() => {
        document.getElementById('enemy-wrap').classList.remove('shake');
        if (enemyHP <= 0) purge();
    }, 400);
}

function playerTakeDamage(val) {
    playerHP = Math.max(0, playerHP - val);
    document.getElementById('hp-player').style.width = playerHP + "%";
    document.getElementById('player-wrap').classList.add('shake');
    setTimeout(() => document.getElementById('player-wrap').classList.remove('shake'), 400);
}

function purge() {
    isEnemyDead = true;
    document.getElementById('enemy-sprite').classList.add('vanish');
    document.getElementById('battle-msg').innerText = "浄化完了！";
    setTimeout(() => {
        enemyHP = 100; isEnemyDead = false;
        document.getElementById('hp-enemy').style.width = "100%";
        document.getElementById('enemy-sprite').classList.remove('vanish');
        next();
    }, 2000);
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

// --- 描画イベント ---
const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - r.left, y: p.clientY - r.top };
};
canvas.addEventListener('touchstart', e => {
    e.preventDefault(); const p = getPos(e); isDrawing = true;
    currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('touchmove', e => {
    if(!isDrawing) return; const p = getPos(e);
    ctx.lineTo(p.x, p.y); ctx.stroke();
    currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0);
});
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });

document.getElementById('attack-btn').addEventListener('click', recognizeAndAttack);
window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
