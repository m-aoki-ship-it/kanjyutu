<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢術師 - 最終安定版 -</title>
<style>
:root { --sumi: #0d0b08; --kin: #c9a84c; --shu: #c0392b; --washi: #f2ead8; }
html, body { overflow: hidden; height: 100%; position: fixed; width: 100%; background: var(--sumi); color: var(--washi); font-family: sans-serif; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
#app { display: flex; flex-direction: column; height: 100dvh; padding: 10px; gap: 5px; }
#enemy-area { height: 60px; padding: 8px; background: rgba(192,57,43,0.2); border: 1px solid var(--shu); border-radius: 4px; flex-shrink: 0; }
#hp-bar-bg { width: 100%; height: 6px; background: #333; margin-top: 4px; }
#hp-bar { height: 100%; width: 100%; background: var(--shu); transition: width 0.3s; }
#mondai-area { height: 70px; text-align:center; display: flex; flex-direction: column; justify-content: center; flex-shrink: 0; }
#canvas-container { position: relative; flex: 1; min-height: 0; background: rgba(255,255,255,0.05); border: 1px solid var(--kin); border-radius: 8px; }
#draw-canvas { width: 100%; height: 100%; display: block; }
#hint-display { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 180px; color: rgba(255, 255, 255, 0.05); pointer-events: none; z-index: 1; }
#button-area { height: 60px; display: flex; gap: 8px; flex-shrink: 0; margin-top: 5px; }
.action-btn { flex: 1; font-size: 16px; background: #1a1610; color: var(--kin); border: 1px solid var(--kin); font-weight: bold; border-radius: 4px; }
#attack-btn { background: var(--shu); color: white; border-color: #e74c3c; flex: 2; }
#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; font-weight: bold; color: var(--kin); }
</style>
</head>
<body>
<div id="loading">鑑定中...</div>
<div id="app">
  <div id="enemy-area">
    <div style="font-size: 12px;">強敵：誤字の魔物</div>
    <div id="hp-bar-bg"><div id="hp-bar"></div></div>
  </div>
  <div id="mondai-area">
    <div id="mondai-bun" style="font-size: 18px; font-weight: bold;"></div>
    <div id="mondai-yomi" style="color: var(--kin); font-size: 14px;"></div>
  </div>
  <div id="canvas-container">
    <div id="hint-display"></div>
    <canvas id="draw-canvas"></canvas>
  </div>
  <div id="button-area">
    <button class="action-btn" onclick="clearCanvas()">拭く</button>
    <button class="action-btn" onclick="showHint()">助言</button>
    <button class="action-btn" id="attack-btn" onclick="recognizeAndAttack()">奥義発動！</button>
  </div>
</div>

<script>
const MONDAI_LIST = [
  { kanji:'悪', yomi:'わるい', bun:'___いことをして謝る' },
  { kanji:'医', yomi:'い', bun:'___者に診てもらう' },
  { kanji:'運', yomi:'はこぶ', bun:'荷物を___ぶ' },
  { kanji:'漢', yomi:'かん', bun:'___字の練習' },
  { kanji:'進', yomi:'すすむ', bun:'前へ___む' },
  { kanji:'鉄', yomi:'てつ', bun:'___棒で遊ぶ' },
  { kanji:'曜', yomi:'よう', bun:'日曜日の___' }
];

let currentMondai = {};
let inkData = [];
let currentStroke = [];
let isDrawing = false;
let enemyHp = 100;

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const hintDisplay = document.getElementById('hint-display');

function setup() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 8;
  ctx.strokeStyle = '#ffffff';
}

function next() {
  currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
  document.getElementById('mondai-bun').innerText = currentMondai.bun;
  document.getElementById('mondai-yomi').innerText = `読み：${currentMondai.yomi}`;
  hintDisplay.innerText = currentMondai.kanji;
  hintDisplay.style.opacity = 0;
  clearCanvas();
}

function showHint() {
  hintDisplay.style.opacity = 1;
  setTimeout(() => hintDisplay.style.opacity = 0, 800);
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  inkData = [];
}

function startDrawing(x, y) {
  isDrawing = true;
  currentStroke = [[x], [y], [0]];
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function moveDrawing(x, y) {
  if (!isDrawing) return;
  ctx.lineTo(x, y);
  ctx.stroke();
  currentStroke[0].push(x);
  currentStroke[1].push(y);
  currentStroke[2].push(0);
}

function stopDrawing() {
  if (isDrawing) inkData.push(currentStroke);
  isDrawing = false;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  startDrawing(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  moveDrawing(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
}, {passive: false});
window.addEventListener('touchend', stopDrawing);

async function recognizeAndAttack() {
  if (inkData.length === 0) return;
  const loader = document.getElementById('loading');
  loader.style.display = 'flex';
  
  // URLを変更し、JSONP的な挙動を避けて単純なPOSTを試行
  const url = `https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`;
  
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        app_version: 0.4,
        api_level: "537.36",
        device: window.navigator.userAgent,
        input_type: 0,
        requests: [{
          ink: inkData,
          language: "ja",
          writing_guide: { writing_area_width: canvas.width, writing_area_height: canvas.height }
        }]
      })
    });
    
    if (!res.ok) throw new Error(`HTTPエラー: ${res.status}`);
    
    const data = await res.json();
    const result = data[1][0][1];

    if (result && result.slice(0, 5).includes(currentMondai.kanji)) {
      enemyHp -= 34;
      document.getElementById('hp-bar').style.width = Math.max(0, enemyHp) + '%';
      if (enemyHp <= 0) {
        alert("討伐完了！");
        enemyHp = 100;
        document.getElementById('hp-bar').style.width = '100%';
      }
      next();
    } else {
      alert(`鑑定失敗：${result ? result[0] : "読解不能"}\n正解は「${currentMondai.kanji}」です`);
      clearCanvas();
    }
  } catch(e) {
    alert("【通信エラー】\nGitHub Pagesの制限でGoogleに接続できませんでした。\nローカル（自分のPC内）で実行するか、ブラウザのセキュリティ設定を確認してください。\nエラー詳細: " + e.message);
  }
  loader.style.display = 'none';
}

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
