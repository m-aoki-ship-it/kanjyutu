<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 怨霊決戦 -</title>
<style>
:root { --sumi: #0a0a0a; --kin: #c9a063; --shu: #8e2a2a; --ai: #3a82f6; --glass: rgba(0,0,0,0.7); }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 背景 */
#bg-layer { position: fixed; inset: 0; background: url('IMG_7089.png') no-repeat center center; background-size: cover; filter: brightness(0.25); z-index: 1; }

/* メインレイアウト */
#game-stage {
    position: relative; z-index: 10; width: 100vw; height: 100dvh;
    display: grid; grid-template-columns: 35% 30% 35%; grid-template-rows: 60px 1fr 100px; padding: 5px;
}

/* 敵エリア：ここを大幅修正 */
#enemy-side { 
    grid-column: 1; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    position: relative;
    padding: 10px;
}
#enemy-sprite { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; /* 画像を枠内に収めて全体を見せる */
    transform: scaleX(-1); /* プレイヤー向きに反転 */
    filter: drop-shadow(0 0 15px rgba(255,0,0,0.5));
}

/* 書道キャンバス */
#canvas-side { grid-column: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
#canvas-wrap { 
    width: 240px; height: 240px; background: rgba(0,0,0,0.4); 
    border: 3px solid var(--kin); border-radius: 10px; position: relative;
}
canvas { width: 100%; height: 100%; }

/* プレイヤー：右端に配置 */
#player-side { grid-column: 3; display: flex; align-items: flex-end; justify-content: flex-end; overflow: hidden; }
#player-chara { width: 140%; transform: translate(10%, 10%); }
#player-chara img { width: 100%; height: auto; }

/* 下部UI */
#bottom-hud { grid-column: 1 / 4; background: var(--glass); border-top: 2px solid var(--kin); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.btn-group { display: flex; gap: 30px; }
.btn { padding: 12px 30px; border-radius: 8px; font-weight: bold; border: 1px solid #fff; color: #fff; cursor: pointer; }
.btn-clear { background: #333; border-color: var(--kin); color: var(--kin); }
.btn-attack { background: linear-gradient(to bottom, var(--ai), #003366); box-shadow: 0 0 15px var(--ai); }

/* アニメーション */
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
</style>
</head>
<body>

<div id="bg-layer"></div>

<div id="game-stage">
    <div style="grid-column: 1/4; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
        <div><span style="font-size: 10px; color: var(--shu);">怨霊 HP</span><div style="width:120px; height:8px; background:#222; border:1px solid #555;"><div id="hp-fill" style="height:100%; background:var(--shu); width:100%;"></div></div></div>
        <div style="font-size: 20px; color: var(--kin); font-weight: bold;">02:18</div>
        <div style="text-align: right;"><span style="font-size: 10px; color: var(--ai);">術師 HP</span><div style="width:120px; height:8px; background:#222; border:1px solid #555;"><div style="height:100%; background:var(--ai); width:90%;"></div></div></div>
    </div>

    <div id="enemy-side">
        <img id="enemy-sprite" src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" alt="怨霊">
    </div>

    <div id="canvas-side">
        <div id="canvas-wrap">
            <canvas id="draw-canvas"></canvas>
            <div id="hint" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:160px; color:rgba(255,255,255,0.03); pointer-events:none;"></div>
        </div>
        <div id="mondai-bun" style="margin-top: 10px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;">---</div>
    </div>

    <div id="player-side">
        <div id="player-chara"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png"></div>
    </div>

    <div id="bottom-hud">
        <div id="mondai-yomi" style="font-size: 18px; font-weight: bold; color: var(--kin);">読み：---</div>
        <div class="btn-group">
            <button class="btn btn-clear" onclick="clearCanvas()">墨を拭く</button>
            <button class="btn btn-attack" onclick="recognizeAndAttack()">漢術発動！</button>
        </div>
    </div>
</div>

<script>
const MONDAI_LIST = [
    { kanji: '悪', yomi: 'わるい', bun: '___いことをする' },
    { kanji: '曜', yomi: 'よう', bun: '日曜日の___' }
];

let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false, enemyHp = 100;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
    document.getElementById('mondai-bun').innerText = currentMondai.bun;
    document.getElementById('mondai-yomi').innerText = '読み：' + currentMondai.yomi;
    document.getElementById('hint').innerText = currentMondai.kanji;
    clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function start(x, y) { isDrawing = true; currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); }
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
window.addEventListener('touchend', end);

async function recognizeAndAttack() {
    if (inkData.length === 0) return;
    try {
        const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] }) 
        });
        const data = await res.json();
        const result = data[1][0][1][0];
        
        if (result === currentMondai.kanji) {
            document.getElementById('enemy-side').classList.add('shake');
            enemyHp -= 34;
            document.getElementById('hp-fill').style.width = Math.max(0, enemyHp) + '%';
            setTimeout(() => {
                document.getElementById('enemy-side').classList.remove('shake');
                if (enemyHp <= 0) { alert("浄化成功！"); enemyHp = 100; document.getElementById('hp-fill').style.width = '100%'; }
                next();
            }, 400);
        } else {
            alert(`正解は「${currentMondai.kanji}」`);
            clearCanvas();
        }
    } catch(e) { console.error(e); }
}

window.onload = () => { setup(); next(); };
</script>
</body>
</html>
