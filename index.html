<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢術師 - 覚醒 - (Google認識エンジン搭載)</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --sumi: #0d0b08; --sumi2: #1a1610; --washi: #f2ead8; --kin: #c9a84c;
  --kin-dim: rgba(201,168,76,0.15); --shu: #c0392b; --shu-bright: #e74c3c;
  --shu-dim: rgba(192,57,43,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background: var(--sumi); font-family: 'Noto Sans JP', sans-serif; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; color: var(--washi); }

/* アニメーション */
.ougi-shake { animation: ougiShake 0.5s infinite; }
@keyframes ougiShake { 0% { transform: translate(0,0); } 25% { transform: translate(-8px, 4px); } 75% { transform: translate(8px, -4px); } }
.sumi-splash { position: fixed; width: 30px; height: 30px; background: var(--sumi); border-radius: 50%; pointer-events: none; z-index: 1000; filter: blur(2px); animation: splashAnim 0.8s ease-out forwards; }
@keyframes splashAnim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(5) translate(var(--tx), var(--ty)); opacity: 0; } }
.flash-white { position: fixed; inset: 0; background: white; z-index: 999; pointer-events: none; animation: flashAnim 0.4s ease-out forwards; }
@keyframes flashAnim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

#app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100dvh; padding: 12px; gap: 8px; }
#enemy-area { display: flex; align-items: center; gap: 10px; padding: 15px; background: var(--shu-dim); border: 1px solid var(--shu); border-radius: 4px; }
#hp-bar-bg { flex: 1; height: 10px; background: #333; position: relative; }
#hp-bar { height: 100%; width: 100%; background: var(--shu-bright); transition: width 0.3s; }

#canvas-container { position: relative; width: 100%; height: 320px; background: rgba(255,255,255,0.05); border: 2px solid var(--kin-dim); }
#draw-canvas { width: 100%; height: 100%; touch-action: none; position: relative; z-index: 2; }
#hint-display { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 220px; color: rgba(255, 255, 255, 0.08); font-family: 'Shippori Mincho B1', serif; pointer-events: none; z-index: 1; transition: opacity 0.3s; }

.action-btn { padding: 15px; font-size: 18px; cursor: pointer; border: 1px solid var(--kin); background: var(--sumi2); color: var(--kin); font-weight: bold; border-radius: 4px; }
#attack-btn { background: var(--shu); color: white; border-color: var(--shu-bright); flex: 1; }
#loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; color: var(--kin); }
</style>
</head>
<body>

<div id="loading-overlay">鑑定中...</div>
<audio id="se-draw" src="文字入れ.mp3" preload="auto"></audio>
<audio id="se-attack" src="攻撃.mp3" preload="auto"></audio>

<div id="app">
  <div id="enemy-area">
    <div style="flex:1">
      <div id="enemy-name">強敵：誤字の魔物</div>
      <div id="hp-bar-bg"><div id="hp-bar"></div></div>
    </div>
    <div id="enemy-char" style="font-size: 50px;">怨</div>
  </div>

  <div id="mondai-area" style="text-align:center; padding: 10px;">
    <div id="mondai-bun" style="font-size: 24px; margin-bottom: 5px; font-weight: bold;"></div>
    <div id="mondai-yomi" style="color: var(--kin); font-size: 18px;"></div>
  </div>

  <div id="canvas-container">
    <div id="hint-display"></div>
    <canvas id="draw-canvas"></canvas>
  </div>

  <div style="display:flex; gap:8px;">
    <button class="action-btn" onclick="clearCanvas()">墨を拭く</button>
    <button class="action-btn" onclick="showHint()">助言</button>
    <button class="action-btn" id="attack-btn" onclick="recognizeAndAttack()">奥義発動！</button>
  </div>
</div>

<script>
// 問題リスト（小3・200字から一部抜粋、実際には全リストを入れて運用可能）
const MONDAI_LIST = [
  { kanji:'悪', yomi:'あく/わるい', bun:'___いことをして謝る' },
  { kanji:'医', yomi:'い', bun:'___者に診てもらう' },
  { kanji:'運', yomi:'うん/はこぶ', bun:'重い荷物を___ぶ' },
  { kanji:'漢', yomi:'かん', bun:'___字の練習をする' },
  { kanji:'進', yomi:'しん/すすむ', bun:'前へ___む' },
  { kanji:'鉄', yomi:'てつ', bun:'___棒で遊ぶ' },
  { kanji:'薬', yomi:'やく/くすり', bun:'目___をさす' },
  { kanji:'曜', yomi:'よう', bun:'何曜日の___？' }
  // ... (前回のリストをここに統合してください)
];

let currentMondai = {};
let inkData = []; // Google認識用データ
let currentStroke = [];
let isDrawing = false;
let enemyHp = 100;

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const seDraw = document.getElementById('se-draw');
const seAttack = document.getElementById('se-attack');
const hintDisplay = document.getElementById('hint-display');
const loader = document.getElementById('loading-overlay');

function setupCanvas() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 9;
  ctx.strokeStyle = '#ffffff';
}

function nextQuestion() {
  const nextIndex = Math.floor(Math.random() * MONDAI_LIST.length);
  currentMondai = MONDAI_LIST[nextIndex];
  document.getElementById('mondai-bun').innerText = currentMondai.bun;
  document.getElementById('mondai-yomi').innerText = `読み：${currentMondai.yomi}`;
  hintDisplay.innerText = currentMondai.kanji;
  hintDisplay.style.opacity = 0;
  clearCanvas();
}

function showHint() {
  hintDisplay.style.opacity = 1;
  setTimeout(() => hintDisplay.style.opacity = 0, 1200);
}

function playSE(audioElement) {
  audioElement.pause();
  audioElement.currentTime = 0;
  audioElement.play().catch(e => {});
}

// キャンバス操作
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', end);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e.touches[0]); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
canvas.addEventListener('touchend', end);

function start(e) {
  isDrawing = true;
  currentStroke = [[], [], []]; // x, y, t
  playSE(seDraw);
  draw(e);
}

function draw(e) {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  const x = Math.round(e.clientX - rect.left);
  const y = Math.round(e.clientY - rect.top);
  const t = Date.now();

  currentStroke[0].push(x);
  currentStroke[1].push(y);
  currentStroke[2].push(t);

  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  const lastX = currentStroke[0][currentStroke[0].length-2];
  const lastY = currentStroke[1][currentStroke[1].length-2];
  if(lastX) {
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
  }
}

function end() {
  if(isDrawing) inkData.push(currentStroke);
  isDrawing = false;
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  inkData = [];
}

// Google認識APIへのリクエスト
async function recognizeAndAttack() {
  if (inkData.length === 0) return;
  
  loader.style.display = 'flex';
  
  const requestData = {
    options: "enable_pre_space",
    requests: [{
      writing_guide: { writing_area_width: canvas.width, writing_area_height: canvas.height },
      ink: inkData,
      language: "ja"
    }]
  };

  try {
    const response = await fetch('https://www.google.com.tw/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8', {
      method: 'POST',
      body: JSON.stringify(requestData),
      headers: { "Content-Type": "application/json" }
    });
    
    const result = await response.json();
    const candidates = result[1][0][1]; // 認識された文字候補の配列

    // 候補のトップ3に正解の漢字が含まれているかチェック
    if (candidates.slice(0, 3).includes(currentMondai.kanji)) {
      executeOugi();
    } else {
      alert(`残念！判定は「${candidates[0]}」でした。もっと丁寧に書いてみよう！`);
      clearCanvas();
    }
  } catch (err) {
    alert("通信エラーが発生しました。");
  } finally {
    loader.style.display = 'none';
  }
}

function executeOugi() {
  playSE(seAttack);
  document.getElementById('app').classList.add('ougi-shake');
  const flash = document.createElement('div');
  flash.className = 'flash-white';
  document.body.appendChild(flash);
  
  for (let i = 0; i < 20; i++) {
    const splash = document.createElement('div');
    splash.className = 'sumi-splash';
    splash.style.left = '50%'; splash.style.top = '50%';
    splash.style.setProperty('--tx', (Math.random() - 0.5) * 600 + 'px');
    splash.style.setProperty('--ty', (Math.random() - 0.5) * 600 + 'px');
    document.body.appendChild(splash);
    setTimeout(() => splash.remove(), 800);
  }

  enemyHp -= 34;
  if(enemyHp < 0) enemyHp = 0;
  document.getElementById('hp-bar').style.width = enemyHp + '%';
  document.getElementById('enemy-char').style.transform = 'scale(1.5) rotate(20deg)';
  document.getElementById('enemy-char').style.filter = 'brightness(5)';
  
  setTimeout(() => {
    document.getElementById('app').classList.remove('ougi-shake');
    document.getElementById('enemy-char').style.transform = 'scale(1) rotate(0deg)';
    document.getElementById('enemy-char').style.filter = 'none';
    flash.remove();
    if(enemyHp <= 0) {
      alert("見事！魔物を浄化した！");
      enemyHp = 100;
      document.getElementById('hp-bar').style.width = '100%';
    }
    nextQuestion();
  }, 600);
}

window.onload = () => {
  setupCanvas();
  nextQuestion();
};
</script>
</body>
</html>
