<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 ～怨霊討伐録～</title>
<style>
:root { --kin: #d4af37; --kin2: #f0d070; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }

html, body {
  overflow: hidden; height: 100%; width: 100%;
  background: #000; color: #fff;
  font-family: 'Hiragino Mincho ProN', serif;
}

/* 縦持ちの時に強制的に横向きにするための回転処理 */
@media screen and (orientation: portrait) {
  body {
    width: 100vh; height: 100vw;
    transform: rotate(90deg);
    transform-origin: top left;
    position: absolute; top: 0; left: 100%;
  }
}

#bg { position: fixed; inset: 0; z-index: 0; }
#bg-overlay { 
  position: absolute; inset: 0; 
  background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, #000 100%); 
}

/* --- UIレイアウト --- */
#game-container {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  height: 100vh; width: 100%;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* 上部ステータス */
#header {
  height: 15vh; display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}
.status-block { width: 30%; }
.hp-wrap { height: 12px; background: #200; border: 1px solid var(--kin); border-radius: 6px; overflow: hidden; }
.hp-bar { height: 100%; width: 100%; transition: width 0.3s; }
#hp-e-bar { background: linear-gradient(to right, #822, #f44); }
#hp-p-bar { background: linear-gradient(to right, #228, #4af); }
.hp-label { font-size: 10px; color: var(--kin); display: flex; justify-content: space-between; }

/* メインバトルエリア */
#main-stage {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; gap: 10px;
}
.char-box { flex: 1; display: flex; justify-content: center; align-items: flex-end; height: 100%; }
.char-box img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 15px #000); }

/* 中央：問題とキャンバス */
#interaction-box {
  flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; height: 100%;
}
#question-display {
  background: rgba(0,0,0,0.7); border: 1px solid var(--kin); border-radius: 5px;
  padding: 5px 10px; text-align: center; width: 100%;
}
#mondai-text { font-size: 20px; font-weight: bold; text-shadow: 0 0 5px var(--kin); }

#canvas-wrap {
  height: 45vh; aspect-ratio: 1/1;
  background: rgba(255,255,255,0.1); border: 2px solid var(--kin); border-radius: 10px;
}
canvas { width: 100%; height: 100%; }

/* 下部ボタン */
#footer {
  height: 18vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding-bottom: 5px;
}
.btn-row { display: flex; gap: 20px; }
.sub-btn { 
  padding: 5px 15px; background: #222; border: 1px solid var(--kin); color: var(--kin); 
  border-radius: 4px; font-size: 12px; font-weight: bold;
}
#attack-btn {
  width: 260px; height: 40px; border: none; border-radius: 20px;
  background: linear-gradient(#f0d080, #b08030); color: #210;
  font-size: 18px; font-weight: bold; cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
}

/* アニメーション */
.hit { animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

#overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100;
  display: none; flex-direction: column; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div id="bg"><div id="bg-overlay"></div></div>

<div id="game-container">
  <div id="header">
    <div class="status-block">
      <div class="hp-label"><span>怨霊</span><span id="hp-e-val">120/120</span></div>
      <div class="hp-wrap"><div id="hp-e-bar" class="hp-bar"></div></div>
    </div>
    <div id="center-msg" style="font-size:12px; color:var(--kin)">漢術を綴れ</div>
    <div class="status-block">
      <div class="hp-label"><span>100/100</span><span>漢術師</span></div>
      <div class="hp-wrap"><div id="hp-p-bar" class="hp-bar"></div></div>
    </div>
  </div>

  <div id="main-stage">
    <div class="char-box" id="enemy-side"><img src="Untitled design.png" id="img-e"></div>
    
    <div id="interaction-box">
      <div id="question-display">
        <div id="yomi-text" style="font-size:10px; color:var(--kin2)">よみ：？？？</div>
        <div id="mondai-text">―――</div>
      </div>
      <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    </div>

    <div class="char-box" id="player-side"><img src="Untitled design - 1.png" id="img-p"></div>
  </div>

  <div id="footer">
    <div class="btn-row">
      <button class="sub-btn" onclick="clearCanvas()">墨を拭く</button>
      <button class="sub-btn" id="ougi-btn" disabled>奥義解放</button>
    </div>
    <button id="attack-btn" onclick="recognizeAndAttack()">漢 術 発 動</button>
  </div>
</div>

<div id="overlay">
  <h1 id="res-title" style="color:var(--kin); font-size:40px; margin-bottom:20px;"></h1>
  <button style="padding:10px 30px; font-size:20px;" onclick="location.reload()">再戦</button>
</div>

<script>
const KANJI_DATA = [
  {k:'火',y:'ひ',b:'キャンプの___'}, {k:'水',y:'みず',b:'___をのむ'},
  {k:'木',y:'き',b:'大きな___'}, {k:'漢',y:'かん',b:'___字を練習する'}
];

let state = { eHP:120, eMax:120, pHP:100, q:{}, ink:[], isD:false, over:false };

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');

function initCanvas() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width; canvas.height = r.height;
  ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.strokeStyle = '#fff';
}

function getP(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

canvas.addEventListener('touchstart', (e) => {
  if(state.over) return;
  e.preventDefault(); state.isD = true;
  const p = getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
  state.ink.push([[p.x], [p.y], [0]]);
});

canvas.addEventListener('touchmove', (e) => {
  if(!state.isD) return;
  const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke();
  const s = state.ink[state.ink.length-1];
  s[0].push(p.x); s[1].push(p.y); s[2].push(0);
});

canvas.addEventListener('touchend', () => state.isD = false);

function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); state.ink = []; }

function nextQ() {
  state.q = KANJI_DATA[Math.floor(Math.random()*KANJI_DATA.length)];
  document.getElementById('mondai-text').textContent = state.q.b;
  document.getElementById('yomi-text').textContent = 'よみ：' + state.q.y;
  clearCanvas();
}

async function recognizeAndAttack() {
  if(state.ink.length === 0 || state.over) return;
  const btn = document.getElementById('attack-btn');
  btn.disabled = true;

  try {
    const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ ink: state.ink, language: "ja" }] })
    });
    const data = await res.json();
    const cand = data[1][0][1];

    if(cand.includes(state.q.k)) {
      state.eHP -= 40;
      document.getElementById('img-e').classList.add('hit');
      setTimeout(()=>document.getElementById('img-e').classList.remove('hit'), 300);
    } else {
      document.getElementById('center-msg').textContent = "失敗！正解は「"+state.q.k+"」";
      setTimeout(()=>document.getElementById('center-msg').textContent = "漢術を綴れ", 1500);
    }
  } catch(e) {}

  updateHUD();
  btn.disabled = false;
  if(state.eHP <= 0) endGame(true); else nextQ();
}

function updateHUD() {
  document.getElementById('hp-e-bar').style.width = (state.eHP/state.eMax*100)+'%';
  document.getElementById('hp-p-bar').style.width = state.pHP+'%';
  document.getElementById('hp-e-val').textContent = `${Math.max(0, state.eHP)}/${state.eMax}`;
}

function endGame(win) {
  state.over = true;
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('res-title').textContent = win ? "怨 霊 退 散" : "力 尽 き た";
}

window.onload = () => { initCanvas(); nextQ(); };
window.onresize = initCanvas;
</script>
</body>
</html>
