<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 ～怨霊討伐録～</title>
<style>
/* --- あなたのCSS設定を継承 --- */
:root { --kin: #d4af37; --kin2: #f0d070; }
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;}
html,body{
  overflow:hidden;height:100%;width:100%;
  background:#000;color:#fff;
  font-family:'Hiragino Mincho ProN','Yu Mincho','ＭＳ 明朝',serif;
  user-select:none;-webkit-user-select:none;
}
#bg{position:fixed;inset:0;z-index:0;}
#bg-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7); background-image: radial-gradient(circle, transparent 20%, #000 100%);}

/* 上部HUD */
#top-hud{
position:fixed;top:0;left:0;right:0;z-index:100;
padding:env(safe-area-inset-top,6px) 12px 6px;
display:flex;justify-content:space-between;align-items:flex-start;
background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);
}
.status-block{width:clamp(120px,28vw,210px);}
.char-name{font-size:11px;letter-spacing:1px;margin-bottom:2px;opacity:0.85;}
.hp-wrap{height:13px;background:#1a0a0a;border:1px solid rgba(212,175,55,0.4);border-radius:6px;overflow:hidden;margin-bottom:2px;}
.hp-bar{height:100%;border-radius:6px;transition:width 0.4s;position:relative;}
#hp-e-bar{background:linear-gradient(to right,#8e2a2a,#e05050);width:100%;}
#hp-p-bar{background:linear-gradient(to right,#1a3a6a,#3080e0);width:100%;}
#cast-gauge-wrap{height:5px;background:#1a0000;border:1px solid rgba(255,40,40,0.3);border-radius:3px;overflow:hidden;}
#cast-gauge{height:100%;width:0%;background:#ff2020;transition:width 0.1s linear;}
#cast-gauge.warn{background:#ff8800;}
#cast-gauge.danger{background:#ff0000;animation:gblink 0.2s ease infinite alternate;}
@keyframes gblink{from{opacity:1}to{opacity:0.4}}
.hp-text{font-size:9px;color:var(--kin);opacity:0.8;text-align:right;}
.ougi-wrap{height:5px;background:#0a0a1a;border:1px solid rgba(120,60,200,0.4);border-radius:3px;margin-top:2px;overflow:hidden;}
.ougi-bar{height:100%;width:0%;background:linear-gradient(to right,#4a1a9a,#9060ff);transition:width 0.3s;}

#center-msg{
position:absolute;left:50%;transform:translateX(-50%);
top:calc(env(safe-area-inset-top,6px) + 2px);
font-size:clamp(10px,1.8vw,13px);color:var(--kin);text-align:center;width:40%;
}

/* メインレイアウト */
#layout{position:fixed;inset:0;display:flex;flex-direction:column;z-index:10;}
#stage{flex:1;display:flex;overflow:hidden;}

/* キャラクター配置（Landscape） */
#enemy-slot, #player-slot {
  flex: 0 0 25%; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px;
}
.char-inner img { width: 100%; height: auto; filter: drop-shadow(0 0 10px #000); }

#center-col{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:6px;padding:4px 6px;
}

/* 問題エリア */
#question-area{
width:100%;text-align:center;background:rgba(0,0,0,0.65);
border:1px solid rgba(212,175,55,0.3);border-radius:8px;padding:8px;
}
#yomikata{font-size:12px;color:var(--kin2);margin-bottom:4px;}
#mondai-bun{font-size:clamp(24px,5vw,40px);font-weight:bold;text-shadow:0 0 10px var(--kin);}

/* キャンバス */
#canvas-frame{
width:min(90vw, 400px); aspect-ratio:1/1;
background:rgba(255,255,255,0.05); border:2px solid var(--kin); border-radius:8px;
position:relative; touch-action:none;
}
canvas{width:100%;height:100%;display:block;}

/* ボタン類 */
#bottom-hud{padding:10px; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; gap:8px; align-items:center;}
.btn-row{display:flex; gap:10px;}
.circle-btn{width:40px;height:40px;border-radius:50%;border:none;color:#fff;font-weight:bold;cursor:pointer;}
.fire{background:#e44;} .water{background:#48e;} .thunder{background:#ee0;color:#000;}
.clear-btn, .ougi-btn{padding:8px 15px; border-radius:5px; border:1px solid var(--kin); background:#222; color:var(--kin); font-weight:bold; cursor:pointer;}
.ougi-btn:disabled{opacity:0.3;}
#attack-btn{
width:280px; height:50px; background:linear-gradient(#f0d080, #b08030);
border:none; border-radius:25px; font-size:20px; font-weight:bold; cursor:pointer;
}

/* アニメーション・エフェクト */
.dmg-popup{position:absolute;animation:dmg-fly 1s forwards;font-weight:bold;}
@keyframes dmg-fly{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
.hit-anim{animation:shake 0.3s;}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}100%{transform:translateX(0)}}

/* モーダル */
#intercept-modal{
position:fixed;inset:0;z-index:1000; display:none;
background:rgba(50,0,0,0.9); flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#intercept-modal.active{display:flex;}

/* ゲームオーバー */
#overlay{position:fixed;inset:0;z-index:2000;display:none;background:rgba(0,0,0,0.9);flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#overlay.show{display:flex;}
</style>
</head>
<body>

<div id="bg"><div id="bg-overlay"></div></div>

<div id="top-hud">
  <div class="status-block">
    <div class="char-name" style="color:#e06060">【怨霊】<span id="enemy-name">鬼火</span></div>
    <div class="hp-wrap"><div id="hp-e-bar" class="hp-bar"></div></div>
    <div class="hp-text"><span id="hp-e-num">80</span> / <span id="hp-e-max">80</span></div>
    <div id="cast-gauge-wrap"><div id="cast-gauge"></div></div>
  </div>
  <div id="center-msg">精神を統一し、文字を綴れ</div>
  <div class="status-block" style="text-align:right">
    <div class="char-name" style="color:#6090e0">【術師】漢術師</div>
    <div class="hp-wrap"><div id="hp-p-bar" class="hp-bar"></div></div>
    <div class="hp-text"><span id="hp-p-num">100</span> / 100</div>
    <div class="ougi-wrap"><div id="ougi-bar" class="ougi-bar"></div></div>
  </div>
</div>

<div id="layout">
  <div style="height:80px;"></div>
  <div id="stage">
    <div id="enemy-slot"><div class="char-inner" id="enemy-inner">👹</div></div>
    <div id="center-col">
      <div id="question-area">
        <div id="yomikata">よみ：？？？</div>
        <div id="mondai-bun">―――</div>
      </div>
      <div id="canvas-frame">
        <canvas id="draw-canvas"></canvas>
      </div>
    </div>
    <div id="player-slot"><div class="char-inner" id="player-inner">🧙</div></div>
  </div>
  <div id="bottom-hud">
    <div class="btn-row">
      <button class="clear-btn" onclick="clearCanvas()">墨を拭く</button>
      <button class="ougi-btn" id="ougi-btn" disabled onclick="triggerOugi()">奥義</button>
    </div>
    <button id="attack-btn" onclick="recognizeAndAttack()">漢術発動！</button>
  </div>
</div>

<div id="intercept-modal">
  <h2 style="color:#ff4444;">⚠ 敵の猛攻！ ⚠</h2>
  <div id="intercept-yomi" style="color:#fff;"></div>
  <div id="intercept-mondai" style="font-size:30px; color:var(--kin2);"></div>
  <div id="intercept-canvas-frame" style="width:250px; height:250px; border:2px solid #f00;">
    <canvas id="intercept-canvas"></canvas>
  </div>
  <button id="intercept-fire" style="padding:10px 40px; background:#f44; color:#fff; border:none; border-radius:20px;" onclick="submitIntercept()">迎撃！</button>
</div>

<div id="overlay">
  <h1 id="overlay-title" style="font-size:48px;"></h1>
  <button style="padding:15px 30px; font-size:20px; cursor:pointer;" onclick="resetGame()">再戦する</button>
</div>

<script>
// --- [データ定義は以前のコードを継承] ---
const KANJI_DATA = [
  {k:'一',y:'いち',b:'___ばん大きい'}, {k:'火',y:'ひ',b:'キャンプの___'},
  {k:'水',y:'みず',b:'___をのむ'}, {k:'木',y:'き',b:'大きな___'},
  {k:'漢',y:'かん',b:'___字をかく'}, {k:'学',y:'がっこう',b:'小___校'}
  // ... 必要に応じて追加してください
];

const ENEMIES = [
  {name:'鬼火', hp:80, atk:12, speed:0.5},
  {name:'山姥', hp:120, atk:15, speed:0.4},
  {name:'竜王', hp:200, atk:25, speed:0.3}
];

let state = {
  enemyHP:80, enemyMaxHP:80, playerHP:100, playerMaxHP:100,
  castPct:0, ougiPct:0, currentQ:{}, inkData:[], isDrawing:false,
  wave:0, gameOver:false
};

// --- [キャンバス制御] ---
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');

function setupCanvas() {
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = r.height;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#fff';
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x: p.clientX - r.left, y: p.clientY - r.top };
}

canvas.addEventListener('touchstart', startDrawing);
canvas.addEventListener('touchmove', draw);
canvas.addEventListener('touchend', stopDrawing);
canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDrawing);

function startDrawing(e) {
  e.preventDefault();
  state.isDrawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  state.inkData.push([[p.x], [p.y], [0]]);
}

function draw(e) {
  if (!state.isDrawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  const s = state.inkData[state.inkData.length - 1];
  s[0].push(p.x); s[1].push(p.y); s[2].push(0);
}

function stopDrawing() { state.isDrawing = false; }

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  state.inkData = [];
}

// --- [ゲームロジック] ---
function nextQuestion() {
  state.currentQ = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
  document.getElementById('mondai-bun').textContent = state.currentQ.b;
  document.getElementById('yomikata').textContent = 'よみ：' + state.currentQ.y;
  clearCanvas();
}

async function recognizeAndAttack() {
  if (state.inkData.length === 0) return;
  const btn = document.getElementById('attack-btn');
  btn.disabled = true;
  btn.textContent = "判定中...";

  try {
    const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": state.inkData, "language": "ja" }] })
    });
    const data = await res.json();
    const candidates = data[1][0][1];

    if (candidates.includes(state.currentQ.k)) {
      attackEnemy(20);
      state.ougiPct = Math.min(100, state.ougiPct + 20);
    } else {
      document.getElementById('center-msg').textContent = "不発！正解は「" + state.currentQ.k + "」";
    }
  } catch (e) {
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = "漢術発動！";
  updateHUD();
  nextQuestion();
}

function attackEnemy(dmg) {
  state.enemyHP -= dmg;
  document.getElementById('enemy-inner').classList.add('hit-anim');
  setTimeout(() => document.getElementById('enemy-inner').classList.remove('hit-anim'), 300);
  if (state.enemyHP <= 0) {
    state.wave++;
    if (state.wave < ENEMIES.length) {
      loadEnemy(state.wave);
    } else {
      endGame(true);
    }
  }
}

function loadEnemy(idx) {
  const e = ENEMIES[idx];
  state.enemyMaxHP = e.hp;
  state.enemyHP = e.hp;
  document.getElementById('enemy-name').textContent = e.name;
  updateHUD();
}

function updateHUD() {
  document.getElementById('hp-e-bar').style.width = (state.enemyHP / state.enemyMaxHP * 100) + '%';
  document.getElementById('hp-p-bar').style.width = (state.playerHP / state.playerMaxHP * 100) + '%';
  document.getElementById('ougi-bar').style.width = state.ougiPct + '%';
  document.getElementById('ougi-btn').disabled = state.ougiPct < 100;
}

// 敵の攻撃ゲージ
setInterval(() => {
  if (state.gameOver) return;
  state.castPct += ENEMIES[state.wave].speed;
  document.getElementById('cast-gauge').style.width = Math.min(state.castPct, 100) + '%';
  if (state.castPct >= 100) {
    state.castPct = 0;
    // 簡易ダメージ処理（本来はここで迎撃モーダルを出す）
    state.playerHP -= 10;
    updateHUD();
    if (state.playerHP <= 0) endGame(false);
  }
}, 100);

function endGame(win) {
  state.gameOver = true;
  const overlay = document.getElementById('overlay');
  overlay.classList.add('show');
  document.getElementById('overlay-title').textContent = win ? "討伐完了！" : "敗北...";
}

function resetGame() {
  location.reload();
}

window.onload = () => {
  setupCanvas();
  loadEnemy(0);
  nextQuestion();
};
</script>
</body>
</html>
