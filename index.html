<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 ～怨霊討伐録～</title>
<style>
:root {
  --kin: #d4af37; --kin2: #f0d070; --shu: #8e2a2a; --shu2: #c04040;
  --ai: #1a3a6a; --ai2: #3060aa;
  --glass: rgba(5,2,0,0.88);
}
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;}
html,body{overflow:hidden;height:100%;width:100%;background:#000;color:#fff;
  font-family:'Hiragino Mincho ProN','Yu Mincho','ＭＳ 明朝',serif;
  user-select:none;-webkit-user-select:none;}

/* ========== 背景 ========== */
#bg{position:fixed;inset:0;z-index:1;}
#bg-img{position:absolute;inset:0;background:url(‘5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png’) no-repeat center center;background-size:cover;}
#bg-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.45);}
.bg-star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(–d,3s) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:0.05}to{opacity:0.6}}

/* ========== 上部HUD ========== */
#top-hud{position:fixed;top:0;width:100%;padding:env(safe-area-inset-top,8px) 16px 8px;
display:flex;justify-content:space-between;align-items:flex-start;z-index:500;
background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);}
.status-block{width:clamp(130px,25vw,220px);}
.char-name{font-size:11px;letter-spacing:2px;margin-bottom:3px;opacity:0.85;}
.hp-wrap{position:relative;height:14px;background:#1a0a0a;border:1px solid rgba(212,175,55,0.4);border-radius:7px;overflow:hidden;margin-bottom:3px;}
.hp-bar{height:100%;border-radius:7px;transition:width 0.4s ease;position:relative;}
.hp-bar::after{content:’’;position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,0.25),transparent);}
#hp-e-bar{background:linear-gradient(to right,#8e2a2a,#e05050);width:100%;}
#hp-p-bar{background:linear-gradient(to right,#1a3a6a,#3080e0);width:100%;}
#enemy-hp-wrap{position:relative;height:14px;background:#1a0a0a;border:1px solid rgba(212,175,55,0.4);border-radius:7px;overflow:hidden;margin-bottom:2px;}
#cast-gauge-wrap{height:6px;background:#1a0000;border:1px solid rgba(255,40,40,0.3);border-radius:3px;overflow:hidden;margin-bottom:3px;}
#cast-gauge{
height:100%;width:0%;
background:#ff2020;box-shadow:0 0 8px #ff0000;
transition:width 0.08s linear;
border-radius:3px;
}
#cast-gauge.warn{background:#ff8800;box-shadow:0 0 8px #ff6600;}
#cast-gauge.danger{background:#ff0000;box-shadow:0 0 12px #ff0000;animation:gauge-blink 0.2s ease infinite alternate;}
@keyframes gauge-blink{from{opacity:1;box-shadow:0 0 12px #ff0000}to{opacity:0.5;box-shadow:0 0 20px #ff4444}}
.hp-text{font-size:10px;color:var(–kin);opacity:0.8;text-align:right;}
.ougi-wrap{height:6px;background:#0a0a1a;border:1px solid rgba(120,60,200,0.4);border-radius:3px;overflow:hidden;margin-top:3px;}
.ougi-bar{height:100%;width:0%;background:linear-gradient(to right,#4a1a9a,#9060ff);border-radius:3px;transition:width 0.3s ease;box-shadow:0 0 8px #7040c0;}
#center-msg{position:absolute;left:50%;transform:translateX(-50%);top:8px;text-align:center;
font-size:clamp(11px,2vw,14px);color:var(–kin);letter-spacing:1px;white-space:nowrap;
text-shadow:0 0 10px rgba(212,175,55,0.5);}

/* ========== ステージ：横3分割 ========== */
#stage{
position:fixed;
top:70px; bottom:110px;
left:0; right:0;
z-index:10;
display:grid;
/* ★修正：左右を固定幅、中央を残り */
grid-template-columns: 28% 1fr 28%;
align-items:stretch;
}

/* 左右キャラ枠 */
.char-slot{
display:flex;
align-items:flex-end;
justify-content:center;
overflow:visible; /* ★ visibleに変更 */
padding:0 4px;
}

.char-inner{
position:relative;
width:100%;
height:100%;
text-align:center;
display:flex;
align-items:flex-end;
justify-content:center;
}

/* ★修正：キャラ画像のサイズ制御 */
.char-inner img{
width:auto;
max-width:100%;
height:auto;
max-height:100%;
object-fit:contain;
filter:drop-shadow(0 0 24px rgba(0,0,0,0.95));
}

/* 中央エリア */
#center-col{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:8px;
padding:4px;
z-index:20;
}

/* ========== 問題エリア ========== */
#question-area{
width:100%;
text-align:center;
pointer-events:none;
background:rgba(0,0,0,0.65);
border:1px solid rgba(212,175,55,0.3);
border-radius:8px;
padding:5px 12px 7px;
}
#yomikata{
display:inline-block;
font-size:clamp(11px,1.6vw,14px);color:var(–kin2);
background:rgba(0,0,0,0.4);border:1px solid rgba(212,175,55,0.25);
padding:1px 12px;border-radius:8px;margin-bottom:2px;letter-spacing:2px;
}
#mondai-bun{
font-size:clamp(18px,3.5vw,36px);font-weight:bold;
text-shadow:0 0 16px rgba(212,175,55,0.6),2px 2px 4px #000;
letter-spacing:clamp(2px,0.8vw,6px);line-height:1.2;
}

/* ========== キャンバスエリア ========== */
#canvas-area{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:100;
}
#canvas-frame{
width:100%;
aspect-ratio:1/1;
background:rgba(255,255,255,0.03);
border:2px solid rgba(212,175,55,0.4);
position:relative;
border-radius:4px;
box-shadow:inset 0 0 30px rgba(0,0,0,0.6),0 0 20px rgba(212,175,55,0.15);
}
#canvas-frame::before{
content:’’;position:absolute;inset:8px;
border:1px solid rgba(212,175,55,0.12);pointer-events:none;
}
canvas{width:100%;height:100%;cursor:crosshair;display:block;}

/* ダメージ数字 */
.dmg-popup{position:absolute;top:0;left:50%;transform:translateX(-50%);
font-size:clamp(20px,4vw,36px);font-weight:bold;pointer-events:none;
animation:dmg-fly 1.2s ease-out forwards;text-shadow:0 0 10px currentColor,2px 2px 4px #000;}
@keyframes dmg-fly{0%{opacity:1;transform:translate(-50%,0) scale(1.3)}100%{opacity:0;transform:translate(-50%,-60px) scale(0.8)}}

/* 被弾フラッシュ */
@keyframes hit-flash{0%,100%{filter:drop-shadow(0 0 20px rgba(0,0,0,0.9))}50%{filter:drop-shadow(0 0 30px #ff0000) brightness(2.5)}}
.hit-anim img{animation:hit-flash 0.3s ease !important;}

/* 奥義エフェクト */
#skill-effect{position:fixed;inset:0;z-index:800;pointer-events:none;display:none;align-items:center;justify-content:center;}
#skill-effect.active{display:flex;}
.skill-kanji{font-size:clamp(80px,20vw,180px);font-weight:bold;color:transparent;
-webkit-text-stroke:3px var(–kin);text-shadow:0 0 40px var(–kin),0 0 80px rgba(212,175,55,0.5);
animation:skill-kanji-anim 1.5s ease forwards;}
@keyframes skill-kanji-anim{
0%{transform:scale(0.3) rotate(-10deg);opacity:0}
30%{transform:scale(1.2) rotate(2deg);opacity:1}
70%{transform:scale(1.0) rotate(0deg);opacity:1}
100%{transform:scale(2) rotate(5deg);opacity:0}}
#skill-overlay{position:absolute;inset:0;background:radial-gradient(circle,rgba(120,60,200,0.5),transparent 70%);animation:skill-overlay-anim 1.5s ease forwards;}
@keyframes skill-overlay-anim{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

/* ========== 下部HUD ========== */
#bottom-hud{position:fixed;bottom:0;width:100%;
padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 10px);
background:linear-gradient(to top,rgba(0,0,0,0.92) 80%,transparent);
border-top:1px solid rgba(212,175,55,0.25);
z-index:500;display:flex;flex-direction:column;align-items:center;gap:10px;}
.btn-row{display:flex;gap:10px;align-items:center;}

/* 属性ボタン */
.circle-btn{
width:clamp(36px,6vw,50px);height:clamp(36px,6vw,50px);border-radius:50%;
border:2px solid rgba(255,255,255,0.5);color:#fff;font-weight:bold;
font-size:clamp(12px,2vw,16px);display:flex;align-items:center;justify-content:center;
cursor:pointer;font-family:inherit;}
.circle-btn:active{transform:scale(0.9);}
.fire{background:radial-gradient(#e44,#a00);box-shadow:0 0 10px rgba(220,60,60,0.5);}
.water{background:radial-gradient(#48e,#025);box-shadow:0 0 10px rgba(40,120,220,0.5);}
.thunder{background:radial-gradient(#ee0,#880);box-shadow:0 0 10px rgba(200,200,0,0.5);}

/* クリア・奥義ボタン */
.clear-btn{
padding:6px 14px;background:rgba(40,30,20,0.85);
border:1px solid rgba(212,175,55,0.5);color:var(–kin);
border-radius:6px;font-weight:bold;font-size:clamp(11px,2vw,13px);
font-family:inherit;cursor:pointer;letter-spacing:1px;}
.clear-btn:active{transform:scale(0.95);}
.ougi-btn{
padding:6px 16px;
background:linear-gradient(to bottom,rgba(100,50,180,0.85),rgba(60,20,120,0.85));
border:1px solid rgba(160,100,255,0.6);color:#c090ff;
border-radius:6px;font-weight:bold;font-size:clamp(11px,2vw,13px);
font-family:inherit;cursor:pointer;letter-spacing:1px;transition:opacity 0.2s;}
.ougi-btn:disabled{opacity:0.3;cursor:default;}
.ougi-btn:not(:disabled):active{transform:scale(0.95);}

/* 発動ボタン */
#attack-btn{
width:clamp(220px,50vw,360px);height:clamp(42px,7vh,56px);
background:linear-gradient(to bottom,#f0d080 0%,#b08030 50%,#806020 100%);
color:#201000;font-weight:bold;font-size:clamp(16px,3.5vw,24px);
border-radius:30px;border:none;
box-shadow:0 4px 0 #402000,0 0 20px rgba(212,175,55,0.3);
letter-spacing:4px;font-family:inherit;cursor:pointer;
transition:transform 0.08s,box-shadow 0.08s;}
#attack-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #402000;}

/* ========== コンボ ========== */
#combo-display{position:fixed;right:2%;top:50%;transform:translateY(-50%);z-index:600;
text-align:center;pointer-events:none;transition:opacity 0.5s;}
#combo-num{font-size:clamp(28px,6vw,56px);font-weight:bold;color:var(–kin);
text-shadow:0 0 20px var(–kin);line-height:1;}
#combo-label{font-size:clamp(10px,2vw,14px);letter-spacing:3px;color:#aaa;}

/* ========== 迎撃モーダル ========== */
#intercept-modal{
position:fixed;inset:0;z-index:700;
display:none;align-items:center;justify-content:center;
flex-direction:column;gap:10px;
background:rgba(80,0,0,0.75);
backdrop-filter:blur(4px);
}
#intercept-modal.active{display:flex;animation:intercept-in 0.2s ease;}
@keyframes intercept-in{from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}

#intercept-alert{
font-size:clamp(16px,3vw,22px);font-weight:bold;color:#ff4444;
letter-spacing:3px;text-shadow:0 0 15px #ff0000;
animation:alert-pulse 0.4s ease infinite alternate;
}
@keyframes alert-pulse{from{opacity:0.7}to{opacity:1;text-shadow:0 0 25px #ff0000}}

#intercept-yomi{
font-size:clamp(11px,2vw,14px);color:#ffcc88;letter-spacing:2px;
background:rgba(0,0,0,0.5);padding:2px 14px;border-radius:10px;
}
#intercept-mondai{
font-size:clamp(30px,7vw,60px);font-weight:bold;
text-shadow:0 0 20px #ff6666,2px 2px 4px #000;
letter-spacing:4px;
}
#intercept-timer-wrap{
width:clamp(200px,40vw,340px);height:10px;
background:#1a0000;border:1px solid #ff4444;border-radius:5px;overflow:hidden;
}
#intercept-timer-bar{
height:100%;width:100%;
background:linear-gradient(to right,#ff6600,#ff0000);
border-radius:5px;transition:width 0.08s linear;
}
#intercept-canvas-frame{
width:clamp(160px,30vw,260px);height:clamp(160px,30vw,260px);
background:rgba(255,255,255,0.04);
border:2px solid rgba(255,80,80,0.6);border-radius:4px;
box-shadow:inset 0 0 20px rgba(0,0,0,0.7),0 0 20px rgba(255,0,0,0.2);
}
#intercept-canvas-frame::before{content:’’;position:absolute;inset:6px;border:1px solid rgba(255,80,80,0.15);pointer-events:none;}
#intercept-canvas{width:100%;height:100%;cursor:crosshair;display:block;}

.intercept-btns{display:flex;gap:12px;}
#intercept-clear{
padding:6px 14px;background:rgba(60,20,20,0.85);
border:1px solid rgba(255,80,80,0.5);color:#ff8888;
border-radius:6px;font-weight:bold;font-size:clamp(11px,2vw,13px);
font-family:inherit;cursor:pointer;}
#intercept-fire{
width:clamp(160px,30vw,240px);height:clamp(36px,6vh,48px);
background:linear-gradient(to bottom,#ff6040,#aa2000);
color:#fff;font-weight:bold;font-size:clamp(14px,3vw,20px);
border-radius:24px;border:none;
box-shadow:0 3px 0 #600,0 0 15px rgba(255,60,0,0.4);
letter-spacing:3px;font-family:inherit;cursor:pointer;}
#intercept-fire:active{transform:translateY(2px);box-shadow:0 1px 0 #600;}

/* ========== オーバーレイ ========== */
#overlay{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;
background:rgba(0,0,0,0.88);flex-direction:column;gap:20px;}
#overlay.show{display:flex;}
#overlay-title{font-size:clamp(36px,8vw,72px);font-weight:bold;letter-spacing:6px;text-shadow:0 0 30px currentColor;}
#overlay-sub{font-size:clamp(14px,3vw,20px);color:#aaa;letter-spacing:2px;}
#retry-btn{padding:14px 40px;background:linear-gradient(to bottom,#f0d080,#a06020);
color:#201000;font-size:clamp(16px,3vw,22px);font-weight:bold;border:none;border-radius:30px;
letter-spacing:3px;cursor:pointer;font-family:inherit;box-shadow:0 4px 0 #402000;}
#retry-btn:active{transform:translateY(2px);}
</style>

</head>
<body>

<!-- 背景 -->

<div id="bg">
  <div id="bg-img"></div>
  <div id="bg-overlay"></div>
</div>

<!-- 上部HUD -->

<div id="top-hud">
  <div class="status-block">
    <div class="char-name" style="color:#e06060;">【怨霊】<span id="enemy-name">鬼火</span></div>
    <div class="hp-wrap">
      <div id="hp-e-bar" class="hp-bar"></div>
    </div>
    <div class="hp-text"><span id="hp-e-num">100</span> / <span id="hp-e-max">100</span></div>
    <div id="cast-gauge-wrap">
      <div id="cast-gauge"></div>
    </div>
    <div class="ougi-wrap"></div>
  </div>

  <div id="center-msg">敵の攻撃に備えよ！</div>

  <div class="status-block" style="text-align:right;">
    <div class="char-name" style="color:#6090e0;">【術師】漢術師</div>
    <div class="hp-wrap">
      <div id="hp-p-bar" class="hp-bar"></div>
    </div>
    <div class="hp-text"><span id="hp-p-num">100</span> / 100</div>
    <div class="ougi-wrap">
      <div id="ougi-bar" class="ougi-bar"></div>
    </div>
  </div>
</div>

<!-- ステージ -->

<div id="stage">
  <!-- 左：敵 -->
  <div class="char-slot">
    <div class="char-inner" id="enemy-inner">
      <img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-img" alt="敵">
    </div>
  </div>

  <!-- 中央：問題＋キャンバス -->

  <div id="center-col">
    <div id="question-area">
      <div id="yomikata">読み込み中…</div>
      <div id="mondai-bun">―――</div>
    </div>
    <div id="canvas-area">
      <div id="canvas-frame">
        <canvas id="draw-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- 右：術師 -->

  <div class="char-slot">
    <div class="char-inner" id="player-inner">
      <img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-img" alt="術師">
    </div>
  </div>
</div>

<!-- 奥義エフェクト -->

<div id="skill-effect">
  <div id="skill-overlay"></div>
  <div id="skill-kanji" class="skill-kanji"></div>
</div>

<!-- コンボ -->

<div id="combo-display" style="opacity:0;">
  <div id="combo-num">0</div>
  <div id="combo-label">COMBO</div>
</div>

<!-- 下部HUD -->

<div id="bottom-hud">
  <div class="btn-row">
    <button class="circle-btn fire">火</button>
    <button class="circle-btn water">水</button>
    <button class="circle-btn thunder">雷</button>
    <button class="clear-btn" onclick="clearCanvas()">墨を拭く</button>
    <button class="ougi-btn" id="ougi-btn" disabled onclick="triggerOugi()">奥義発動</button>
  </div>
  <button id="attack-btn" onclick="recognizeAndAttack()">漢術発動！</button>
</div>

<!-- 迎撃モーダル -->

<div id="intercept-modal">
  <div id="intercept-alert">⚠ 敵の攻撃！迎撃せよ！</div>
  <div id="intercept-yomi">よみ：</div>
  <div id="intercept-mondai">―</div>
  <div id="intercept-timer-wrap">
    <div id="intercept-timer-bar"></div>
  </div>
  <div id="intercept-canvas-frame" style="position:relative;">
    <canvas id="intercept-canvas"></canvas>
  </div>
  <div class="intercept-btns">
    <button id="intercept-clear" onclick="clearInterceptCanvas()">墨を拭く</button>
    <button id="intercept-fire" onclick="submitIntercept()">迎撃！</button>
  </div>
</div>

<!-- ゲームオーバー/勝利 -->

<div id="overlay">
  <div id="overlay-title">敗北…</div>
  <div id="overlay-sub">また挑め、術師よ</div>
  <button id="retry-btn" onclick="resetGame()">もう一度挑む</button>
</div>

// ================================================
//  効果音（Web Audio API）
// ================================================
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, dur, vol=0.3) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function playSE(type) {
  if (AC.state === 'suspended') AC.resume();
  switch(type) {
    case 'hit':  playTone(220,'sawtooth',0.15,0.4); break;
    case 'dmg':  playTone(150,'square',0.2,0.5); break;
    case 'miss': playTone(180,'triangle',0.1,0.2); playTone(160,'triangle',0.15,0.2); break;
    case 'ougi': [880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.3,0.5),i*80)); break;
    case 'wave': [523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.25),i*100)); break;
    case 'lose': [400,320,260,200].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.4,0.4),i*150)); break;
  }
}

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');

function setupCanvas() {
  const r = canvas.getBoundingClientRect();
  canvas.width  = r.width  * window.devicePixelRatio;
  canvas.height = r.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.lineWidth = Math.max(10, r.width * 0.04);
  ctx.strokeStyle = 'rgba(255,230,150,0.95)';
}
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x: p.clientX - r.left, y: p.clientY - r.top };
}
canvas.onmousedown = canvas.ontouchstart = (e) => {
  e.preventDefault(); state.isDrawing = true;
  const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);
  state.inkData.push([[p.x],[p.y],[0]]);
};
canvas.onmousemove = canvas.ontouchmove = (e) => {
  if (!state.isDrawing) return; e.preventDefault();
  const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();
  const s = state.inkData[state.inkData.length-1];
  s[0].push(p.x); s[1].push(p.y); s[2].push(0);
};
window.onmouseup = window.ontouchend = () => { state.isDrawing = false; };

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width/window.devicePixelRatio, canvas.height/window.devicePixelRatio);
  state.inkData = [];
}

function updateHUD() {
  const ep = Math.max(0, state.enemyHP / state.enemyMaxHP * 100);
  const pp = Math.max(0, state.playerHP / state.playerMaxHP * 100);
  document.getElementById('hp-e-bar').style.width = ep + '%';
  document.getElementById('hp-p-bar').style.width = pp + '%';
  document.getElementById('hp-e-num').textContent = Math.max(0, state.enemyHP);
  document.getElementById('hp-p-num').textContent = Math.max(0, state.playerHP);
  document.getElementById('ougi-bar').style.width = state.ougiPct + '%';
  document.getElementById('ougi-btn').disabled = state.ougiPct < 100;
}
function setMsg(txt, color='var(--kin)') {
  const m = document.getElementById('center-msg');
  m.textContent = txt; m.style.color = color;
}
function showDmg(targetId, amount, color) {
  const d = document.createElement('div');
  d.className = 'dmg-popup';
  d.textContent = '-' + amount;
  d.style.color = color;
  document.getElementById(targetId).appendChild(d);
  setTimeout(() => d.remove(), 1200);
}
function hitAnim(id) {
  const el = document.getElementById(id);
  el.classList.add('hit-anim');
  setTimeout(() => el.classList.remove('hit-anim'), 350);
}
function updateCombo() {
  const cd = document.getElementById('combo-display');
  if (state.combo >= 2) {
    document.getElementById('combo-num').textContent = state.combo;
    cd.style.opacity = '1';
    setTimeout(() => cd.style.opacity = '0', 2000);
  } else {
    cd.style.opacity = '0';
  }
}

  iCanvas.width  = r.width  * window.devicePixelRatio;
  iCanvas.height = r.height * window.devicePixelRatio;
  iCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  iCtx.lineCap = 'round'; iCtx.lineJoin = 'round';
  iCtx.lineWidth = Math.max(10, r.width * 0.05);
  iCtx.strokeStyle = 'rgba(255,180,100,0.95)';
}
function getIPos(e) {
  const r = iCanvas.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x: p.clientX - r.left, y: p.clientY - r.top };
}
iCanvas.onmousedown = iCanvas.ontouchstart = (e) => {
  if (!interceptState.active) return;
  e.preventDefault(); interceptState.isDrawing = true;
  const p = getIPos(e); iCtx.beginPath(); iCtx.moveTo(p.x, p.y);
  interceptState.inkData.push([[p.x],[p.y],[0]]);
};
iCanvas.onmousemove = iCanvas.ontouchmove = (e) => {
  if (!interceptState.isDrawing) return;
  e.preventDefault();
  const p = getIPos(e); iCtx.lineTo(p.x, p.y); iCtx.stroke();
  const s = interceptState.inkData[interceptState.inkData.length-1];
  s[0].push(p.x); s[1].push(p.y); s[2].push(0);
};
window.addEventListener('mouseup',  () => { interceptState.isDrawing = false; });
window.addEventListener('touchend', () => { interceptState.isDrawing = false; });

function clearInterceptCanvas() {
  iCtx.clearRect(0, 0, iCanvas.width/window.devicePixelRatio, iCanvas.height/window.devicePixelRatio);
  interceptState.inkData = [];
}

function openIntercept() {
  interceptState.active = true;
  interceptState.timerPct = 100;

  let q;
  do { q = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)]; }
  while (q.k === state.currentQ.k);
  interceptState.q = q;

  document.getElementById('intercept-yomi').textContent   = 'よみ：' + q.y;
  document.getElementById('intercept-mondai').textContent = q.b;
  document.getElementById('intercept-timer-bar').style.width = '100%';
  clearInterceptCanvas();

  const modal = document.getElementById('intercept-modal');
  modal.classList.add('active');
  playSE('dmg');

  const INTERCEPT_TIME = 3000;
  const step = 100 / (INTERCEPT_TIME / 100);
  interceptState.timerInterval = setInterval(() => {
    interceptState.timerPct -= step;
    document.getElementById('intercept-timer-bar').style.width =
      Math.max(0, interceptState.timerPct) + '%';
    if (interceptState.timerPct <= 0) {
      clearInterval(interceptState.timerInterval);
      closeIntercept(false);
    }
  }, 100);

  setTimeout(() => setupInterceptCanvas(), 50);
}

function closeIntercept(success) {
  clearInterval(interceptState.timerInterval);
  interceptState.active = false;
  interceptState.isDrawing = false;
  document.getElementById('intercept-modal').classList.remove('active');

  if (success) {
    playSE('hit');
    setMsg('迎撃成功！攻撃を防いだ！', '#88ff88');
    resetCastGauge();
  } else {
    const dmg = state.enemy.atk;
    state.playerHP -= dmg;
    hitAnim('player-inner');
    showDmg('player-inner', dmg, '#ff6060');
    playSE('dmg');
    setMsg('迎撃失敗…！ -' + dmg + 'ダメージ！', '#ff6060');
    resetCastGauge();
    updateHUD();
    if (state.playerHP <= 0) endGame(false);
  }
}

async function submitIntercept() {
  if (!interceptState.active) return;
  if (interceptState.inkData.length === 0) return;

  clearInterval(interceptState.timerInterval);

  try {
    const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": interceptState.inkData, "language": "ja" }] })
    });
    const data = await res.json();
    const cands = data[1][0][1];
    closeIntercept(cands.includes(interceptState.q.k));
  } catch(e) {
    closeIntercept(false);
  }
}

// ================================================
//  敵攻撃ループ
// ================================================
function resetCastGauge() {
  state.castPct = 0;
  const g = document.getElementById('cast-gauge');
  g.style.width = '0%';
  g.classList.remove('warn','danger');
}

setInterval(() => {
  if (state.gameOver) return;
  if (interceptState.active) return;

  state.castPct += state.enemy.speed;

  const g = document.getElementById('cast-gauge');
  if (state.castPct >= 90) {
    g.classList.add('danger'); g.classList.remove('warn');
  } else if (state.castPct >= 70) {
    g.classList.add('warn'); g.classList.remove('danger');
  } else {
    g.classList.remove('warn','danger');
  }

  const pct = Math.min(state.castPct, 100);
  g.style.width = pct + '%';

  if (state.castPct >= 100) {
    state.castPct = 0;
    g.style.width = '0%';
    g.classList.remove('warn','danger');
    openIntercept();
  }
}, 100);

// ================================================
//  攻撃判定
// ================================================
async function recognizeAndAttack() {
  if (state.gameOver || state.attackRunning) return;
  if (state.inkData.length === 0) { setMsg('まず漢字を書け！', '#aaa'); return; }
  state.attackRunning = true;
  document.getElementById('attack-btn').textContent = '判定中…';

  try {
    const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": state.inkData, "language": "ja" }] })
    });
    const data = await res.json();
    const cands = data[1][0][1];

    if (cands.includes(state.currentQ.k)) {
      state.combo++;
      const dmg = 20 + state.combo * 3;
      state.enemyHP -= dmg;
      state.ougiPct = Math.min(100, state.ougiPct + 15);
      hitAnim('enemy-inner');
      showDmg('enemy-inner', dmg, 'var(--kin)');
      playSE('hit');
      setMsg('漢術成功！' + dmg + 'ダメージ！詠唱を断つ！', 'var(--kin2)');
      resetCastGauge();
      updateCombo();
      if (state.enemyHP <= 0) setTimeout(() => nextWave(), 800);
    } else {
      state.combo = 0;
      playSE('miss');
      setMsg('不発…！正解は「' + state.currentQ.k + '」', '#ff8888');
    }
    updateHUD();
  } catch(e) {
    setMsg('通信エラー…もう一度', '#aaa');
  }

  document.getElementById('attack-btn').textContent = '漢術発動！';
  state.attackRunning = false;
  nextQuestion();
}

// ================================================
//  奥義
// ================================================
function triggerOugi() {
  if (state.ougiPct < 100 || state.gameOver) return;
  state.ougiPct = 0;
  updateHUD();
  const se = document.getElementById('skill-effect');
  const sk = document.getElementById('skill-kanji');
  sk.textContent = state.currentQ.k || '道';
  se.classList.add('active');
  playSE('ougi');
  resetCastGauge();
  const dmg = 50 + Math.floor(Math.random() * 30);
  setTimeout(() => {
    state.enemyHP -= dmg;
    hitAnim('enemy-inner');
    showDmg('enemy-inner', dmg, '#c090ff');
    setMsg('奥義発動！' + dmg + 'の大ダメージ！！', '#c090ff');
    updateHUD();
    if (state.enemyHP <= 0) setTimeout(() => nextWave(), 800);
  }, 600);
  setTimeout(() => se.classList.remove('active'), 1600);
  nextQuestion();
}

// ================================================
//  波管理
// ================================================
function nextWave() {
  state.wave++;
  if (state.wave >= ENEMIES.length) {
    endGame(true); return;
  }
  setEnemy(state.wave);
  playSE('wave');
  setMsg(state.wave + '波目！「' + state.enemy.name + '」が現れた！', '#ffaa44');
  nextQuestion();
}

// ================================================
//  ゲーム終了
// ================================================
function endGame(win) {
  state.gameOver = true;
  const ov = document.getElementById('overlay');
  ov.classList.add('show');
  if (win) {
    document.getElementById('overlay-title').textContent = '勝利！';
    document.getElementById('overlay-title').style.color = 'var(--kin)';
    document.getElementById('overlay-sub').textContent = '怨霊をすべて浄化した！';
    playSE('wave');
  } else {
    document.getElementById('overlay-title').textContent = '敗北…';
    document.getElementById('overlay-title').style.color = '#e06060';
    document.getElementById('overlay-sub').textContent = 'また挑め、術師よ';
    playSE('lose');
  }
}

function resetGame() {
  state.playerHP = 100; state.castPct = 0; state.ougiPct = 0;
  state.combo = 0; state.wave = 0;
  state.gameOver = false; state.attackRunning = false;
  document.getElementById('overlay').classList.remove('show');
  setEnemy(0);
  updateHUD();
  nextQuestion();
  setMsg('敵の攻撃に備えよ！');
}

// ================================================
//  初期化
// ================================================
window.onload = () => {
  setupCanvas();
  setEnemy(0);
  updateHUD();
  nextQuestion();
};
window.onresize = () => setupCanvas();
</script>
