<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 墨の決戦 -</title>
<style>
:root {
  --sumi: #0a0a0a; --kin: #c9a063; --shu: #8e2a2a; --ai-bright: #3a82f6; --glass: rgba(0,0,0,0.7);
}
/* 全体設定：横向きを意識したフルスクリーン */
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: 'Hiragino Mincho ProN', serif; }

/* 背景：IMG_7089を暗めに配置 */
#bg-layer { position: fixed; inset: 0; background: url('IMG_7089.png') no-repeat center center; background-size: cover; filter: brightness(0.3); z-index: 1; }

/* メインレイアウト */
#game-stage { 
    position: relative; z-index: 10; width: 100vw; height: 100dvh; 
    display: grid; grid-template-rows: 80px 1fr 140px; padding: 10px;
}

/* 上部：ステータスバー（画像19を意識） */
#top-hud { display: flex; justify-content: space-between; align-items: flex-start; }
#enemy-status { width: 40%; background: var(--glass); border-left: 4px solid var(--shu); padding: 5px 10px; border-radius: 0 10px 10px 0; }
#timer-area { font-size: 24px; color: var(--kin); font-weight: bold; text-shadow: 0 0 10px #000; }
#player-hud { width: 40%; background: var(--glass); border-right: 4px solid var(--ai-bright); padding: 5px 10px; border-radius: 10px 0 0 10px; text-align: right; }

.hp-bar-bg { width: 100%; height: 12px; background: #222; border: 1px solid #444; border-radius: 6px; margin-top: 5px; overflow: hidden; }
.hp-fill { height: 100%; background: linear-gradient(90deg, #600, var(--shu)); width: 100%; transition: width 0.3s; }
.sp-fill { height: 100%; background: linear-gradient(90deg, #004, var(--ai-bright)); width: 85%; }

/* 中央：戦闘エリア（左に敵、右に自分） */
#battle-arena { position: relative; display: flex; justify-content: center; align-items: center; }

#enemy-sprite { position: absolute; left: 0; bottom: 20%; width: 35%; opacity: 0.8; } /* 敵のビジュアル（SVG仮） */
#player-sprite { 
    position: absolute; right: -20px; bottom: -20px; width: 80%; max-width: 450px; 
    z-index: 50; pointer-events: none; /* 描画の邪魔をしない */
}
#player-sprite img { width: 100%; height: auto; filter: drop-shadow(0 0 20px #000); }

/* キャンバス：ここが最重要（最前面） */
#canvas-wrap { 
    position: relative; z-index: 100; /* キャラクタより手前 */
    width: 260px; height: 260px; background: rgba(255,255,255,0.08);
    border: 3px solid var(--kin); border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
}
#draw-canvas { width: 100%; height: 100%; cursor: crosshair; }

/* 下部：操作パネル */
#bottom-panel { display: flex; align-items: flex-end; justify-content: space-between; z-index: 110; }
#mondai-area { width: 60%; background: var(--glass); padding: 15px; border-radius: 10px; border: 1px solid var(--kin); }
#mondai-text { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
#mondai-yomi { color: var(--kin); font-size: 14px; }

#actions { display: flex; flex-direction: column; gap: 10px; width: 35%; }
.btn { height: 50px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; color: #fff; font-size: 16px; }
.btn-clear { background: #333; border: 1px solid var(--kin); color: var(--kin); }
.btn-attack { background: linear-gradient(180deg, var(--ai-bright), #1a3651); border: 1px solid #fff; box-shadow: 0 0 15px var(--ai-bright); }

/* 特殊演出 */
#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--kin); font-size: 24px; }
.floating-kanji { position: absolute; pointer-events: none; z-index: 200; filter: brightness(2) drop-shadow(0 0 15px var(--ai-bright)); animation: floatUp 0.8s ease-out forwards; }
@keyframes floatUp { from { transform: scale(1); opacity: 1; } to { transform: scale(2) translateY(-100px); opacity: 0; } }
</style>
</head>
<body>
<div id="bg-layer"></div>

<div id="game-stage">
    <div id="top-hud">
        <div id="enemy-status">
            <div style="font-size: 12px;">怨霊：誤字の魔物</div>
            <div class="hp-bar-bg"><div id="enemy-hp" class="hp-fill"></div></div>
        </div>
        <div id="timer-area">02:18</div>
        <div id="player-hud">
            <div style="font-size: 12px;">正統派漢術師</div>
            <div class="hp-bar-bg"><div class="hp-fill" style="background:linear-gradient(90deg, #060, #0c0); width:90%;"></div></div>
            <div class="hp-bar-bg" style="height:6px;"><div class="sp-fill"></div></div>
        </div>
    </div>

    <div id="battle-arena">
        <div id="enemy-sprite">
            <svg viewBox="0 0 100 100"><path d="M50 10 L90 90 L10 90 Z" fill="rgba(255,0,0,0.2)" stroke="red" stroke-width="2"/></svg>
        </div>
        
        <div id="player-sprite">
            <img src="8632236f-1a48-494f-baad-8a17ff9a36fd.png" alt="漢術師">
        </div>

        <div id="canvas-wrap">
            <canvas id="draw-canvas"></canvas>
            <div id="ans-hint" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:150px; color:rgba(255,255,255,0.03); pointer-events:none;"></div>
        </div>
    </div>

    <div id="bottom-panel">
        <div id="mondai-area">
            <div id="mondai-text">読み：---</div>
            <div id="mondai-bun">---</div>
        </div>
        <div id="actions">
            <button class="btn btn-clear" onclick="clearCanvas()">墨を拭く</button>
            <button class="btn btn-attack" onclick="recognizeAndAttack()">漢術発動！</button>
        </div>
    </div>
</div>

<div id="loading">霊力鑑定中...</div>

<script>
// 201文字のデータなどは以前のものを継承してください
const MONDAI_LIST = [
    { kanji: '悪', yomi: 'わるい', bun: '___いことをする' },
    { kanji: '曜', yomi: 'よう', bun: '日曜日の___' }
];

let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false, enemyHp = 100;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 12; ctx.strokeStyle = '#fff';
    ctx.shadowBlur = 5; ctx.shadowColor = '#0088ff';
}

function next() {
    currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
    document.getElementById('mondai-text').innerText = '読み：' + currentMondai.yomi;
    document.getElementById('mondai-bun').innerText = currentMondai.bun;
    document.getElementById('ans-hint').innerText = currentMondai.kanji;
    clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function start(x, y) { isDrawing = true; currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); }
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
window.addEventListener('touchend', end);

async function recognizeAndAttack() {
    if (inkData.length === 0) return;
    document.getElementById('loading').style.display = 'flex';
    try {
        const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, { 
            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] }) 
        });
        const data = await res.json();
        const result = data[1][0][1][0];
        
        if (result === currentMondai.kanji) {
            enemyHp -= 34;
            document.getElementById('enemy-hp').style.width = Math.max(0, enemyHp) + '%';
            if (enemyHp <= 0) { alert("怨霊を浄化した！"); enemyHp = 100; }
            next();
        } else {
            alert(`不発！正解は「${currentMondai.kanji}」なり。`);
            clearCanvas();
        }
    } catch(e) { alert("霊力（通信）が不安定です"); }
    document.getElementById('loading').style.display = 'none';
}

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
