<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>真・漢術師 - 墨の試練（和風RPG） -</title>
<style>
:root {
  --sumi: #0a0a0a; --washi: #f4f0e0; --kin: #c9a063; --shu: #8e2a2a; --ai: #1a3651; --ai-bright: #3a82f6; --kuro-tetsuki: #2b2b2b;
}
html, body { overflow: hidden; height: 100%; position: fixed; width: 100%; background: #000; color: #fff; font-family: serif; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }

/* 背景とオーバーレイ */
#app { display: flex; flex-direction: column; height: 100dvh; padding: 10px; gap: 8px; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }
#bg-layer { position: fixed; inset: 0; background: url('IMG_7089.png') no-repeat center center; background-size: cover; filter: blur(4px) brightness(0.4); z-index: 0; }

/* 浮き立たせた漢術師（透過PNG） */
#player-avatar-fixed { 
    position: fixed; bottom: -20px; right: -30px; width: 100%; max-width: 450px; z-index: 5; pointer-events: none; 
}
#player-avatar-fixed img { width: 100%; height: auto; display: block; filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); }

/* 上部：怨霊エリア */
#enemy-area { position: relative; z-index: 20; display: flex; align-items: center; padding: 12px; background: rgba(0,0,0,0.7); border: 2px solid var(--shu); border-radius: 10px; height: 100px; }
#enemy-visual { width: 60px; height: 80px; flex-shrink: 0; }
#enemy-info { flex: 1; margin-left: 12px; }
#enemy-hp-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 6px; border: 1px solid var(--shu); margin-top: 5px; }
#enemy-hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #600, var(--shu)); transition: width 0.3s; }
#mondai-bun { font-size: 18px; font-weight: bold; margin-top: 8px; color: #fff; text-shadow: 2px 2px 4px #000; }

/* 中央：キャンバス（回答エリア） */
#canvas-container { position: relative; z-index: 15; flex: 1; background: rgba(255,255,255,0.05); border: 2px solid var(--kin); border-radius: 10px; overflow: visible; margin: 10px 0; }
#draw-canvas { width: 100%; height: 100%; display: block; z-index: 15; position: relative; }
.floating-kanji { position: absolute; inset: 0; pointer-events: none; z-index: 100; filter: drop-shadow(0 0 20px var(--ai-bright)) brightness(1.8); animation: kanji-float-up 1.0s ease-out forwards; }
@keyframes kanji-float-up { 0% { transform: scale(1) translateY(0); opacity: 1; } 50% { transform: scale(1.3) translateY(-40px); opacity: 1; } 100% { transform: scale(1.6) translateY(-80px); opacity: 0; } }

/* 下部：操作UI */
#bottom-ui { position: relative; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
#mondai-info-row { display: flex; gap: 8px; }
#mondai-yomi { flex: 1; padding: 12px; background: rgba(244,240,224,0.9); color: var(--sumi); border: 2px solid var(--kin); border-radius: 5px; font-size: 16px; font-weight: bold; text-align: center; }
#player-status { flex: 1; padding: 12px; background: rgba(26,54,81,0.8); border: 2px solid var(--ai-bright); border-radius: 5px; font-size: 14px; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; }

#button-area { display: flex; gap: 10px; height: 60px; }
.btn { flex: 1; border-radius: 8px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; transition: 0.2s; }
.btn-sub { background: var(--kuro-tetsuki); color: var(--kin); border: 1px solid var(--kin); }
.btn-main { flex: 2; background: linear-gradient(to bottom, var(--ai-bright), var(--ai)); color: white; border: 1px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--kin); font-size: 20px; }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="player-avatar-fixed">
    <img src="8632236f-1a48-494f-baad-8a17ff9a36fd.png" alt="漢術師">
</div>

<div id="loading">霊力鑑定中...</div>

<div id="app">
  <div id="enemy-area">
    <div id="enemy-visual">
      <svg viewBox="0 0 100 120" width="100%" height="100%"><path d="M50 10 C20 30 5 60 15 90 C25 110 75 110 85 90 C95 60 80 30 50 10 Z" fill="#111" stroke="#ff4d4d" stroke-width="3"/></svg>
    </div>
    <div id="enemy-info">
      <div style="font-size: 11px; color: #ff8a8a;">怨霊：誤字の魔物</div>
      <div id="enemy-hp-bar-bg"><div id="enemy-hp-bar"></div></div>
      <div id="mondai-bun"></div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="draw-canvas"></canvas>
  </div>

  <div id="bottom-ui">
    <div id="mondai-info-row">
      <div id="mondai-yomi"></div>
      <div id="player-status">正統派漢術師</div>
    </div>
    <div id="button-area">
      <button class="btn btn-sub" onclick="clearCanvas()">墨を拭く</button>
      <button class="btn btn-main" onclick="recognizeAndAttack()">漢術発動！</button>
    </div>
  </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    let audio;
    if (type === 'write') {
        audio = new Audio('文字表示の衝撃音1.mp3'); //
    } else if (type === 'hit') {
        audio = new Audio('攻撃.mp3'); //
    }
    if (audio) {
        audio.volume = 0.5;
        audio.play().catch(e => console.log("再生失敗:", e));
    }
}

// 漢字データ省略（以前のコードの201文字をここに入れてください）
const MONDAI_LIST = [{ kanji: '曜', yomi: 'よう', bun: '日曜日の___' }, { kanji: '悪', yomi: 'わるい', bun: '___いことをする' }]; 

let currentMondai = {};
let inkData = [];
let currentStroke = [];
let isDrawing = false;
let enemyHp = 100;

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const enemyHpBar = document.getElementById('enemy-hp-bar');

function setup() {
  const rect = canvas.parentNode.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 12; ctx.strokeStyle = '#fff';
  ctx.shadowBlur = 6; ctx.shadowColor = '#0088ff';
}

function next() {
  currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
  document.getElementById('mondai-bun').innerText = currentMondai.bun;
  document.getElementById('mondai-yomi').innerText = '読み：' + currentMondai.yomi;
  clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function createFloatUpEffect() {
    const dataUrl = canvas.toDataURL();
    const img = document.createElement('img');
    img.src = dataUrl;
    img.className = 'floating-kanji';
    document.getElementById('canvas-container').appendChild(img);
    setTimeout(() => img.remove(), 1000);
}

function start(x, y) { 
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isDrawing = true; playSound('write');
    currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); 
}
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
window.addEventListener('touchend', end);
canvas.addEventListener('mousedown', e => { const r = canvas.getBoundingClientRect(); start(e.clientX-r.left, e.clientY-r.top); });
window.addEventListener('mousemove', e => { if(isDrawing) { const r = canvas.getBoundingClientRect(); move(e.clientX-r.left, e.clientY-r.top); } });
window.addEventListener('mouseup', end);

async function recognizeAndAttack() {
  if (inkData.length === 0) return;
  document.getElementById('loading').style.display = 'flex';
  try {
    const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] }) });
    const data = await res.json();
    const result = data[1][0][1];
    
    if (result && result[0] === currentMondai.kanji) {
      createFloatUpEffect();
      setTimeout(() => {
          playSound('hit');
          document.getElementById('enemy-area').classList.add('shake');
          enemyHp -= 34;
          enemyHpBar.style.width = Math.max(0, enemyHp) + '%';
          setTimeout(() => {
              document.getElementById('enemy-area').classList.remove('shake');
              if (enemyHp <= 0) { alert("怨霊を浄化した！"); enemyHp = 100; enemyHpBar.style.width = '100%'; }
              next();
          }, 400);
      }, 400);
    } else {
      alert(`正解は「${currentMondai.kanji}」でした。`);
      clearCanvas();
    }
  } catch(e) { alert("通信エラー"); }
  document.getElementById('loading').style.display = 'none';
}

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
