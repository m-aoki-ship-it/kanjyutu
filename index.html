<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>真・漢術師 - 墨の試練 -</title>
<style>
:root {
  --sumi: #0a0a0a; --sumi-light: #1c1c1c; --washi: #e8dcc4;
  --kin: #d4af37; --kin-bright: #ffdf00; --shu: #b22222;
  --ai: #003366; --ai-bright: #0088ff;
}
html, body { overflow: hidden; height: 100%; position: fixed; width: 100%; background: var(--sumi); color: var(--washi); font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
#app { display: flex; flex-direction: column; height: 100dvh; padding: 12px; gap: 10px; max-width: 500px; margin: 0 auto; }

/* 敵エリア */
#enemy-area { height: 130px; display: flex; align-items: center; padding: 15px; background: rgba(178,34,34,0.1); border: 2px solid var(--shu); border-radius: 12px; position: relative; }
#enemy-visual { width: 90px; height: 110px; display: flex; align-items: center; justify-content: center; }
#enemy-hp-bar-bg { width: 100%; height: 14px; background: #222; border-radius: 7px; border: 1px solid var(--shu); margin-top: 5px; box-shadow: 0 0 10px var(--shu); }
#enemy-hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #600, var(--shu)); transition: width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

/* キャンバス：ヒントを削除 */
#canvas-container { position: relative; flex: 1; background: radial-gradient(circle, #2a2a2a 0%, #0a0a0a 100%); border: 3px solid var(--kin); border-radius: 15px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
#draw-canvas { width: 100%; height: 100%; display: block; z-index: 3; position: relative; }

/* 漢術師エリア */
#player-area { height: 120px; display: flex; align-items: center; padding: 10px; background: linear-gradient(135deg, rgba(0,51,102,0.4), rgba(0,0,0,0.8)); border: 2px solid var(--ai); border-radius: 12px; border-left: 6px solid var(--ai-bright); }
#player-avatar { width: 100px; height: 100px; border-radius: 8px; border: 1px solid var(--ai-bright); overflow: hidden; background: #000; flex-shrink: 0; }
#player-avatar img { width: 100%; height: 100%; object-fit: cover; }
#player-info { flex: 1; padding-left: 15px; }
.status-label { font-size: 12px; color: var(--ai-bright); letter-spacing: 2px; }
.kanji-display { font-size: 20px; font-weight: bold; color: var(--washi); margin-top: 5px; }

/* ボタン */
#button-area { display: flex; gap: 10px; height: 60px; padding-bottom: 5px; }
.btn { flex: 1; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.2s; border: none; }
.btn-sub { background: var(--sumi-light); color: var(--kin); border: 1px solid var(--kin); }
.btn-main { flex: 2; background: linear-gradient(to bottom, var(--ai-bright), var(--ai)); color: white; border: 1px solid #fff; box-shadow: 0 4px 15px rgba(0,136,255,0.4); }

/* エフェクト */
.shake { animation: shake 0.4s both; }
@keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-5px,0)} 75%{transform:translate(5px,0)} }
#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--kin); font-size: 20px; letter-spacing: 5px; }
</style>
</head>
<body>
<div id="loading">鑑定中...</div>
<div id="app">
  <div id="enemy-area">
    <div id="enemy-visual">
      <svg viewBox="0 0 100 120" width="80" height="100">
        <path d="M50 10 C20 30 5 60 15 90 C25 110 75 110 85 90 C95 60 80 30 50 10 Z" fill="#000" stroke="#b22222" stroke-width="2">
          <animate attributeName="d" dur="2s" repeatCount="indefinite" values="M50 10 C20 30 5 60 15 90 C25 110 75 110 85 90 C95 60 80 30 50 10 Z; M50 15 C10 35 5 70 20 95 C30 115 70 115 80 95 C95 70 90 35 50 15 Z; M50 10 C20 30 5 60 15 90 C25 110 75 110 85 90 C95 60 80 30 50 10 Z" />
        </path>
        <circle cx="35" cy="55" r="5" fill="#f00"></circle>
        <circle cx="65" cy="55" r="5" fill="#f00"></circle>
      </svg>
    </div>
    <div id="enemy-info">
      <div style="font-size: 11px; color: #ff4d4d;">怨霊：誤字の魔物</div>
      <div id="enemy-hp-bar-bg"><div id="enemy-hp-bar"></div></div>
      <div id="mondai-bun" style="font-size: 18px; font-weight: bold; margin-top: 10px; color: #fff;"></div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="draw-canvas"></canvas>
  </div>

  <div id="player-area">
    <div id="player-avatar">
      <img src="https://img.imageimg.net/artists/gemini/kanjutshi_hero.png" onerror="this.src='https://raw.githubusercontent.com/m-aoki-ship-it/m-aoki-ship-it.github.io/main/kanjutshi.png'; this.onerror=null;" alt="漢術師">
    </div>
    <div id="player-info">
      <div class="status-label">正統派漢術師</div>
      <div id="mondai-yomi" class="kanji-display"></div>
    </div>
  </div>

  <div id="button-area">
    <button class="btn btn-sub" onclick="clearCanvas()">墨を拭く</button>
    <button class="btn btn-main" onclick="recognizeAndAttack()">漢術発動！</button>
  </div>
</div>

<script>
// 問題データ
const MONDAI_LIST = [
  { kanji:'悪', yomi:'読み：わるい', bun:'___いことをして謝る' },
  { kanji:'医', yomi:'読み：い', bun:'___者に診てもらう' },
  { kanji:'運', yomi:'読み：はこぶ', bun:'荷物を___ぶ' },
  { kanji:'漢', yomi:'読み：かん', bun:'___字の練習' },
  { kanji:'進', yomi:'読み：すすむ', bun:'前へ___む' },
  { kanji:'鉄', yomi:'読み：てつ', bun:'___棒で遊ぶ' },
  { kanji:'曜', yomi:'読み：よう', bun:'日曜日の___' }
];

let currentMondai = {};
let inkData = [];
let currentStroke = [];
let isDrawing = false;
let enemyHp = 100;

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const enemyHpBar = document.getElementById('enemy-hp-bar');

function setup() {
  const rect = canvas.parentNode.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
  ctx.shadowBlur = 8; ctx.shadowColor = '#0088ff';
}

function next() {
  currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
  document.getElementById('mondai-bun').innerText = currentMondai.bun;
  document.getElementById('mondai-yomi').innerText = currentMondai.yomi;
  clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function start(x, y) { isDrawing = true; currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); }
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
window.addEventListener('touchend', end);
canvas.addEventListener('mousedown', e => { const r = canvas.getBoundingClientRect(); start(e.clientX-r.left, e.clientY-r.top); });
window.addEventListener('mousemove', e => { if(isDrawing) { const r = canvas.getBoundingClientRect(); move(e.clientX-r.left, e.clientY-r.top); } });
window.addEventListener('mouseup', end);

async function recognizeAndAttack() {
  if (inkData.length === 0) return;
  document.getElementById('loading').style.display = 'flex';
  try {
    const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] })
    });
    const data = await res.json();
    const result = data[1][0][1];
    let damage = 0;

    if (result && result[0] === currentMondai.kanji) { damage = 34; }
    else if (result && result.slice(1, 3).includes(currentMondai.kanji)) { damage = 15; }

    if (damage > 0) {
      document.getElementById('enemy-area').classList.add('shake');
      enemyHp -= damage;
      enemyHpBar.style.width = Math.max(0, enemyHp) + '%';
      setTimeout(() => {
        document.getElementById('enemy-area').classList.remove('shake');
        if (enemyHp <= 0) { alert("魔物を浄化した！"); enemyHp = 100; enemyHpBar.style.width = '100%'; }
        next();
      }, 400);
    } else {
      alert(`力不足！ 正解は「${currentMondai.kanji}」です。`);
      clearCanvas();
    }
  } catch(e) { alert("通信エラー"); }
  document.getElementById('loading').style.display = 'none';
}

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
