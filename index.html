<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 ～怨霊討伐録～ バージョン2.1</title>
<style>
:root { 
  --kin: #f0d070; /* 文字用金色 */
  --kin-border: #d4af37; /* 枠線用金色 */
  --danger: #ff4444; 
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }

html, body {
  overflow: hidden; height: 100%; width: 100%;
  color: #fff;
  font-family: 'Hiragino Mincho ProN', serif;
}

/* 1. 背景画像の設定 */
body {
  /* 以下のいずれかの方法で背景画像を設定してください */
  /* 方法A: GitHub上のパスを指定する場合 */
  background-image: url('https://raw.githubusercontent.com/username/kanjyutu/main/5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png');
  
  /* 方法B: このHTMLファイルと同じフォルダーに画像を置いた場合 */
  /* background-image: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png'); */
  
  /* 背景画像が読み込まれるまでのフォールバック用黒 */
  background-color: #000;
  
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

#bg-overlay { 
  position: fixed; inset: 0; 
  /* 背景画像の上に少し黒を重ねて、和風の雰囲気を強調する */
  background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%); 
  z-index: 1;
}

/* 縦持ち警告 */
@media screen and (orientation: portrait) {
  body::before {
    content: "画面を横向きにしてください";
    position: fixed; inset: 0; background: #000; z-index: 9999;
    display: flex; align-items: center; justify-content: center; color: var(--kin);
  }
}

#game-container {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  height: 100vh; width: 100%;
  padding: 5px 15px env(safe-area-inset-bottom);
}

/* 上部ステータス */
#header { height: 12vh; display: flex; justify-content: space-between; align-items: flex-end; }
.status-block { width: 30%; }
.hp-wrap { height: 8px; background: #200; border: 1px solid var(--kin-border); border-radius: 4px; overflow: hidden; position: relative;}
.hp-bar { height: 100%; width: 100%; transition: width 0.3s; }
#hp-e-bar { background: linear-gradient(to right, #822, #f44); }
#hp-p-bar { background: linear-gradient(to right, #228, #4af); }
.cast-wrap { height: 3px; background: #100; margin-top: 2px; border-radius: 2px; overflow: hidden; }
#cast-gauge { height: 100%; width: 0%; background: var(--danger); }
.hp-label { font-size: 10px; color: var(--kin); display: flex; justify-content: space-between; margin-bottom: 1px; }

/* 2. メインエリア：キャラクター表示を大きく */
#main-stage { flex: 1; display: flex; align-items: center; justify-content: space-between; overflow: hidden; gap: 5px; }
.char-box { flex: 1.2; display: flex; justify-content: center; align-items: center; height: 100%; }
/* 画像サイズを大きく設定 */
.char-box img { max-width: 100%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));}

#interaction-box { flex: 1.1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; height: 100%; }
#question-display { background: rgba(0,0,0,0.8); border: 1px solid var(--kin-border); border-radius: 6px; padding: 2px 5px; text-align: center; width: 100%; min-height: 40px; display: flex; flex-direction: column; justify-content: center;}
#yomi-text { font-size: 9px; color: var(--kin2); margin-bottom: 1px; }
#mondai-text { font-size: clamp(12px, 3vh, 16px); font-weight: bold; line-height: 1.1; color: var(--kin); }

/* キャンバスサイズを微調整 */
#canvas-wrap {
  height: 40vh; aspect-ratio: 1/1;
  background: rgba(255,255,255,0.08); border: 2px solid var(--kin-border); border-radius: 10px;
  position: relative;
  /* 文字書きエフェクトのためのglow効果 */
  box-shadow: 0 0 10px rgba(240, 208, 112, 0.3);
}
canvas { width: 100%; height: 100%; touch-action: none; }

/* 下部ボタン */
#footer { height: 18vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.btn-row { display: flex; gap: 10px; margin-bottom: 2px; }
.sub-btn { padding: 4px 10px; background: rgba(30,30,30,0.9); border: 1px solid var(--kin-border); color: var(--kin); border-radius: 4px; font-size: 10px; font-weight: bold; }
#attack-btn { width: 220px; height: 36px; border: none; border-radius: 18px; background: linear-gradient(#f0d080, #b08030); color: #210; font-size: 17px; font-weight: bold; }

/* 終了画面 */
#game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
.hit { animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
</style>
</head>
<body>

<div id="bg-overlay"></div>

<div id="game-container">
  <div id="header">
    <div class="status-block">
      <div class="hp-label"><span>怨霊</span><span id="hp-e-val">120/120</span></div>
      <div class="hp-wrap"><div id="hp-e-bar" class="hp-bar"></div></div>
      <div class="cast-wrap"><div id="cast-gauge"></div></div>
    </div>
    <div id="center-msg" style="font-size:10px; color:var(--kin)">精神を集中せよ</div>
    <div class="status-block">
      <div class="hp-label"><span>HP: <span id="hp-p-val">100</span>/100</span><span>漢術師</span></div>
      <div class="hp-wrap"><div id="hp-p-bar" class="hp-bar"></div></div>
    </div>
  </div>

  <div id="main-stage">
    <div class="char-box"><img src="Untitled design.png" id="img-e"></div>
    <div id="interaction-box">
      <div id="question-display">
        <div id="yomi-text">よみ：？？？</div>
        <div id="mondai-text">―――</div>
      </div>
      <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    </div>
    <div class="char-box"><img src="Untitled design - 1.png" id="img-p"></div>
  </div>

  <div id="footer">
    <div class="btn-row">
      <button class="sub-btn" onclick="clearCanvas()">墨を拭く</button>
      <button class="sub-btn" id="ougi-btn" disabled>奥義(未実装)</button>
    </div>
    <button id="attack-btn" onclick="recognizeAndAttack()">漢 術 発 動</button>
  </div>
</div>

<div id="game-over">
  <h1 id="res-title" style="color:var(--kin); font-size:40px; margin-bottom:20px;"></h1>
  <button style="padding:10px 30px; font-size:20px;" onclick="location.reload()">再戦</button>
</div>

<script>
const KANJI_DATA = [
  {k:'火',y:'ひ',b:'（　）が燃える'}, {k:'水',y:'みず',b:'（　）を飲む'},
  {k:'木',y:'き',b:'大きな（　）'}, {k:'漢',y:'かん',b:'（　）字を練習する'}
];
let state = { eHP:120, eMax:120, pHP:100, pMax:100, cast:0, ink:[], over:false };
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');

function initCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  
  // 3. 文字書きエフェクト（金色に輝く）
  // 線の色を金色に設定
  ctx.strokeStyle = '#f0d070'; 
  // 影の設定（輝き効果）
  ctx.shadowColor = 'rgba(240, 208, 112, 0.8)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
}

function setupDrawing() {
  let drawing = false;
  const start = (e) => {
    if(state.over) return;
    drawing = true;
    const p = getP(e);
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
    state.ink.push([[p.x], [p.y], [0]]);
  };
  const move = (e) => {
    if(!drawing) return;
    const p = getP(e);
    ctx.lineTo(p.x, p.y); ctx.stroke();
    const s = state.ink[state.ink.length-1];
    s[0].push(p.x); s[1].push(p.y); s[2].push(0);
  };
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
  canvas.addEventListener('touchend', () => drawing = false);
}

function getP(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = (touch.clientX - rect.left) * (canvas.width / rect.width / (window.devicePixelRatio || 1));
  const y = (touch.clientY - rect.top) * (canvas.height / rect.height / (window.devicePixelRatio || 1));
  return { x, y };
}

function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); state.ink = []; }

function nextQ() {
  state.currentQ = KANJI_DATA[Math.floor(Math.random()*KANJI_DATA.length)];
  document.getElementById('mondai-text').textContent = state.currentQ.b;
  document.getElementById('yomi-text').textContent = 'よみ：' + state.currentQ.y;
  clearCanvas();
}

async function recognizeAndAttack() {
  if(state.ink.length === 0 || state.over) return;
  const btn = document.getElementById('attack-btn');
  btn.disabled = true;
  const result = await googleHandwriting(state.ink);
  if(result.includes(state.currentQ.k)) {
    state.eHP -= 30;
    document.getElementById('img-e').classList.add('hit');
    setTimeout(()=>document.getElementById('img-e').classList.remove('hit'), 300);
  }
  updateHUD();
  btn.disabled = false;
  if(state.eHP <= 0) endGame(true); else nextQ();
}

async function googleHandwriting(ink) {
  try {
    const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ ink: ink, language: "ja" }] })
    });
    const data = await res.json();
    return data[1][0][1] || [];
  } catch(e) { return []; }
}

function updateHUD() {
  document.getElementById('hp-e-bar').style.width = (state.eHP/state.eMax*100)+'%';
  document.getElementById('hp-p-bar').style.width = (state.pHP/state.pMax*100)+'%';
  document.getElementById('hp-e-val').textContent = `${Math.max(0, state.eHP)}/${state.eMax}`;
  document.getElementById('hp-p-val').textContent = Math.max(0, state.pHP);
  document.getElementById('cast-gauge').style.width = state.cast + '%';
}

setInterval(() => {
  if (state.over) return;
  state.cast += 0.3; 
  updateHUD();
  if (state.cast >= 100) {
    state.cast = 0; state.pHP -= 15;
    document.getElementById('img-p').classList.add('hit');
    setTimeout(()=>document.getElementById('img-p').classList.remove('hit'), 300);
    updateHUD();
    if(state.pHP <= 0) endGame(false);
  }
}, 100);

function endGame(win) {
  state.over = true;
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('res-title').textContent = win ? "怨 霊 退 散" : "力 尽 き た";
}

window.onload = () => {
  initCanvas();
  setupDrawing();
  nextQ();
};
</script>
</body>
</html>
