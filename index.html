<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 剛力 -</title>
<style>
:root { 
    --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa;
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 全画面背景：巻物 */
#game-world {
    position: fixed; inset: 0;
    background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center;
    background-size: cover; z-index: 1;
}

/* ★巨大キャラクターレイヤー */
#visual-layer {
    position: absolute; inset: 0;
    display: flex; justify-content: space-between; align-items: flex-end;
    z-index: 5; pointer-events: none;
}
.char-wrap { width: 55%; height: 90vh; display: flex; align-items: flex-end; }
#enemy-sprite { width: 130%; height: auto; transform: translateX(-15%); filter: drop-shadow(0 0 20px #000); }
#player-sprite { width: 130%; height: auto; transform: translateX(15%); filter: drop-shadow(0 0 20px #000); }

/* ★中央の浮遊キャンバス（キャラの上に被せる） */
#touch-layer {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding-top: 50px;
}

#mondai-bun {
    font-size: 36px; font-weight: bold; color: #fff;
    text-shadow: 0 0 10px #000, 0 0 20px var(--kin);
    margin-bottom: 15px; z-index: 110;
}

#canvas-wrap {
    width: 65%; max-width: 600px; aspect-ratio: 1.2 / 1;
    border: 3px solid var(--kin); border-radius: 20px;
    background: rgba(0, 0, 0, 0.3); /* キャラが透けて見える */
    backdrop-filter: blur(2px);
    position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8);
}
canvas { width: 100%; height: 100%; }

/* HUD */
#top-hud { position: absolute; top: 30px; width: 100%; padding: 0 50px; display: flex; justify-content: space-between; z-index: 200; }
.hp-bar { width: 250px; height: 15px; border: 2px solid var(--kin); background: rgba(0,0,0,0.7); border-radius: 8px; overflow: hidden; }

/* 下部操作パネル */
#bottom-hud { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 200; }
.button-row { display: flex; gap: 20px; margin-bottom: 20px; }
.el-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.btn-clear { height: 60px; padding: 0 30px; background: #222; color: var(--kin); border: 2px solid var(--kin); border-radius: 12px; font-weight: bold; }
.btn-attack { width: 85%; max-width: 500px; padding: 20px; background: linear-gradient(to bottom, #fceabb, #f8b500); color: #000; font-weight: bold; font-size: 28px; border-radius: 60px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }

/* 演出 */
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-15px);} 75%{transform:translateX(15px);} }
.vanish { opacity: 0; transform: scale(1.4) translateY(-50px); transition: 1s ease-in; }
.danger { border-color: #ff0000 !important; box-shadow: 0 0 40px #f00; }
</style>
</head>
<body>

<div id="game-world"></div>

<div id="top-hud">
    <div class="hp-bar"><div id="hp-enemy" style="width:100%; height:100%; background:var(--shu); transition:0.3s;"></div></div>
    <div id="battle-msg" style="font-size:20px; font-weight:bold; text-shadow:0 0 10px #000;">一撃必殺</div>
    <div class="hp-bar"><div id="hp-player" style="width:100%; height:100%; background:var(--ai); transition:0.3s;"></div></div>
</div>

<div id="visual-layer">
    <div class="char-wrap"><img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite"></div>
    <div class="char-wrap" style="justify-content:flex-end;"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite"></div>
</div>

<div id="touch-layer">
    <div id="mondai-bun">---</div>
    <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
    
    <div id="bottom-hud">
        <div class="button-row">
            <div class="el-btn" style="background:#ff4500">火</div>
            <div class="el-btn" style="background:#00bfff">水</div>
            <div class="el-btn" style="background:#ffd700">雷</div>
            <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
        </div>
        <button class="btn-attack" id="attack-btn">漢術発動！</button>
    </div>
</div>

<script>
// --- 漢字データ ---
const KANJI_DATA = [
    {k:'一',y:'いち',b:'___の太刀'},{k:'火',y:'ひ',b:'___を噴く'},{k:'王',y:'おう',b:'古の___'},
    {k:'三',y:'さん',b:'___千世界'},{k:'天',y:'てん',b:'___の裁き'},{k:'心',y:'こころ',b:'___を研ぐ'}
];
const MONDAI_DEFENSE = {k:'壁', b:'【急襲】鉄___防御！'};

let enemyHP = 100, playerHP = 100, enemyCast = 0;
let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
let isDefensePhase = false, isEnemyDead = false;

const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 12; ctx.strokeStyle = '#fff';
}

function next() {
    if (isEnemyDead) return;
    if (isDefensePhase) {
        currentMondai = MONDAI_DEFENSE;
        document.getElementById('mondai-bun').innerHTML = `<span style="color:#ff4444">${currentMondai.b}</span>`;
    } else {
        currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
        document.getElementById('mondai-bun').innerText = currentMondai.b + ` (読み:${currentMondai.y})`;
    }
    clearCanvas();
}

// --- バトルループ ---
setInterval(() => {
    if (isDefensePhase || isEnemyDead || playerHP <= 0) return;
    enemyCast += 0.7;
    if (enemyCast >= 100) {
        isDefensePhase = true; enemyCast = 0;
        document.getElementById('canvas-wrap').classList.add('danger');
        document.getElementById('battle-msg').innerText = "怨霊の猛攻！";
        clearCanvas(); next();
    }
}, 100);

async function recognizeAndAttack() {
    if (inkData.length === 0 || isEnemyDead) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true;

    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] })
        });
        const data = await res.json();
        const candidates = data[1][0][1];
        const isCorrect = candidates.some(c => c === currentMondai.k);

        if (isCorrect) {
            if (isDefensePhase) {
                isDefensePhase = false;
                document.getElementById('canvas-wrap').classList.remove('danger');
                document.getElementById('battle-msg').innerText = "凌ぎ切った！";
            } else {
                damageEnemy(34);
                document.getElementById('battle-msg').innerText = "漢術、命中！";
            }
            next();
        } else {
            if (isDefensePhase) {
                playerTakeDamage(25); isDefensePhase = false;
                document.getElementById('canvas-wrap').classList.remove('danger');
                next();
            } else {
                document.getElementById('battle-msg').innerText = "不発！";
                clearCanvas();
            }
        }
    } catch(e) { console.error(e); }
    btn.disabled = false;
}

function damageEnemy(val) {
    enemyHP = Math.max(0, enemyHP - val);
    document.getElementById('hp-enemy').style.width = enemyHP + "%";
    document.getElementById('enemy-sprite').parentElement.classList.add('shake');
    setTimeout(() => {
        document.getElementById('enemy-sprite').parentElement.classList.remove('shake');
        if (enemyHP <= 0) purge();
    }, 400);
}

function playerTakeDamage(val) {
    playerHP = Math.max(0, playerHP - val);
    document.getElementById('hp-player').style.width = playerHP + "%";
    document.getElementById('player-sprite').parentElement.classList.add('shake');
    setTimeout(() => document.getElementById('player-sprite').parentElement.classList.remove('shake'), 400);
}

function purge() {
    isEnemyDead = true;
    document.getElementById('enemy-sprite').classList.add('vanish');
    document.getElementById('battle-msg').innerText = "怨霊、霧散！";
    setTimeout(() => {
        enemyHP = 100; isEnemyDead = false;
        document.getElementById('hp-enemy').style.width = "100%";
        document.getElementById('enemy-sprite').classList.remove('vanish');
        next();
    }, 2000);
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

// --- 描画ロジック ---
const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - r.left, y: p.clientY - r.top };
};
canvas.addEventListener('touchstart', e => {
    e.preventDefault(); const p = getPos(e); isDrawing = true;
    currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('touchmove', e => {
    if(!isDrawing) return; const p = getPos(e);
    ctx.lineTo(p.x, p.y); ctx.stroke();
    currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0);
});
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });

document.getElementById('attack-btn').addEventListener('click', recognizeAndAttack);
window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
