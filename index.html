<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 絶景 -</title>
<style>
:root { --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 背景レイヤー */
#game-world {
    position: fixed; inset: 0;
    background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center;
    background-size: cover; z-index: 1;
}

/* ★迫力のキャラレイヤー（左右端に固定） */
#visual-layer {
    position: absolute; inset: 0;
    display: flex; justify-content: space-between; align-items: flex-end;
    z-index: 5; pointer-events: none;
}
.char-box { width: 48%; height: 100%; display: flex; align-items: flex-end; }
#enemy-sprite { width: 110%; height: auto; transform: translateX(-10%); filter: drop-shadow(5px 5px 15px #000); }
#player-sprite { width: 110%; height: auto; transform: translateX(10%); filter: drop-shadow(-5px 5px 15px #000); }

/* ★入力レイヤー（中央の空間すべてがキャンバス） */
#touch-layer {
    position: absolute; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center;
}

#mondai-area {
    margin-top: 15vh; text-align: center; z-index: 110;
}
#mondai-bun {
    font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #000, 0 0 5px var(--kin);
}

/* 透明なキャンバス：中央を広く取る */
#canvas-wrap {
    width: 100%; flex-grow: 1;
    position: relative; cursor: crosshair;
}
canvas { width: 100%; height: 100%; }

/* 下部操作 */
#bottom-hud {
    width: 100%; padding-bottom: 30px;
    display: flex; flex-direction: column; align-items: center; gap: 15px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}
.button-row { display: flex; gap: 15px; align-items: center; }
.el-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; }
.btn-clear { height: 45px; padding: 0 20px; background: rgba(0,0,0,0.6); color: var(--kin); border: 1px solid var(--kin); border-radius: 8px; font-size: 14px; }
.btn-attack { 
    width: 80%; max-width: 450px; padding: 18px; 
    background: linear-gradient(to bottom, #fceabb, #d4af37); 
    color: #000; font-weight: bold; font-size: 22px; border-radius: 40px; border: none;
    box-shadow: 0 5px 15px rgba(0,0,0,0.8);
}

/* HUD */
#top-hud { position: absolute; top: 20px; width: 100%; padding: 0 30px; display: flex; justify-content: space-between; z-index: 200; }
.hp-bar { width: 200px; height: 10px; border: 1px solid var(--kin); background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; }

/* 演出用 */
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-12px);} 75%{transform:translateX(12px);} }
.vanish { opacity: 0; transform: translateY(-50px) rotate(5deg); transition: 1.2s; }
</style>
</head>
<body>

<div id="game-world"></div>

<div id="top-hud">
    <div class="hp-bar"><div id="hp-enemy" style="width:100%; height:100%; background:var(--shu); transition:0.3s;"></div></div>
    <div id="battle-msg" style="font-size:16px; text-shadow:2px 2px 4px #000;">怨霊対峙中</div>
    <div class="hp-bar"><div id="hp-player" style="width:100%; height:100%; background:var(--ai); transition:0.3s;"></div></div>
</div>

<div id="visual-layer">
    <div class="char-box"><img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite"></div>
    <div class="char-box" style="justify-content:flex-end;"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite"></div>
</div>

<div id="touch-layer">
    <div id="mondai-area">
        <div id="mondai-bun">---</div>
    </div>
    
    <div id="canvas-wrap">
        <canvas id="draw-canvas"></canvas>
    </div>
    
    <div id="bottom-hud">
        <div class="button-row">
            <div class="el-btn" style="background:#ff4500">火</div>
            <div class="el-btn" style="background:#00bfff">水</div>
            <div class="el-btn" style="background:#ffd700">雷</div>
            <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
        </div>
        <button class="btn-attack" id="attack-btn">漢術発動！</button>
    </div>
</div>

<script>
// --- 漢字データ ---
const KANJI_DATA = [
    {k:'一',y:'いち',b:'___の太刀'},{k:'右',y:'みぎ',b:'___腕の力'},{k:'火',y:'ひ',b:'___を噴く'},
    {k:'三',y:'さん',b:'___千世界'},{k:'天',y:'てん',b:'___の裁き'},{k:'心',y:'こころ',b:'___を研ぐ'}
];
const MONDAI_DEFENSE = {k:'壁', b:'【急襲】鉄___防御！'};

let enemyHP = 100, playerHP = 100, enemyCast = 0;
let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
let isDefensePhase = false, isEnemyDead = false;

const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 12; ctx.strokeStyle = '#fff';
}

function next() {
    if (isEnemyDead) return;
    if (isDefensePhase) {
        currentMondai = MONDAI_DEFENSE;
        document.getElementById('mondai-bun').innerHTML = `<span style="color:#ff4444">${currentMondai.b}</span>`;
    } else {
        currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
        document.getElementById('mondai-bun').innerText = currentMondai.b + ` (読み:${currentMondai.y})`;
    }
    clearCanvas();
}

// バトルロジック
setInterval(() => {
    if (isDefensePhase || isEnemyDead || playerHP <= 0) return;
    enemyCast += 0.7;
    if (enemyCast >= 100) {
        isDefensePhase = true; enemyCast = 0;
        document.getElementById('battle-msg').innerText = "怨霊の猛攻！";
        clearCanvas(); next();
    }
}, 100);

async function recognizeAndAttack() {
    if (inkData.length === 0 || isEnemyDead) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true;

    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] })
        });
        const data = await res.json();
        const candidates = data[1][0][1];
        const isCorrect = candidates.some(c => c === currentMondai.k);

        if (isCorrect) {
            if (isDefensePhase) {
                isDefensePhase = false;
                document.getElementById('battle-msg').innerText = "防御成功！";
            } else {
                damageEnemy(34);
                document.getElementById('battle-msg').innerText = "漢術命中！";
            }
            next();
        } else {
            if (isDefensePhase) {
                playerTakeDamage(25); isDefensePhase = false;
                next();
            } else {
                document.getElementById('battle-msg').innerText = "不発...";
                clearCanvas();
            }
        }
    } catch(e) { console.error(e); }
    btn.disabled = false;
}

function damageEnemy(val) {
    enemyHP = Math.max(0, enemyHP - val);
    document.getElementById('hp-enemy').style.width = enemyHP + "%";
    document.getElementById('enemy-sprite').parentElement.classList.add('shake');
    setTimeout(() => {
        document.getElementById('enemy-sprite').parentElement.classList.remove('shake');
        if (enemyHP <= 0) purge();
    }, 400);
}

function playerTakeDamage(val) {
    playerHP = Math.max(0, playerHP - val);
    document.getElementById('hp-player').style.width = playerHP + "%";
    document.getElementById('player-sprite').parentElement.classList.add('shake');
    setTimeout(() => document.getElementById('player-sprite').parentElement.classList.remove('shake'), 400);
}

function purge() {
    isEnemyDead = true;
    document.getElementById('enemy-sprite').classList.add('vanish');
    document.getElementById('battle-msg').innerText = "怨霊を浄化した！";
    setTimeout(() => {
        enemyHP = 100; isEnemyDead = false;
        document.getElementById('hp-enemy').style.width = "100%";
        document.getElementById('enemy-sprite').classList.remove('vanish');
        next();
    }, 2000);
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

// 描画イベント
const getPos = (e) => {
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX, y: p.clientY };
};
canvas.addEventListener('touchstart', e => {
    e.preventDefault(); const p = getPos(e); isDrawing = true;
    currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('touchmove', e => {
    if(!isDrawing) return; const p = getPos(e);
    ctx.lineTo(p.x, p.y); ctx.stroke();
    currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0);
});
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });

document.getElementById('attack-btn').addEventListener('click', recognizeAndAttack);
window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
