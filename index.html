<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 陣形修正 -</title>
<style>
:root { --kin: #d4af37; --shu: #8e2a2a; --ai: #2a5caa; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 背景 */
#stage-layer {
    position: fixed; inset: 0;
    background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center;
    background-size: cover; z-index: 1;
}

/* キャラクター配置 */
#char-visuals { position: absolute; inset: 0; z-index: 10; pointer-events: none; }

/* ★敵：左側に巨大配置 */
#enemy-box {
    position: absolute; left: -5%; bottom: -5%;
    width: 65%; height: 90vh;
    z-index: 20; /* 枠より手前 */
}
#enemy-sprite { width: 100%; height: 100%; object-fit: contain; object-position: left bottom; filter: drop-shadow(0 0 30px #000); }

/* ★主人公：右側に大きく配置 */
#player-box {
    position: absolute; right: -5%; bottom: -2%;
    width: 60%; height: 85vh;
    z-index: 100; /* 全ての要素より手前（枠に被らない） */
    display: flex; justify-content: flex-end;
}
#player-sprite { width: 100%; height: 100%; object-fit: contain; object-position: right bottom; filter: drop-shadow(0 0 30px #000); }

/* ★中央の書き込み枠：主人公より後ろに配置 */
#canvas-plate {
    position: absolute;
    left: 45%; top: 50%; transform: translate(-50%, -50%);
    width: 55vw; height: 50vh;
    background: rgba(255, 255, 240, 0.1); /* わずかに明るい和紙風 */
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 15px;
    z-index: 30; /* 敵(20)より手前、主人公(100)より後ろ */
    box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
}

/* キャンバス（墨） */
#canvas-layer { position: absolute; inset: 0; z-index: 110; } /* 墨は一番手前 */
canvas { width: 100%; height: 100%; }

/* UI */
#ui-overlay {
    position: absolute; inset: 0; z-index: 200; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
}
#top-ui { padding: 40px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
.hp-row { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; }
.hp-bar { width: 35%; height: 14px; border: 1px solid var(--kin); border-radius: 7px; background: rgba(0,0,0,0.5); overflow: hidden; }
#mondai-bun { text-align: center; font-size: 52px; font-weight: bold; margin-top: 20px; text-shadow: 0 0 20px #000; color: #eee; }

#bottom-ui {
    padding-bottom: 50px; pointer-events: auto;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    display: flex; flex-direction: column; align-items: center; gap: 25px;
}
.btn-row { display: flex; gap: 30px; }
.el-btn { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; }
.btn-clear { height: 55px; padding: 0 40px; background: #222; color: var(--kin); border: 2px solid var(--kin); border-radius: 12px; font-size: 18px; }
.btn-attack { 
    width: 85%; max-width: 600px; padding: 25px; 
    background: linear-gradient(to bottom, #fceabb, #d4af37); 
    color: #000; font-weight: bold; font-size: 36px; border-radius: 70px; border: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.9);
}

.hit { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(15px);} 75%{transform:translateX(-15px);} }
</style>
</head>
<body>

<div id="stage-layer"></div>
<div id="char-visuals">
    <div id="enemy-box"><img src="f7620a0e-4384-4f27-949d-52e7ea62721b.png" id="enemy-sprite"></div>
    <div id="player-box"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png" id="player-sprite"></div>
</div>

<div id="canvas-plate"></div>
<div id="canvas-layer"><canvas id="draw-canvas"></canvas></div>

<div id="ui-overlay">
    <div id="top-ui">
        <div class="hp-row">
            <div class="hp-bar"><div id="hp-enemy" style="width:100%; height:100%; background:var(--shu); transition:0.3s;"></div></div>
            <div style="color:var(--kin); font-weight:bold; font-size:22px;">怨霊対峙</div>
            <div class="hp-bar"><div id="hp-player" style="width:100%; height:100%; background:var(--ai); transition:0.3s;"></div></div>
        </div>
        <div id="mondai-bun">---</div>
    </div>
    <div id="bottom-ui">
        <div class="btn-row">
            <div class="el-btn" style="background:#ff4500">火</div>
            <div class="el-btn" style="background:#00bfff">水</div>
            <div class="el-btn" style="background:#ffd700">雷</div>
            <button class="btn-clear" onclick="clearCanvas()">墨を拭く</button>
        </div>
        <button class="btn-attack" id="attack-btn">漢術発動！</button>
    </div>
</div>

<script>
const KANJI_DATA = [{k:'一',b:'___の太刀'},{k:'火',b:'___を噴く'},{k:'天',b:'___の裁き'},{k:'三',b:'___千世界'},{k:'龍',b:'昇___拳'}];
let enemyHP = 100, currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 18; ctx.strokeStyle = '#fff';
}
function next() {
    currentMondai = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
    document.getElementById('mondai-bun').innerText = currentMondai.b;
    clearCanvas();
}
async function attack() {
    if (inkData.length === 0) return;
    const btn = document.getElementById('attack-btn');
    btn.disabled = true; btn.innerText = "鑑定中...";
    try {
        const res = await fetch("https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test", {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "app_version": 0.4, "requests": [{ "ink": inkData, "language": "ja" }] })
        });
        const data = await res.json();
        if (data[1][0][1].includes(currentMondai.k)) {
            enemyHP -= 34;
            document.getElementById('hp-enemy').style.width = Math.max(0, enemyHP) + "%";
            document.getElementById('enemy-sprite').classList.add('hit');
            setTimeout(() => {
                document.getElementById('enemy-sprite').classList.remove('hit');
                if (enemyHP <= 0) { enemyHP = 100; document.getElementById('hp-enemy').style.width = "100%"; }
                next();
            }, 400);
        } else { clearCanvas(); }
    } catch (e) { console.error(e); }
    btn.disabled = false; btn.innerText = "漢術発動！";
}
function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }
const getPos = (e) => { const p = e.touches ? e.touches[0] : e; return { x: p.clientX, y: p.clientY }; };
canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = getPos(e); isDrawing = true; currentStroke = [[p.x],[p.y],[0]]; ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('touchmove', e => { if(!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); currentStroke[0].push(p.x); currentStroke[1].push(p.y); currentStroke[2].push(0); });
window.addEventListener('touchend', () => { if(isDrawing) inkData.push(currentStroke); isDrawing = false; });
document.getElementById('attack-btn').addEventListener('click', attack);
window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
