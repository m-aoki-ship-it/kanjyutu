<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>真・漢術師 - 墨の試練 -</title>
<style>
:root {
  --sumi: #0a0a0a; --washi: #f4f0e0; --kin: #c9a063; --shu: #8e2a2a; --ai: #1a3651; --ai-bright: #3a82f6;
}
html, body { overflow: hidden; height: 100%; position: fixed; width: 100%; background: #000; color: #fff; font-family: serif; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }

#app { display: flex; flex-direction: column; height: 100dvh; padding: 10px; gap: 5px; max-width: 500px; margin: 0 auto; position: relative; z-index: 10; }
#bg-layer { position: fixed; inset: 0; background: url('IMG_7089.png') no-repeat center center; background-size: cover; filter: blur(5px) brightness(0.3); z-index: 0; }

/* 漢術師：キャンバスの下に配置 */
#player-avatar-fixed { 
    position: fixed; bottom: -50px; right: -20px; width: 90%; max-width: 400px; z-index: 5; pointer-events: none; opacity: 0.8;
}
#player-avatar-fixed img { width: 100%; height: auto; display: block; filter: drop-shadow(0 0 15px #000); }

/* 怨霊エリア */
#enemy-area { position: relative; z-index: 20; display: flex; align-items: center; padding: 10px; background: rgba(0,0,0,0.7); border: 2px solid var(--shu); border-radius: 10px; height: 90px; }
#enemy-info { flex: 1; margin-left: 10px; }
#enemy-hp-bar-bg { width: 100%; height: 10px; background: #222; border-radius: 5px; border: 1px solid var(--shu); margin-top: 5px; }
#enemy-hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #600, var(--shu)); transition: width 0.3s; }
#mondai-bun { font-size: 18px; font-weight: bold; margin-top: 5px; color: #fff; text-shadow: 2px 2px 4px #000; }

/* キャンバス：ここが「邪魔」にならないよう中央に確保 */
#canvas-container { position: relative; z-index: 15; flex: 1; background: rgba(255,255,255,0.1); border: 2px solid var(--kin); border-radius: 10px; margin: 5px 0; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
#draw-canvas { width: 100%; height: 100%; display: block; position: relative; }

/* 下部UI */
#bottom-ui { position: relative; z-index: 20; display: flex; flex-direction: column; gap: 5px; }
#mondai-info-row { display: flex; gap: 5px; }
#mondai-yomi { flex: 1; padding: 10px; background: rgba(244,240,224,0.95); color: var(--sumi); border: 1px solid var(--kin); border-radius: 5px; font-size: 15px; font-weight: bold; text-align: center; }
#player-status { flex: 1; padding: 10px; background: rgba(26,54,81,0.8); border: 1px solid var(--ai-bright); border-radius: 5px; font-size: 13px; color: #fff; text-align: center; }

#button-area { display: flex; gap: 8px; height: 55px; }
.btn { flex: 1; border-radius: 8px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; }
.btn-sub { background: #2b2b2b; color: var(--kin); border: 1px solid var(--kin); }
.btn-main { flex: 2; background: linear-gradient(to bottom, var(--ai-bright), var(--ai)); color: white; border: 1px solid #fff; }

.floating-kanji { position: absolute; inset: 0; pointer-events: none; z-index: 100; filter: drop-shadow(0 0 20px var(--ai-bright)) brightness(1.8); animation: kanji-float-up 1s ease-out forwards; }
@keyframes kanji-float-up { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-100px); opacity: 0; } }
#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--kin); }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="player-avatar-fixed">
    <img src="8632236f-1a48-494f-baad-8a17ff9a36fd.png" alt="漢術師">
</div>

<div id="app">
  <div id="enemy-area">
    <div id="enemy-info">
      <div style="font-size: 11px; color: #ff8a8a;">怨霊：誤字の魔物</div>
      <div id="enemy-hp-bar-bg"><div id="enemy-hp-bar"></div></div>
      <div id="mondai-bun"></div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="draw-canvas"></canvas>
  </div>

  <div id="bottom-ui">
    <div id="mondai-info-row">
      <div id="mondai-yomi"></div>
      <div id="player-status">正統派漢術師</div>
    </div>
    <div id="button-area">
      <button class="btn btn-sub" onclick="clearCanvas()">墨を拭く</button>
      <button class="btn btn-main" onclick="recognizeAndAttack()">漢術発動！</button>
    </div>
  </div>
</div>

<div id="loading">霊力鑑定中...</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const files = { 'write': '文字表示の衝撃音1.mp3', 'hit': '攻撃.mp3' };
    if (files[type]) {
        const audio = new Audio(files[type]);
        audio.volume = 0.5;
        audio.play().catch(() => {});
    }
}

// 漢字リスト（一部抜粋。必要に応じて201文字追加してください）
const MONDAI_LIST = [
    { kanji: '悪', yomi: 'わるい', bun: '___いことをする' },
    { kanji: '安', yomi: 'あんぜん', bun: '___ぜんな場所' },
    { kanji: '屋', yomi: 'へや', bun: 'きれいな___や' },
    { kanji: '代', yomi: 'かわりに', bun: '___わりにやる' }
];

let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false, enemyHp = 100;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d'), enemyHpBar = document.getElementById('enemy-hp-bar');

function setup() {
    const rect = canvas.parentNode.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
    document.getElementById('mondai-bun').innerText = currentMondai.bun;
    document.getElementById('mondai-yomi').innerText = '読み：' + currentMondai.yomi;
    clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function createFloatUpEffect() {
    const img = document.createElement('img');
    img.src = canvas.toDataURL(); img.className = 'floating-kanji';
    document.getElementById('canvas-container').appendChild(img);
    setTimeout(() => img.remove(), 1000);
}

function start(x, y) { if (audioCtx.state === 'suspended') audioCtx.resume(); isDrawing = true; playSound('write'); currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); }
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
window.addEventListener('touchend', end);

async function recognizeAndAttack() {
    if (inkData.length === 0) return;
    document.getElementById('loading').style.display = 'flex';
    try {
        const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] }) });
        const data = await res.json();
        const result = data[1][0][1];
        if (result && result[0] === currentMondai.kanji) {
            createFloatUpEffect();
            setTimeout(() => {
                playSound('hit');
                document.getElementById('enemy-area').classList.add('shake');
                enemyHp -= 34; enemyHpBar.style.width = Math.max(0, enemyHp) + '%';
                setTimeout(() => {
                    document.getElementById('enemy-area').classList.remove('shake');
                    if (enemyHp <= 0) { alert("怨霊を浄化した！"); enemyHp = 100; enemyHpBar.style.width = '100%'; }
                    next();
                }, 400);
            }, 400);
        } else { alert(`正解は「${currentMondai.kanji}」でした。`); clearCanvas(); }
    } catch(e) { alert("通信エラー"); }
    document.getElementById('loading').style.display = 'none';
}

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
