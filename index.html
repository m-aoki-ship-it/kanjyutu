<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>真・漢術師 - 怨霊決戦 -</title>
<style>
:root { 
    --sumi: #0a0a0a; 
    --kin: #d4af37; /* 背景に合わせた少し深みのある金 */
    --shu: #8e2a2a; 
    --ai: #2a5caa; 
    --glass: rgba(10, 5, 0, 0.8); /* 背景の茶色に合わせた暗色 */
}
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body { overflow: hidden; height: 100%; width: 100%; background: #000; color: #fff; font-family: serif; }

/* 指定された背景画像 */
#bg-layer { 
    position: fixed; inset: 0; 
    background: url('5B4C5B36-1A3E-4C27-B6C4-95D11725EDDE.png') no-repeat center center; 
    background-size: cover; 
    z-index: 1; 
}

/* メインステージ */
#game-stage {
    position: relative; z-index: 10; width: 100vw; height: 100dvh;
    display: flex; flex-direction: row; align-items: center; justify-content: space-between;
    padding: 70px 30px 110px 30px;
}

/* 上部HUD */
#top-hud { position: absolute; top: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; z-index: 100; }
.hp-bar-outer { width: 160px; height: 14px; background: rgba(0,0,0,0.6); border: 1px solid var(--kin); border-radius: 2px; overflow: hidden; }

/* 左：怨霊（向きは元のまま） */
#enemy-side { flex: 1.2; display: flex; align-items: center; justify-content: center; position: relative; height: 100%; }
#enemy-sprite { 
    width: 155%; height: auto; 
    transform: translateY(10%); 
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.8)); /* 背景に合わせて影を強調 */
}

/* 中央：書道エリア */
#canvas-side { width: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 150; }
#canvas-wrap { 
    width: 260px; height: 260px; 
    background: rgba(0,0,0,0.4); 
    border: 2px solid var(--kin); 
    border-radius: 4px; /* 少し角張らせて古風に */
    position: relative; 
    box-shadow: 0 0 30px rgba(0,0,0,0.7); 
}
canvas { width: 100%; height: 100%; }

/* 右：術師 */
#player-side { flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; }
#player-chara { width: 145%; transform: translateX(-5%); }
#player-chara img { width: 100%; height: auto; filter: drop-shadow(0 0 20px #000); }

/* 下部パネル */
#bottom-hud { 
    position: absolute; bottom: 0; width: 100%; height: 110px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--glass); 
    border-top: 2px solid var(--kin); 
    z-index: 200;
}
.btn-group { display: flex; gap: 40px; margin-top: 8px; }
.btn { padding: 14px 45px; border-radius: 4px; font-weight: bold; font-size: 18px; border: 1px solid var(--kin); color: #fff; cursor: pointer; transition: 0.2s; }
.btn-clear { background: #1a1a1a; color: var(--kin); }
.btn-attack { 
    background: linear-gradient(to bottom, #444, #000); 
    box-shadow: 0 0 10px var(--kin); 
    color: var(--kin);
}

.shake { animation: shake 0.4s; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-20px); } 75% { transform: translateX(20px); } }
</style>
</head>
<body>
<div id="bg-layer"></div>
<div id="top-hud">
    <div><span style="font-size: 12px; color: var(--shu); font-weight: bold;">怨霊の気</span><div class="hp-bar-outer"><div id="hp-fill" style="height:100%; background:var(--shu); width:100%;"></div></div></div>
    <div style="font-size: 32px; font-weight: bold; color: var(--kin); letter-spacing: 6px; text-shadow: 2px 2px 4px #000;">決戦</div>
    <div style="text-align: right;"><span style="font-size: 12px; color: var(--ai); font-weight: bold;">術師の魂</span><div class="hp-bar-outer"><div style="height:100%; background:var(--ai); width:90%;"></div></div></div>
</div>

<div id="game-stage">
    <div id="enemy-side"><img id="enemy-sprite" src="f7620a0e-4384-4f27-949d-52e7ea62721b.png"></div>
    <div id="canvas-side">
        <div id="canvas-wrap"><canvas id="draw-canvas"></canvas></div>
        <div id="mondai-bun" style="margin-top: 15px; font-size: 22px; font-weight: bold; color: var(--kin); text-shadow: 2px 2px 4px #000;">---</div>
    </div>
    <div id="player-side"><div id="player-chara"><img src="a63674d4-2785-4110-a696-c6937a0a74ef.png"></div></div>
</div>

<div id="bottom-hud">
    <div id="mondai-yomi" style="font-size: 22px; font-weight: bold; color: #fff;">読み：---</div>
    <div class="btn-group">
        <button class="btn btn-clear" onclick="clearCanvas()">墨を拭く</button>
        <button class="btn btn-attack" onclick="recognizeAndAttack()">漢術発動！</button>
    </div>
</div>

<script>
const MONDAI_LIST = [
    { kanji: '悪', yomi: 'わるい', bun: '___いことをする' },
    { kanji: '曜', yomi: 'よう', bun: '日曜日の___' }
];
let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
    document.getElementById('mondai-bun').innerText = currentMondai.bun;
    document.getElementById('mondai-yomi').innerText = '読み：' + currentMondai.yomi;
    clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function start(x, y) { isDrawing = true; currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); }
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
window.addEventListener('touchend', end);

async function recognizeAndAttack() {
    if (inkData.length === 0) return;
    try {
        const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, { 
            method: 'POST', body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] }) 
        });
        const data = await res.json();
        if (data[1][0][1][0] === currentMondai.kanji) {
            document.getElementById('enemy-side').classList.add('shake');
            setTimeout(() => { document.getElementById('enemy-side').classList.remove('shake'); next(); }, 400);
        } else { alert("失敗..."); clearCanvas(); }
    } catch(e) { console.error(e); }
}
window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
