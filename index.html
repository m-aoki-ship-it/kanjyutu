<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>真・漢術師 - 小三墨の試練 -</title>
<style>
:root {
  --sumi: #0a0a0a; --washi: #e8dcc4; --kin: #d4af37; --shu: #b22222; --ai: #003366; --ai-bright: #0088ff;
}
html, body { overflow: hidden; height: 100%; position: fixed; width: 100%; background: var(--sumi); color: var(--washi); font-family: serif; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
#app { display: flex; flex-direction: column; height: 100dvh; padding: 12px; gap: 10px; max-width: 500px; margin: 0 auto; position: relative; }

#enemy-area { height: 130px; display: flex; align-items: center; padding: 15px; background: rgba(178,34,34,0.1); border: 2px solid var(--shu); border-radius: 12px; z-index: 10; }
#enemy-visual { width: 80px; height: 100px; flex-shrink: 0; }
#enemy-info { flex: 1; margin-left: 10px; }
#enemy-hp-bar-bg { width: 100%; height: 12px; background: #222; border-radius: 6px; border: 1px solid var(--shu); margin-top: 5px; }
#enemy-hp-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #600, var(--shu)); transition: width 0.3s; }

#canvas-container { position: relative; flex: 1; background: #111; border: 2px solid var(--kin); border-radius: 12px; overflow: visible; }
#draw-canvas { width: 100%; height: 100%; display: block; z-index: 5; position: relative; }

.floating-kanji {
    position: absolute; inset: 0; pointer-events: none; z-index: 100;
    filter: drop-shadow(0 0 20px var(--ai-bright)) brightness(1.8);
    animation: kanji-float-up 1.0s ease-out forwards;
}
@keyframes kanji-float-up {
    0% { transform: scale(1) translateY(0); opacity: 1; }
    50% { transform: scale(1.3) translateY(-30px); opacity: 1; }
    100% { transform: scale(1.5) translateY(-60px); opacity: 0; }
}

#player-area { height: 120px; display: flex; align-items: center; padding: 10px; background: linear-gradient(135deg, #001a33, #000); border: 2px solid var(--ai); border-radius: 12px; }
#player-avatar { width: 100px; height: 100px; border-radius: 8px; border: 1px solid var(--ai-bright); overflow: hidden; background: #000; flex-shrink: 0; }
#player-avatar img { width: 100%; height: 100%; object-fit: cover; }
#player-info { flex: 1; padding-left: 15px; }
.status-label { font-size: 11px; color: var(--ai-bright); font-weight: bold; letter-spacing: 1px; }
.kanji-display { font-size: 18px; font-weight: bold; margin-top: 5px; }

#button-area { display: flex; gap: 10px; height: 60px; }
.btn { flex: 1; border-radius: 8px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; }
.btn-sub { background: #222; color: var(--kin); border: 1px solid var(--kin); }
.btn-main { flex: 2; background: linear-gradient(to bottom, var(--ai-bright), var(--ai)); color: white; box-shadow: 0 4px 10px rgba(0,136,255,0.3); }

#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--kin); }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
</style>
</head>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    if (type === 'shimmer') { osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(1760, now + 1); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 1); }
    else if (type === 'hit') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now + 0.3); }
    else if (type === 'fail') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.5); }
}

const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const enemyHpBar = document.getElementById('enemy-hp-bar');

function setup() {
  const rect = canvas.parentNode.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = rect.height;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 12; ctx.strokeStyle = '#fff';
  ctx.shadowBlur = 4; ctx.shadowColor = '#0088ff';
}

function next() {
  currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
  document.getElementById('mondai-bun').innerText = currentMondai.bun;
  document.getElementById('mondai-yomi').innerText = '読み：' + currentMondai.yomi;
  clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function createFloatUpEffect() {
    const dataUrl = canvas.toDataURL();
    const img = document.createElement('img');
    img.src = dataUrl;
    img.className = 'floating-kanji';
    const container = document.getElementById('canvas-container');
    img.style.width = canvas.width + 'px';
    img.style.height = canvas.height + 'px';
    container.appendChild(img);
    playSound('shimmer');
    setTimeout(() => img.remove(), 1000);
}

function start(x, y) { 
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isDrawing = true; currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); 
}
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); }, {passive: false});
window.addEventListener('touchend', end);
canvas.addEventListener('mousedown', e => { const r = canvas.getBoundingClientRect(); start(e.clientX-r.left, e.clientY-r.top); });
window.addEventListener('mousemove', e => { if(isDrawing) { const r = canvas.getBoundingClientRect(); move(e.clientX-r.left, e.clientY-r.top); } });
window.addEventListener('mouseup', end);

async function recognizeAndAttack() {
  if (inkData.length === 0) return;
  document.getElementById('loading').style.display = 'flex';
  try {
    const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] })
    });
    const data = await res.json();
    const result = data[1][0][1];
    
    if (result && result[0] === currentMondai.kanji) {
      createFloatUpEffect();
      setTimeout(() => {
          playSound('hit');
          document.getElementById('enemy-area').classList.add('shake');
          enemyHp -= 34;
          enemyHpBar.style.width = Math.max(0, enemyHp) + '%';
          setTimeout(() => {
              document.getElementById('enemy-area').classList.remove('shake');
              if (enemyHp <= 0) { alert("浄化完了！見事なり。"); enemyHp = 100; enemyHpBar.style.width = '100%'; }
              next();
          }, 400);
      }, 400);
    } else {
      playSound('fail');
      alert(`力不足！正解は「${currentMondai.kanji}」なり。`);
      clearCanvas();
    }
  } catch(e) { alert("通信エラー"); }
  document.getElementById('loading').style.display = 'none';
}

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
