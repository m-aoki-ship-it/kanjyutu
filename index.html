<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>真・漢術師 - 墨の試練（完全修復版）</title>
<style>
:root {
  --sumi: #0a0a0a; --kin: #c9a063; --shu: #8e2a2a; --ai-bright: #3a82f6;
}
html, body { overflow: hidden; height: 100%; position: fixed; width: 100%; background: #000; color: #fff; font-family: serif; }
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }

/* 背景レイヤー */
#bg-layer { position: fixed; inset: 0; background: url('IMG_7089.png') no-repeat center center; background-size: cover; filter: brightness(0.2); z-index: 1; }

/* キャラクター（右側中層） */
#player-avatar { 
    position: fixed; bottom: -5vh; right: -5vw; width: 80vw; max-width: 450px; z-index: 5; pointer-events: none;
}
#player-avatar img { width: 100%; height: auto; display: block; filter: drop-shadow(0 0 10px #000); }

/* UIメインコンテナ */
#app { position: relative; display: flex; flex-direction: column; height: 100dvh; padding: 15px; z-index: 10; max-width: 500px; margin: 0 auto; }

/* 怨霊エリア（左上） */
#enemy-area { width: 65%; background: rgba(0,0,0,0.8); border: 2px solid var(--shu); border-radius: 10px; padding: 10px; margin-bottom: 10px; }
#enemy-hp-bar-bg { width: 100%; height: 8px; background: #222; border: 1px solid var(--shu); margin: 5px 0; }
#enemy-hp-bar { height: 100%; width: 100%; background: var(--shu); transition: width 0.3s; }
#mondai-bun { font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px 4px #000; }

/* 手書きエリア（中央・最前面） */
#canvas-container { 
    flex: 1; position: relative; z-index: 100; /* キャラクタより手前に配置 */
    background: rgba(255,255,255,0.05); border: 2px solid var(--kin); border-radius: 10px; margin: 10px 0;
}
#draw-canvas { width: 100%; height: 100%; cursor: crosshair; }

/* 下部UI（左側） */
#bottom-ui { width: 65%; display: flex; flex-direction: column; gap: 8px; }
#mondai-yomi { background: rgba(244,240,224,0.9); color: var(--sumi); padding: 8px; border-radius: 5px; font-weight: bold; text-align: center; font-size: 0.9rem; }
#button-area { display: flex; gap: 8px; height: 50px; }
.btn { flex: 1; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; font-size: 0.9rem; }
.btn-sub { background: #333; color: var(--kin); border: 1px solid var(--kin); }
.btn-main { flex: 1.5; background: linear-gradient(to bottom, var(--ai-bright), #1a3651); color: white; border: 1px solid #fff; }

#loading { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; color: var(--kin); }
.floating-kanji { position: absolute; pointer-events: none; z-index: 200; filter: brightness(2) drop-shadow(0 0 10px var(--ai-bright)); animation: floatUp 1s ease-out forwards; }
@keyframes floatUp { from { transform: scale(1) translateY(0); opacity: 1; } to { transform: scale(1.5) translateY(-100px); opacity: 0; } }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
</style>
</head>
<body>
<div id="bg-layer"></div>

<div id="player-avatar">
    <img src="8632236f-1a48-494f-baad-8a17ff9a36fd.png" alt="漢術師">
</div>

<div id="app">
  <div id="enemy-area">
    <div style="font-size: 0.7rem; color: #ff8a8a;">怨霊：文字崩れの怪</div>
    <div id="enemy-hp-bar-bg"><div id="enemy-hp-bar"></div></div>
    <div id="mondai-bun">---</div>
  </div>

  <div id="canvas-container">
    <canvas id="draw-canvas"></canvas>
  </div>

  <div id="bottom-ui">
    <div id="mondai-yomi">読み：---</div>
    <div id="button-area">
      <button class="btn btn-sub" onclick="clearCanvas()">墨を拭く</button>
      <button class="btn btn-main" onclick="recognizeAndAttack()">漢術発動！</button>
    </div>
  </div>
</div>

<div id="loading">霊力鑑定中...</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const files = { 'write': '文字表示の衝撃音1.mp3', 'hit': '攻撃.mp3' };
    if (files[type]) {
        const audio = new Audio(files[type]);
        audio.volume = 0.5;
        audio.play().catch(() => {});
    }
}

// 201文字のリスト（一部抜粋。元のリストをここに貼り付けてください）
const MONDAI_LIST = [
    { kanji: '悪', yomi: 'わるい', bun: '___いことをする' },
    { kanji: '屋', yomi: 'へや', bun: 'きれいな___や' },
    { kanji: '曜', yomi: 'よう', bun: '日曜日の___' }
];

let currentMondai = {}, inkData = [], currentStroke = [], isDrawing = false, enemyHp = 100;
const canvas = document.getElementById('draw-canvas'), ctx = canvas.getContext('2d'), enemyHpBar = document.getElementById('enemy-hp-bar');

function setup() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 10; ctx.strokeStyle = '#fff';
}

function next() {
    currentMondai = MONDAI_LIST[Math.floor(Math.random() * MONDAI_LIST.length)];
    document.getElementById('mondai-bun').innerText = currentMondai.bun;
    document.getElementById('mondai-yomi').innerText = '読み：' + currentMondai.yomi;
    clearCanvas();
}

function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); inkData = []; }

function start(x, y) { 
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isDrawing = true; playSound('write');
    currentStroke = [[x], [y], [0]]; ctx.beginPath(); ctx.moveTo(x, y); 
}
function move(x, y) { if (!isDrawing) return; ctx.lineTo(x, y); ctx.stroke(); currentStroke[0].push(x); currentStroke[1].push(y); currentStroke[2].push(0); }
function end() { if (isDrawing) inkData.push(currentStroke); isDrawing = false; }

canvas.addEventListener('touchstart', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); start(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); move(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top); });
window.addEventListener('touchend', end);

async function recognizeAndAttack() {
    if (inkData.length === 0) return;
    document.getElementById('loading').style.display = 'flex';
    try {
        const res = await fetch(`https://inputtools.google.com/request?itc=ja-t-i0-handwrit&app=test`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ app_version: 0.4, requests: [{ ink: inkData, language: "ja" }] }) });
        const data = await res.json();
        const result = data[1][0][1];
        if (result && result[0] === currentMondai.kanji) {
            playSound('hit');
            document.getElementById('enemy-area').classList.add('shake');
            enemyHp -= 34; enemyHpBar.style.width = Math.max(0, enemyHp) + '%';
            setTimeout(() => {
                document.getElementById('enemy-area').classList.remove('shake');
                if (enemyHp <= 0) { alert("浄化完了！"); enemyHp = 100; enemyHpBar.style.width = '100%'; }
                next();
            }, 400);
        } else { alert(`力不足！正解は「${currentMondai.kanji}」`); clearCanvas(); }
    } catch(e) { alert("通信エラー"); }
    document.getElementById('loading').style.display = 'none';
}

window.onload = () => { setup(); next(); };
window.onresize = setup;
</script>
</body>
</html>
