<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>漢術師</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --sumi: #0d0b08;
  --sumi2: #1a1610;
  --washi: #f2ead8;
  --kin: #c9a84c;
  --kin-dim: rgba(201,168,76,0.15);
  --shu: #c0392b;
  --shu-bright: #e74c3c;
  --shu-dim: rgba(192,57,43,0.15);
  --hagane: rgba(255,255,255,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; touch-action:none; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--sumi);
  font-family: 'Noto Sans JP', sans-serif;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  color: var(--washi);
}

/* ── 背景テクスチャ ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(192,57,43,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 20% 100%, rgba(201,168,76,0.06) 0%, transparent 50%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px);
  pointer-events: none;
}

/* ── メインレイアウト ── */
#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100dvh;
  padding: 10px 12px 12px;
  gap: 8px;
}

/* ── 敵エリア ── */
#enemy-area {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--shu-dim);
  border: 1px solid rgba(192,57,43,0.2);
  border-radius: 4px;
}

#enemy-left {
  flex: 1;
}

#enemy-name {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 11px;
  color: rgba(201,168,76,0.5);
  letter-spacing: 0.25em;
  margin-bottom: 6px;
}

#hp-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
#hp-label {
  font-size: 9px;
  color: rgba(201,168,76,0.4);
  letter-spacing: 0.1em;
  flex-shrink: 0;
}
#hp-bar-bg {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 1px;
  overflow: hidden;
}
#hp-bar {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #8b1a1a, var(--shu-bright));
  border-radius: 1px;
  transition: width 0.5s ease;
}

#enemy-char {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 64px;
  line-height: 1;
  color: rgba(192,57,43,0.55);
  text-shadow: 0 0 20px rgba(192,57,43,0.6), 0 0 40px rgba(192,57,43,0.3);
  flex-shrink: 0;
  width: 70px;
  text-align: center;
  transition: all 0.15s;
}
#enemy-char.hit { animation: hitShake 0.35s ease; }
#enemy-char.dead { animation: deadSpin 0.8s ease forwards; }
@keyframes hitShake {
  0%,100% { transform: scale(1) rotate(0); }
  25% { transform: scale(1.25) rotate(-6deg); filter: brightness(4); }
  75% { transform: scale(0.9) rotate(4deg); }
}
@keyframes deadSpin {
  0% { transform: scale(1); opacity:1; }
  40% { transform: scale(1.4); filter: brightness(6); }
  100% { transform: scale(0) rotate(180deg); opacity:0; }
}

/* ── バトルログ ── */
#log {
  flex: 0 0 auto;
  min-height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#log-text {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 14px;
  color: var(--kin);
  letter-spacing: 0.12em;
  text-shadow: 0 0 8px rgba(201,168,76,0.4);
  opacity: 0;
  transition: opacity 0.25s;
  text-align: center;
}
#log-text.show { opacity: 1; }

/* ── お題エリア ── */
#mondai-area {
  flex: 0 0 auto;
  background: var(--hagane);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 4px;
  padding: 10px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#mondai-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#mondai-label {
  font-size: 9px;
  color: rgba(201,168,76,0.35);
  letter-spacing: 0.4em;
}

#mondai-actions {
  display: flex;
  gap: 6px;
}

.mondai-btn {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.15s;
  border: 1px solid;
}
#mondai-hint-btn {
  color: rgba(232,93,4,0.7);
  border-color: rgba(232,93,4,0.25);
  background: rgba(232,93,4,0.06);
}
#mondai-hint-btn:active { background: rgba(232,93,4,0.15); }
#mondai-hint-btn.used { color: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.08); background: none; }
#mondai-skip {
  color: rgba(201,168,76,0.4);
  border-color: rgba(201,168,76,0.12);
  background: none;
}
#mondai-skip:active { background: var(--kin-dim); }

/* 穴埋め文 */
#mondai-bun {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 20px;
  color: rgba(242,234,216,0.92);
  letter-spacing: 0.06em;
  line-height: 1.8;
  text-align: center;
}
#mondai-bun .blank {
  display: inline-block;
  min-width: 1.1em;
  border-bottom: 2px solid var(--kin);
  color: var(--kin);
  text-align: center;
  vertical-align: middle;
  margin: 0 2px;
  text-shadow: 0 0 8px rgba(201,168,76,0.5);
}

/* 読み・画数・正解漢字 */
#mondai-footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
#mondai-yomi {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 16px;
  color: rgba(201,168,76,0.8);
  letter-spacing: 0.15em;
}
#mondai-strokes {
  font-size: 11px;
  color: rgba(201,168,76,0.35);
}
#mondai-kanji {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 40px;
  color: var(--kin);
  text-shadow: 0 0 16px rgba(201,168,76,0.6);
  min-width: 48px;
  text-align: center;
  line-height: 1;
  transition: all 0.25s;
}
.seikai-flash { animation: seikaiAnim 0.5s ease; }
@keyframes seikaiAnim {
  0% { transform: scale(1); }
  40% { transform: scale(1.3); color:#fff; text-shadow: 0 0 30px #fff; }
  100% { transform: scale(1); }
}
.wrong-flash { animation: wrongAnim 0.35s ease; }
@keyframes wrongAnim {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* ── 書くエリア ── */
#draw-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
}

#draw-label {
  text-align: center;
  font-size: 9px;
  color: rgba(201,168,76,0.3);
  letter-spacing: 0.4em;
}

#canvas-wrap {
  flex: 1;
  position: relative;
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 3px;
  background: rgba(13,11,8,0.7);
  overflow: hidden;
  min-height: 0;
}

/* 十字ガイド線 */
#canvas-wrap::before {
  content: '';
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: rgba(201,168,76,0.05);
  pointer-events: none;
}
#canvas-wrap::after {
  content: '';
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 1px;
  background: rgba(201,168,76,0.05);
  pointer-events: none;
}

#draw-canvas {
  display: block;
  width: 100%; height: 100%;
}

#hint-kanji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Shippori Mincho B1', serif;
  font-size: 120px;
  color: rgba(201,168,76,0.07);
  pointer-events: none;
  user-select: none;
  line-height: 1;
}

#recognized {
  position: absolute;
  bottom: 8px; right: 10px;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 20px;
  color: rgba(201,168,76,0.25);
  pointer-events: none;
  transition: all 0.2s;
}
#recognized.active { color: var(--kin); }

/* ── ボタン ── */
#btn-area {
  flex: 0 0 auto;
  display: flex;
  gap: 8px;
}

.action-btn {
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Shippori Mincho B1', serif;
  letter-spacing: 0.2em;
  transition: all 0.15s;
  border: 1px solid;
  padding: 14px 0;
  font-size: 16px;
  text-align: center;
}
#clear-btn {
  flex: 1;
  color: rgba(201,168,76,0.5);
  border-color: rgba(201,168,76,0.15);
  background: none;
}
#clear-btn:active { background: var(--kin-dim); border-color: rgba(201,168,76,0.4); }

#attack-btn {
  flex: 2;
  color: var(--shu-bright);
  border-color: rgba(192,57,43,0.35);
  background: var(--shu-dim);
  font-size: 18px;
  position: relative;
  overflow: hidden;
}
#attack-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(192,57,43,0.08));
}
#attack-btn:active { background: rgba(192,57,43,0.25); border-color: var(--shu-bright); }
#attack-btn:disabled { opacity: 0.5; }
#attack-btn.glow { animation: btnGlow 0.5s ease; }
@keyframes btnGlow {
  50% { box-shadow: 0 0 20px rgba(192,57,43,0.5), 0 0 40px rgba(192,57,43,0.3); }
}

/* ── エフェクト ── */
.particle {
  position: fixed; pointer-events: none; z-index: 200;
  font-family: 'Shippori Mincho B1', serif;
  animation: pFly var(--dur, 0.7s) ease forwards;
}
@keyframes pFly {
  0% { transform: translate(0,0) scale(0.6); opacity:1; }
  100% { transform: translate(var(--tx),var(--ty)) scale(1.4); opacity:0; }
}
.dmg-num {
  position: fixed; pointer-events: none; z-index: 201;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 32px; font-weight: 800;
  text-shadow: 0 0 8px currentColor, 2px 2px 0 rgba(0,0,0,0.6);
  animation: dmgFloat 0.9s ease forwards;
}
@keyframes dmgFloat {
  0% { transform: translateY(0) scale(0.8); opacity:1; }
  30% { transform: translateY(-16px) scale(1.2); opacity:1; }
  100% { transform: translateY(-50px); opacity:0; }
}
.flash {
  position: fixed; inset:0; z-index:199; pointer-events:none;
  animation: flashOut 0.25s ease forwards;
}
@keyframes flashOut { 0% { opacity:0.35; } 100% { opacity:0; } }

/* ── 勝利 ── */
#victory {
  display: none;
  position: fixed; inset:0; z-index:300;
  background: rgba(13,11,8,0.97);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#victory.show { display: flex; }
#victory h1 {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 52px;
  color: var(--kin);
  text-shadow: 0 0 30px rgba(201,168,76,0.7);
  animation: victorPulse 1.4s ease infinite;
}
@keyframes victorPulse {
  0%,100% { text-shadow: 0 0 30px rgba(201,168,76,0.7); }
  50% { text-shadow: 0 0 60px rgba(201,168,76,1), 0 0 100px rgba(201,168,76,0.4); }
}
#victory p { color: rgba(242,234,216,0.45); font-size: 13px; letter-spacing: 0.2em; }
#restart-btn {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 17px;
  padding: 14px 36px;
  border: 1px solid var(--kin);
  background: var(--kin-dim);
  color: var(--kin);
  letter-spacing: 0.3em;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
#restart-btn:active { background: rgba(201,168,76,0.2); }
</style>
<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;bottom:60px;left:0;right:0;background:red;color:#fff;font-size:11px;padding:6px;z-index:9999;word-break:break-all;';
  d.textContent = 'ERR L' + line + ':' + col + ' ' + msg;
  document.body.appendChild(d);
  return false;
};
</script>
</head>

  <!-- 書くエリア -->
  <div id="draw-section">

      <div id="hint-kanji"></div>

  <!-- ボタン -->
  <div id="btn-area">
    <button class="action-btn" id="clear-btn">消す</button>

</div>

<!-- 勝利 -->
<div id="victory">

  <p id="victory-msg"></p>
  <button id="restart-btn">次の敵へ</button>
</div>

function resizeCanvas() {

// 画ごとの色パレット（呪文っぽい色変化）
const STROKE_COLORS = [
  { line:'#fff8e7', glow:'rgba(255,220,80,0.9)',  blur:18 },  // 金
  { line:'#ffe0c0', glow:'rgba(255,140,40,0.9)',  blur:20 },  // 橙

  { line:'#b0ffdc', glow:'rgba(40,200,140,0.9)',  blur:18 },  // 緑
  { line:'#fff8e7', glow:'rgba(255,220,80,0.9)',  blur:18 },  // 金（繰り返し）
];

function drawPath(path, colorInfo, alpha) {
  if (path.length < 2) return;
  ctx.globalAlpha = alpha;
  
  // 外側グロー（太め・ぼかし強め）
  ctx.strokeStyle = colorInfo.glow;
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = colorInfo.glow;
  ctx.shadowBlur = colorInfo.blur * 2;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  path.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // 中間グロー
  ctx.lineWidth = 7;
  ctx.shadowBlur = colorInfo.blur;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  path.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.stroke();

  // 芯（細く明るく）
  ctx.strokeStyle = colorInfo.line;
  ctx.lineWidth = 3;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  path.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.stroke();

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.shadowColor = 'transparent';

  // 書き終わった画（少し暗くして残す）
  state.paths.forEach((path, i) => {
    const col = STROKE_COLORS[i % STROKE_COLORS.length];
    drawPath(path, col, 0.75);
  });

  // 現在書いている画（フルで光る）
  if (state.currentPath.length > 1) {
    var col = STROKE_COLORS[state.paths.length % STROKE_COLORS.length];
    drawPath(state.currentPath, col, 1.0);
  }
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (canvas.width / rect.width),
    y: (src.clientY - rect.top) * (canvas.height / rect.height)
  };
}

// ── Web Audio API 音響システム ──────────────────
var AudioCtxClass = window.AudioContext || window.webkitAudioContext;
var audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtxClass();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

var drawNoiseNode = null;
var drawNoiseGain = null;

function startDrawSound(strokeIndex) {
  try {
    var ac = getAudioCtx();
    stopDrawSound();
    var baseFreq = 400 + strokeIndex * 180;
    var bufSize = Math.floor(ac.sampleRate * 0.5);
    var buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    var noise = ac.createBufferSource();
    noise.buffer = buf;
    noise.loop = true;
    var bpf = ac.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.setValueAtTime(baseFreq, ac.currentTime);
    bpf.frequency.linearRampToValueAtTime(baseFreq * 2.5, ac.currentTime + 0.3);
    bpf.Q.value = 8;
    drawNoiseGain = ac.createGain();
    drawNoiseGain.gain.setValueAtTime(0, ac.currentTime);
    drawNoiseGain.gain.linearRampToValueAtTime(0.06, ac.currentTime + 0.05);
    noise.connect(bpf);
    bpf.connect(drawNoiseGain);
    drawNoiseGain.connect(ac.destination);
    noise.start();
    drawNoiseNode = noise;
  } catch(e) {}
}

function stopDrawSound() {
  try {
    if (drawNoiseNode) {
      var ac2 = getAudioCtx();
      if (drawNoiseGain) {
        drawNoiseGain.gain.linearRampToValueAtTime(0, ac2.currentTime + 0.08);
      }
      setTimeout(function() {
        try { drawNoiseNode.stop(); } catch(ex) {}
        drawNoiseNode = null;
        drawNoiseGain = null;
      }, 100);
    }
  } catch(e) {}
}

function playStrokeCompleteSound(strokeIndex) {
  try {
    var ac3 = getAudioCtx();

    if (type === 'fire' || type === 'lightning') {

      hpf.frequency.value = 800;

      gA.gain.setValueAtTime(0.5, t);
      gA.gain.exponentialRampToValueAtTime(0.001, t + 0.25);

      var gA2 = ac7.createGain();
      oscA.type = 'sawtooth';
      oscA.frequency.setValueAtTime(type === 'lightning' ? 1200 : 800, t);
      oscA.frequency.exponentialRampToValueAtTime(200, t + 0.2);
      gA2.gain.setValueAtTime(0.15, t);
      gA2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      oscA.connect(gA2); gA2.connect(ac7.destination);

    } else if (type === 'water' || type === 'wind') {
      // 水・風：シュワーッとした音
      var bufB = ac7.createBuffer(1, Math.floor(ac7.sampleRate * 0.4), ac7.sampleRate);

      var gB = ac7.createGain();
      gB.gain.value = 0.35;
      srcB.connect(bpfB); bpfB.connect(gB); gB.connect(ac7.destination);
      srcB.start();

    } else if (type === 'earth') {
      // 土・岩：ドスン重い音
      var oscC = ac7.createOscillator();
      var gC = ac7.createGain();
      oscC.type = 'sine';

      gC.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      oscC.connect(gC); gC.connect(ac7.destination);

      var bufC = ac7.createBuffer(1, Math.floor(ac7.sampleRate * 0.1), ac7.sampleRate);
      var dC = bufC.getChannelData(0);

      for (var k = 0; k < 3; k++) {
        (function(kk) {
          var oscV = ac7.createOscillator();

// kiraエフェクトはWeb Animations APIで実装

function toScreen(pos) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: rect.left + pos.x * (rect.width / canvas.width),
    y: rect.top  + pos.y * (rect.height / canvas.height)
  };
}

function makeDot(x, y, size, color, glow) {
  var el = document.createElement('div');
  el.style.position = 'fixed';
  el.style.pointerEvents = 'none';
  el.style.zIndex = '150';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.borderRadius = '50%';
  el.style.background = color;
  el.style.boxShadow = '0 0 ' + (size*2) + 'px ' + glow;
  return el;
}

function animateDot(el, tx, ty, dur) {
  var start = null;
  var sx = parseFloat(el.style.left);
  var sy = parseFloat(el.style.top);
  document.body.appendChild(el);
  function step(ts) {
    if (!start) start = ts;
    var p = Math.min((ts - start) / dur, 1);
    var ease = 1 - Math.pow(1 - p, 3);
    el.style.left = (sx + tx * ease) + 'px';
    el.style.top  = (sy + ty * ease) + 'px';
    el.style.opacity = 1 - p;
    if (p < 1) requestAnimationFrame(step);
    else el.remove();
  }
  requestAnimationFrame(step);
}

function spawnPenSpark(pos) {
  var s = toScreen(pos);
  var col = STROKE_COLORS[state.paths.length % STROKE_COLORS.length];
  for (var i = 0; i < 12; i++) {
    var size = 2 + Math.random() * 5;
    var angle = Math.random() * Math.PI * 2;
    var dist  = 15 + Math.random() * 40;
    var dur   = 400 + Math.random() * 350;
    var el = makeDot(s.x, s.y, size, col.line, col.glow);
    animateDot(el, Math.cos(angle)*dist, Math.sin(angle)*dist, dur);
  }
  // リング
  var ring = document.createElement('div');
  ring.style.position = 'fixed';
  ring.style.pointerEvents = 'none';
  ring.style.zIndex = '148';
  ring.style.left = (s.x - 20) + 'px';
  ring.style.top  = (s.y - 20) + 'px';
  ring.style.width = '40px';
  ring.style.height = '40px';
  ring.style.borderRadius = '50%';
  ring.style.border = '2px solid ' + col.glow;
  ring.style.boxShadow = '0 0 8px ' + col.glow;
  document.body.appendChild(ring);
  var rStart = null;
  (function animRing(ts) {
    if (!rStart) rStart = ts;
    var p = Math.min((ts - rStart) / 450, 1);
    ring.style.transform = 'scale(' + p + ')';
    ring.style.opacity = 1 - p;
    if (p < 1) requestAnimationFrame(animRing);
    else ring.remove();
  })(performance.now());
}

function spawnStrokeFinish(path, strokeIndex) {
  if (path.length < 2) return;
  var col = STROKE_COLORS[strokeIndex % STROKE_COLORS.length];
  var step = Math.max(1, Math.floor(path.length / 5));
  var samples = [];
  for (var i = 0; i < path.length; i += step) samples.push(path[i]);
  samples.push(path[path.length - 1]);

  samples.forEach(function(pt, idx) {
    setTimeout(function() {
      var s = toScreen(pt);
      for (var j = 0; j < 8; j++) {
        var size  = 2 + Math.random() * 4;
        var angle = Math.random() * Math.PI * 2;
        var dist  = 12 + Math.random() * 30;
        var dur   = 350 + Math.random() * 300;
        var el = makeDot(s.x, s.y, size, col.line, col.glow);
        animateDot(el, Math.cos(angle)*dist, Math.sin(angle)*dist, dur);
      }
      if (idx === samples.length - 1) {
        var ring = document.createElement('div');
        ring.style.position = 'fixed';
        ring.style.pointerEvents = 'none';
        ring.style.zIndex = '148';
        ring.style.left = (s.x - 30) + 'px';
        ring.style.top  = (s.y - 30) + 'px';
        ring.style.width = '60px';
        ring.style.height = '60px';
        ring.style.borderRadius = '50%';
        ring.style.border = '2px solid ' + col.glow;
        ring.style.boxShadow = '0 0 16px ' + col.glow;
        document.body.appendChild(ring);
        var rStart = null;
        (function animRing(ts) {
          if (!rStart) rStart = ts;
          var p = Math.min((ts - rStart) / 500, 1);
          ring.style.transform = 'scale(' + p + ')';
          ring.style.opacity = 1 - p;
          if (p < 1) requestAnimationFrame(animRing);
          else ring.remove();
        })(performance.now());
      }
    }, idx * 35);
  });
}
function endDraw() {
  if (!state.drawing) return;
  state.drawing = false;
  if (state.currentPath.length > 1) {
    const finishedPath = [...state.currentPath];
    state.paths.push(finishedPath);
    state.currentPath = [];
    redraw();
    spawnStrokeFinish(finishedPath, state.paths.length - 1);
    stopDrawSound();
    if(typeof playStrokeCompleteSound==='function') playStrokeCompleteSound(state.paths.length - 1);
    // 判定は発動ボタンで行う
  }
}

function buildPool(level) {
  const pool = [...(MONDAI_DB[level] || MONDAI_DB[1])];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool;
}

function nextMondai() {
  var enemy = ENEMIES[state.enemyIndex] || ENEMIES[0];
  if (!state.mondaiPool || state.mondaiPool.length === 0) {
    state.mondaiPool = buildPool(enemy.level || 1);

  state.currentMondai = state.mondaiPool.pop();
  const m = state.currentMondai;

function recognizeKanji() {
  if (!state.currentMondai) return;
  if (state.paths.length === 0) { showLog('漢字を書いてから発動せよ！'); return; }
  if (state.isJudging) return;

  state.isJudging = true;
  setAttackBtnLoading(true);

  const target = state.currentMondai;

  // ストローク特徴量を抽出して判定
  setTimeout(() => {
    try {
      const result = judgeByFeatures(target);
      handleJudgeResult(result, target);
    } catch(e) {
      showLog('判定エラー');
    } finally {
      state.isJudging = false;
      setAttackBtnLoading(false);
    }
  }, 300); // 少し待って判定中感を出す
}

// ストローク特徴量ベースの判定
function judgeByFeatures(target) {
  const strokes = state.paths.length;
  const allPoints = state.paths.flat();
  const xs = allPoints.map(p => p.x);
  const ys = allPoints.map(p => p.y);
  const W = canvas.width, H = canvas.height;

  // 各ストロークの方向を計算
  const dirs = state.paths.map(path => {
    const dx = path[path.length-1].x - path[0].x;
    const dy = path[path.length-1].y - path[0].y;
    const len = Math.sqrt(dx*dx + dy*dy);
    return len > 5 ? { dx: dx/len, dy: dy/len } : { dx:0, dy:0 };
  });

  // 水平・垂直・斜めストローク数
  const hCount = dirs.filter(d => Math.abs(d.dx) > 0.6).length;
  const vCount = dirs.filter(d => Math.abs(d.dy) > 0.6).length;
  const dCount = dirs.filter(d => Math.abs(d.dx) > 0.3 && Math.abs(d.dy) > 0.3).length;

  // 描画範囲の縦横比
  const bboxW = Math.max(...xs) - Math.min(...xs);
  const bboxH = Math.max(...ys) - Math.min(...ys);
  const aspect = bboxW / (bboxH || 1);

  // 正解の漢字ごとの期待特徴と照合
  const score = getExpectedScore(target.kanji, strokes, hCount, vCount, dCount, aspect);

  return score >= 0.4 ? target.kanji : '？';
}

    '路':13,     '身':7,     '転':11,     '軽':12,     '輝':15,     '農':13,     '返':7,     '追':9,
    '送':9,     '速':10,     '進':11,     '遊':12,     '運':12,     '部':11,     '都':11,     '配':10,
    '酒':10,     '重':9,     '金':8,     '鉄':13,     '銀':14,     '開':12,     '闇':17,     '院':10,
    '陽':12,     '階':12,     '集':12,     '雷':13,     '霊':15,     '面':9,     '題':18,     '風':9,
    '飲':12,     '館':16,     '駅':14,     '鬼':10,     '魔':21,     '鼻':14,     '龍':16,
  };
  const expStrokes = expected[kanji] || 5;
  const diff = Math.abs(strokes - expStrokes);

  // 画数が大きくずれたら即失敗
  // 許容幅：少画数(1-4)は±1、中画数(5-10)は±2、多画数(11+)は±3
  const tolerance = expStrokes <= 4 ? 1 : expStrokes <= 10 ? 2 : 3;
  if (diff > tolerance) return 0;

  // 画数スコア（ぴったりなら1.0）
  const strokeScore = 1 - (diff / (tolerance + 1));

  // 方向スコア：漢字ごとの特徴
  let dirScore = 0.5; // デフォルト
  if (kanji === '一') dirScore = h >= 1 ? 1 : 0;
  else if (kanji === '山') dirScore = v >= 2 ? 1 : 0.3;
  else if (kanji === '川') dirScore = v >= 3 ? 1 : 0.3;
  else if (kanji === '土') dirScore = (h >= 1 && v >= 1) ? 1 : 0.3;
  else if (kanji === '木') dirScore = (h >= 1 && v >= 1 && d >= 1) ? 1 : 0.4;
  else if (kanji === '水') dirScore = d >= 1 ? 0.8 : 0.4;
  else if (kanji === '火') dirScore = d >= 1 ? 0.8 : 0.4;
  else if (kanji === '力') dirScore = (d >= 1) ? 0.9 : 0.4;

  return strokeScore * 0.7 + dirScore * 0.3;
}

function handleJudgeResult(result, target) {
  const isCorrect = (result === target.kanji);
  const el = document.getElementById('recognized');

  if (isCorrect) {
    state.recognizedKanji = target.kanji;
    el.textContent = '✓';
    el.style.color = '#2ecc71';
    el.classList.add('active');
    showLog('「' + target.kanji + '」正解！' + (JUTSU[target.kanji] ? JUTSU[target.kanji].name + 'が宿った！' : '術が発動する！'));
    document.getElementById('attack-btn').classList.add('glow');
    setTimeout(() => document.getElementById('attack-btn').classList.remove('glow'), 700);
    const mk = document.getElementById('mondai-kanji');
    mk.classList.remove('seikai-flash'); void mk.offsetWidth; mk.classList.add('seikai-flash');
    // 自動発動
    setTimeout(() => doAttack(), 400);
  } else {
    state.recognizedKanji = null;
    el.textContent = result !== '？' ? result : '✗';
    el.style.color = '#e74c3c';
    el.classList.add('active');
    playWrongSound();
    state.missCount++;
    if (state.missCount === 1) {
      showLog('「' + (result || '？') + '」ちがう！ヒントを見て書き直せ！（あと1回）');
      autoHint();
    } else {
      showLog('攻撃失敗…正解は「' + target.kanji + '」');
      revealAnswer();
    }
    var mk = document.getElementById('mondai-kanji');
    mk.classList.remove('wrong-flash'); void mk.offsetWidth; mk.classList.add('wrong-flash');
  }
}

function setAttackBtnLoading(loading) {
  const btn = document.getElementById('attack-btn');
  if (loading) {
    btn.textContent = '判定中…';
    btn.style.opacity = '0.6';
    btn.disabled = true;
  } else {
    btn.textContent = '発動！';
    btn.style.opacity = '1';
    btn.disabled = false;
  }
}

// ============================================================
// 攻撃
// ============================================================
function attack() {
  if (state.paths.length === 0) {
    showLog('まず漢字を書いてください！');
    return;
  }
  recognizeKanji();
}

function doAttack() {
  if (!state.recognizedKanji) return;

  const kanji = state.recognizedKanji;
  const jutsu = JUTSU[kanji] || JUTSU['火'];
  let dmg = Math.floor(Math.random() * (jutsu.dmg[1] - jutsu.dmg[0]) + jutsu.dmg[0]);
  if (state.hintUsed) dmg = Math.floor(dmg * 0.8);

  state.hp = Math.max(0, state.hp - dmg);
  updateHpBar();

  playDamageSound();
  playAttackSound(jutsu.type);
  spawnAttackEffect(kanji, jutsu, true);
  spawnDamageNumber(dmg, jutsu.color);
  spawnFlash(jutsu.color);

  const enemyChar = document.getElementById('enemy-char');
  if (state.hp > 0) {
    enemyChar.classList.remove('hit'); void enemyChar.offsetWidth; enemyChar.classList.add('hit');
    setTimeout(() => enemyChar.classList.remove('hit'), 400);
  }

  showLog(jutsu.emoji + ' ' + jutsu.name + '！ ' + dmg + 'ダメージ！');
  showAnswer();
  clearCanvas();
  state.canAttack = false;
  setTimeout(() => nextMondai(), 1200);

  if (state.hp <= 0) setTimeout(handleVictory, 600);
}

function updateHpBar() {
  const pct = (state.hp / state.maxHp) * 100;
  document.getElementById('hp-bar').style.width = pct + '%';
  const bar = document.getElementById('hp-bar');
  if (pct < 30) bar.style.background = 'linear-gradient(90deg, #8b1a1a, #c0392b)';
  else if (pct < 60) bar.style.background = 'linear-gradient(90deg, #b8860b, #e67e22)';
}

function spawnAttackEffect(kanji, jutsu, isCorrect) {
  if (isCorrect === undefined) isCorrect = true;
  var enemyEl = document.getElementById('enemy-char');
  var rect = enemyEl.getBoundingClientRect();
  var tx = rect.left + rect.width / 2;
  var ty = rect.top + rect.height / 2;
  var count = isCorrect ? 8 : 3;
  for (var i = 0; i < count; i++) {
    var el = document.createElement('div');
    el.className = 'particle';
    el.textContent = jutsu.emoji;
    el.style.position = 'fixed';
    el.style.pointerEvents = 'none';
    el.style.zIndex = '200';
    el.style.left = tx + 'px';
    el.style.top = ty + 'px';
    el.style.fontSize = (16 + Math.random() * 16) + 'px';
    el.style.color = jutsu.color;
    document.body.appendChild(el);
    var vx = (Math.random()-0.5)*120;
    var vy = (Math.random()-0.5)*120;
    var dur = 600 + Math.random() * 400;
    var delay = i * 50;
    var startTime = null;
    (function(elem, dvx, dvy, ddur) {
      var ox = tx, oy = ty;
      setTimeout(function() {
        var t0 = null;
        function step(ts) {
          if (!t0) t0 = ts;
          var p = Math.min((ts - t0) / ddur, 1);
          var e = 1 - Math.pow(1-p, 2);
          elem.style.left = (ox + dvx * e) + 'px';
          elem.style.top  = (oy + dvy * e) + 'px';
          elem.style.opacity = 1 - p;
          if (p < 1) requestAnimationFrame(step);
          else elem.remove();
        }
        requestAnimationFrame(step);
      }, delay);
    })(el, vx, vy, dur);
  }
  var kEl = document.createElement('div');
  kEl.className = 'particle';
  kEl.textContent = kanji;
  kEl.style.position = 'fixed';
  kEl.style.pointerEvents = 'none';
  kEl.style.zIndex = '200';
  kEl.style.left = (tx - 20) + 'px';
  kEl.style.top  = (ty - 20) + 'px';
  kEl.style.fontSize = '48px';
  kEl.style.fontFamily = "'Shippori Mincho B1', serif";
  kEl.style.color = jutsu.color;
  kEl.style.textShadow = '0 0 20px ' + jutsu.color;
  document.body.appendChild(kEl);
  var t0k = null;
  function stepK(ts) {
    if (!t0k) t0k = ts;
    var p = Math.min((ts - t0k) / 800, 1);
    kEl.style.top = (ty - 20 - 60 * p) + 'px';
    kEl.style.opacity = 1 - p;
    if (p < 1) requestAnimationFrame(stepK);
    else kEl.remove();
  }
  requestAnimationFrame(stepK);
}
function spawnDamageNumber(dmg, color) {
  var enemyEl = document.getElementById('enemy-char');
  var rect = enemyEl.getBoundingClientRect();
  var el = document.createElement('div');
  el.className = 'dmg-num';
  el.textContent = '-' + dmg;
  el.style.position = 'fixed';
  el.style.pointerEvents = 'none';
  el.style.zIndex = '201';
  el.style.left = (rect.left + rect.width/2 - 30) + 'px';
  el.style.top  = rect.top + 'px';
  el.style.color = color;
  el.style.fontFamily = "'Shippori Mincho B1', serif";
  el.style.fontSize = '32px';
  el.style.fontWeight = '800';
  el.style.textShadow = '0 0 8px ' + color + ', 2px 2px 0 rgba(0,0,0,0.6)';
  document.body.appendChild(el);
  var oy = rect.top;
  var t0 = null;
  function step(ts) {
    if (!t0) t0 = ts;
    var p = Math.min((ts - t0) / 900, 1);
    el.style.top = (oy - 50 * p) + 'px';
    el.style.opacity = p < 0.3 ? 1 : 1 - ((p-0.3)/0.7);
    if (p < 1) requestAnimationFrame(step);
    else el.remove();
  }
  requestAnimationFrame(step);
}
function spawnFlash(color) {
  var el = document.createElement('div');
  el.className = 'flash';
  el.style.background = color;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 300);
}
// ============================================================
// 勝利
// ============================================================
function handleVictory() {
  var enemyChar = document.getElementById('enemy-char');
  enemyChar.classList.add('dead');

  setTimeout(() => {
    const enemy = ENEMIES[state.enemyIndex];
    document.getElementById('victory-msg').textContent = enemy.reward;
    document.getElementById('victory').classList.add('show');
  }, 800);
}

function nextEnemy() {
  state.enemyIndex = (state.enemyIndex + 1) % ENEMIES.length;
  var enemy = ENEMIES[state.enemyIndex];

  state.hp = enemy.hp;
  state.maxHp = enemy.hp;
  state.usedJutsu = [];
  state.recognizedKanji = null;
  state.canAttack = false;

  document.getElementById('enemy-name').textContent = enemy.name;
  document.getElementById('enemy-char').textContent = enemy.char;
  document.getElementById('enemy-char').classList.remove('dead', 'hit');
  state.mondaiPool = [];
  state.currentMondai = null;
  document.getElementById('recognized').textContent = '？';
  document.getElementById('recognized').style.color = '';
  document.getElementById('recognized').classList.remove('active');
  document.getElementById('hint-kanji').textContent = '';
  document.getElementById('victory').classList.remove('show');

  updateHpBar();
  clearCanvas();
  nextMondai();
  showLog('漢字を書いて攻撃せよ！');
}

// ============================================================
// ユーティリティ
// ============================================================
function clearCanvas() {
  state.paths = [];
  state.currentPath = [];
  state.recognizedKanji = null;
  document.getElementById('recognized').textContent = '？';
  document.getElementById('recognized').style.color = '';
  document.getElementById('recognized').classList.remove('active');
  document.getElementById('hint-kanji').textContent = '';
  redraw();
}

let logTimer;
function showLog(msg) {
  var el = document.getElementById('log-text');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(logTimer);
  logTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ============================================================
// イベント
// ============================================================
document.getElementById('clear-btn').addEventListener('click', clearCanvas);
document.getElementById('attack-btn').addEventListener('click', attack);
document.getElementById('restart-btn').addEventListener('click', nextEnemy);
document.getElementById('mondai-skip').addEventListener('click', skipMondai);
document.getElementById('mondai-hint-btn').addEventListener('click', useHint);

window.addEventListener('resize', resizeCanvas);

// ============================================================
// 初期化
// ============================================================
// ── イベント登録（全関数定義後） ──
canvas.addEventListener('mousedown', e => {
  state.drawing = true;
  state.currentPath = [getPos(e)];
  spawnPenSpark(getPos(e));
  startDrawSound(state.paths.length);
});
canvas.addEventListener('mousemove', e => {
  if (!state.drawing) return;
  state.currentPath.push(getPos(e));
  redraw();
});
canvas.addEventListener('mouseup', () => {
  stopDrawSound();
  endDraw();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  state.drawing = true;
  state.currentPath = [getPos(e)];
  spawnPenSpark(getPos(e));
  startDrawSound(state.paths.length);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!state.drawing) return;
  state.currentPath.push(getPos(e));
  redraw();
}, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  stopDrawSound();
  endDraw();
}, {passive:false});

resizeCanvas();
updateHpBar();
nextMondai();
setTimeout(() => {
  document.getElementById('log-text').classList.add('show');
}, 500);

</script>
